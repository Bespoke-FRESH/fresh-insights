<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Which contested foods are worth resolving first?</title>
<link rel="icon" href="data:,">
<style>
  :root{
    --ink:#1a3a2a; --ink-soft:#2a5a3a; --muted:#5e6c5e; --muted-soft:#9aaa9a;
    --paper:#fffdf8; --line:#eee8df; --gold:#c8a24a; --sel:#2a5a8a;
    --focal:#9a7a2e;   /* deeper gold for focal TEXT on cream — clears WCAG (bright --gold stays for halos/marks) */
    /* --muted darkened to clear WCAG AA (4.5) for caption/legend text on paper */
    /* food-group palette (slide 19), purple+orange reserved for Part 3 */
    --g-grain:#3f7d52; --g-fruitveg:#c8a24a; --g-dessert:#c66b57;
    --g-mixed:#4f9d92; --g-other:#6f8fb0; --g-snack:#b56392;
  }
  *{box-sizing:border-box}
  html,body{margin:0;background:var(--paper);color:var(--ink);
    font-family:"Source Sans 3","Segoe UI",system-ui,sans-serif;}
  .wrap{max-width:940px;margin:0 auto;padding:8px 10px 14px;}

  /* the title IS the narrator — one element, many jobs (#7); carries the focal count */
  .story-title{
    font-family:"Lora",Georgia,serif; font-weight:600;
    font-size:clamp(1.12rem,2.5vw,1.5rem); line-height:1.3;
    min-height:2.5em; margin:.2rem 0 .12rem; transition:color .5s ease; text-wrap:balance;
    max-width:38em;
  }
  .story-title .focal{
    font-weight:800; font-size:1.5em; line-height:1; margin-right:.12em;
    color:var(--focal); display:inline-block; animation:focalgrow .55s cubic-bezier(.2,.8,.2,1);
  }
  @keyframes focalgrow{ from{ transform:scale(.55); opacity:.2 } to{ transform:scale(1); opacity:1 } }
  .sub{color:var(--muted); font-size:.95rem; min-height:1.35em; transition:opacity .5s ease; max-width:33em;}
  .sub b{color:var(--ink-soft); font-weight:700;}
  .sub .c-cons{color:var(--sel); font-weight:700;}
  .sub .c-health{color:var(--g-grain); font-weight:700;}

  /* the stage holds the map + the ranked table, side by side or stacked */
  .stage{display:flex; gap:14px; align-items:flex-start;}
  .stage.col{flex-direction:column; gap:8px;}
  .mapwrap{flex:0 0 auto;}
  svg{display:block; touch-action:manipulation;}

  .axis-line{stroke:var(--ink); stroke-width:1.4;}
  .axis-label{fill:var(--ink); font-size:1em; font-weight:600;}
  .tick{fill:var(--muted); font-size:.9em;}
  .gridline{stroke:#e7e0d4; stroke-width:1;}

  .food{opacity:0; transition:opacity .6s ease;}
  .food.show{opacity:1;}
  .food.dim{opacity:.13;}
  .food.gone{opacity:0;}
  .food circle{transition:r .25s ease, stroke-width .2s ease;}
  .food.demo-hover circle, .food:hover circle{stroke:var(--ink); stroke-width:2.6;}
  .flabel{font-size:.86em; font-weight:700; pointer-events:none; opacity:0; transition:opacity .5s ease;}
  .flabel.show{opacity:1;}

  /* selection rectangle (slide 20) */
  .selbox{opacity:0; transition:opacity .7s ease;}
  .selbox.show{opacity:1;}
  .selbox rect{fill:rgba(42,90,138,.10); stroke:var(--sel); stroke-width:1.6; stroke-dasharray:6 4;}
  .selcap{font-size:.92em; font-weight:600; fill:var(--sel);}
  .selcap .strike{text-decoration:line-through; fill:var(--muted-soft); font-weight:400;}
  .selcap .keep{text-decoration:underline; font-weight:800; fill:var(--sel);}

  /* the halo ping — radar ring on the four finalists (#spotlight combo) */
  .halo{transform-box:fill-box; transform-origin:center; opacity:0;}
  .halo.on{opacity:1; animation:halopulse 1.35s ease-out infinite;}
  @keyframes halopulse{ 0%,100%{ transform:scale(.7); opacity:.8 } 50%{ transform:scale(1.5); opacity:.08 } }
  @media (prefers-reduced-motion: reduce){ .halo.on{animation:none; opacity:.5} }

  /* the ranked table (slides 21-22) — folded into the same animated unit (#16) */
  .panel{flex:1 1 auto; min-width:0; opacity:0; transition:opacity .6s ease; align-self:stretch;}
  .panel.show{opacity:1;}
  .panel-cap{font-size:.8rem; color:var(--muted); font-style:italic; margin:0 0 4px 2px;}
  table.rank{width:100%; border-collapse:collapse; font-size:.9rem;}
  table.rank th{ text-align:left; font-weight:700; color:var(--ink); border-bottom:1.5px solid var(--line);
    padding:3px 6px; font-size:.82rem; }
  table.rank th.rr{ text-align:right; }
  table.rank th.rr.hl{ outline:2px dashed var(--sel); outline-offset:-2px; color:var(--sel); border-radius:4px; }
  table.rank td{ padding:3px 6px; border-bottom:1px solid var(--line); }
  table.rank td.rr{ text-align:right; font-variant-numeric:tabular-nums; font-weight:700; color:var(--sel); }
  table.rank tr.row{ transition:opacity .45s ease, background .45s ease; }
  table.rank tr.row .nm{ display:inline-block; transition:transform .3s ease; transform-origin:left center; }
  table.rank tr.dim{ opacity:.16; }
  table.rank tr.spot{ background:rgba(200,162,74,.16); }
  table.rank tr.spot .nm{ font-weight:800; transform:scale(1.06); }
  table.rank tr.spot td.rr{ color:var(--focal); }
  .gdot{display:inline-block; width:8px; height:8px; border-radius:50%; margin-right:6px; vertical-align:middle;}

  .tip{position:absolute; pointer-events:none; background:var(--ink); color:var(--paper);
    border-radius:8px; padding:8px 11px; font-size:12.5px; line-height:1.45; max-width:230px;
    opacity:0; transition:opacity .15s ease; box-shadow:0 6px 20px rgba(26,58,42,.28); z-index:5;}
  .tip b{color:#ffe6a8;}
  .tip .row{display:flex; justify-content:space-between; gap:14px;}
  .tip .row span:last-child{font-variant-numeric:tabular-nums;}

  .controls{display:flex; gap:14px; align-items:center; margin-top:8px; min-height:24px;}
  .btn{background:none; border:none; color:var(--ink-soft); font:inherit; font-size:.85rem;
    font-weight:600; cursor:pointer; padding:6px 4px;}
  .btn:hover{color:var(--ink); text-decoration:underline;}
  .btn[hidden]{display:none;}
  .progress{display:flex; gap:6px; margin-left:auto;}
  .dot{width:7px; height:7px; border-radius:50%; background:var(--line);}
  .dot.on{background:var(--gold);}
  #replay{ background:var(--ink); color:var(--paper); border-radius:999px; padding:8px 18px; font-weight:600; font-size:.92rem;}
  #replay:hover{ background:var(--ink-soft); color:var(--paper); text-decoration:none;}
  .navbtn{ background:#fff; border:1.5px solid var(--line); color:var(--ink-soft); border-radius:8px;
    width:34px; height:32px; font-size:.85rem; font-weight:700; cursor:pointer; line-height:1; padding:0;}
  .navbtn:hover:not(:disabled){ border-color:var(--muted-soft); color:var(--ink);}
  .navbtn:disabled{ opacity:.3; cursor:default;}
  .mapcap{font-size:.78rem; font-style:italic; color:var(--muted); margin-top:5px; margin-left:2px;}
  .legend{display:flex; flex-wrap:wrap; gap:4px 12px; margin-top:5px; font-size:.78rem; color:var(--muted);}
  .legend span{white-space:nowrap;}
</style>
</head>
<body>
<div class="wrap">
  <div id="narrator" class="story-title narrator"></div>
  <div id="sub" class="sub"></div>

  <div class="stage" id="stage">
    <div class="mapwrap">
      <svg id="chart" role="img" aria-label="Healthfulness–consumption map of 122 carbohydrate foods, filtered to the four most contested staples">
        <g id="grid"></g>
        <g id="axis"></g>
        <g id="selG"></g>
        <g id="foods"></g>
        <g id="halos"></g>
        <g id="labels"></g>

      <div class="mapcap" id="mapcap">122 of ~3,200 carb foods&nbsp;·&nbsp;about half of all US carb intake</div>
      <div class="legend" id="legend"></div>
    </div>
    <div class="panel" id="panel">
      <div class="panel-cap" id="panelCap"></div>
      <table class="rank">
        <thead><tr><th>Food</th><th class="rr" id="rrHead">rank&nbsp;range&nbsp;▾</th></tr></thead>
        <tbody id="rankBody"></tbody>
      </table>
    </div>
  </div>

  <div class="controls">
    <button id="prevStep" class="navbtn" aria-label="Previous step" title="Previous (←)">◀</button>
    <button id="nextStep" class="navbtn" aria-label="Next step" title="Next (→)">▶</button>
    <button id="skip"  class="btn">Skip ▸</button>
    <button id="replay" class="btn" hidden>↻ Replay</button>
    <div class="progress" id="progress"></div>
  </div>
  <div aria-live="polite" class="visually-hidden" id="live" style="position:absolute;left:-9999px;"></div>
</div>
<div id="tip" class="tip"></div>

    axisG.appendChild(svgEl("text",{"class":"axis-label",x:(L.X0+L.XB)/2,y:L.Y1+L.MB-2,"text-anchor":"middle"},"How much America eats it  →"));
    var tx=Math.round(L.F*0.62+10), midY=(L.Y0+L.Y1)/2;
    axisG.appendChild(svgEl("text",{"class":"axis-label",transform:"rotate(-90 "+tx+" "+midY+")",x:tx,y:midY,"text-anchor":"middle"},"How healthy experts say it is  →"));
    axisG.appendChild(svgEl("text",{"class":"tick",x:L.X0-6,y:L.Y0+L.F*0.9,"text-anchor":"end"},"high"));
    axisG.appendChild(svgEl("text",{"class":"tick",x:L.X0-6,y:L.Y1,"text-anchor":"end"},"low"));
  }

  // ---- the selection rectangle + its category caption (slide 20-21) -------
  function drawSel(){
    selG.innerHTML="";
    var g=svgEl("g",{"class":"selbox","id":"selbox"});
    var x=fx(BOX_X), w=fx(XMAX)-fx(BOX_X), y=fy(BOX_YHI), h=fy(BOX_YLO)-fy(BOX_YHI);
    g.appendChild(svgEl("rect",{x:x,y:y,width:w,height:h,rx:3}));
    var cap=svgEl("text",{"class":"selcap",x:x+w/2,y:y+16,"text-anchor":"middle"});
    cap.appendChild(svgEl("tspan",{"class":"keep","id":"selKeep"},"Uncertain"));
    cap.appendChild(svgEl("tspan",{},"  or  "));
    cap.appendChild(svgEl("tspan",{"id":"selDrop"},"Certainly Neutral"));
    g.appendChild(cap);
    selG.appendChild(g);
  }

  // ---- the field of foods --------------------------------------------------
  var nodes=[];
  function buildFoods(){
    foodsG.innerHTML=""; halosG.innerHTML=""; labelsG.innerHTML=""; nodes=[];
    CLOUD.forEach(function(d,i){
      var g=svgEl("g",{"class":"food","data-i":i});
      var cx = d.out ? L.XCOLA : fx(d.x);
      g.setAttribute("transform","translate("+cx+","+fy(d.y)+")");
      var fill=GCOLOR[d.g]||"var(--g-other)";
      var c=svgEl("circle",{r:(d.t?L.big:L.dotR),fill:fill,stroke:fill,"stroke-width":1,"fill-opacity":.82});
      g.appendChild(c);
      if(d.lab){ g.appendChild(svgEl("text",{x:0,y:-(L.big+5),"text-anchor":"middle","font-size":".8em","font-weight":"700",fill:"var(--ink)"}, d.lab)); }
      g.addEventListener("mouseenter",function(e){ showTip(d,e); });
      g.addEventListener("mousemove",function(e){ moveTip(e); });
      g.addEventListener("mouseleave",hideTip);
      foodsG.appendChild(g);
      // halo + label for finalists, prebuilt (revealed at b4)
      if(d.t){
        var halo=svgEl("circle",{"class":"halo",cx:fx(d.x),cy:fy(d.y),r:L.big+5,fill:"none",stroke:"var(--gold)","stroke-width":2.4});
        halosG.appendChild(halo);
        // the four cluster low and close; stack labels (above/below/side) so none collide
        var p=LABELPOS[d.n]||{dx:L.big+5,dy:4,a:"start"};
        var lab=svgEl("text",{"class":"flabel",x:fx(d.x)+p.dx,y:fy(d.y)+p.dy,
          "text-anchor":p.a,fill:"var(--ink)"}, d.n);
        labelsG.appendChild(lab);
        g.__halo=halo; g.__lab=lab;
      }
      nodes.push(g);
    });
  }

  // ---- the ranked table ----------------------------------------------------
  function buildTable(){
    rankBody.innerHTML="";
    TABLE.forEach(function(d){
      var tr=document.createElement("tr"); tr.className="row"; tr.setAttribute("data-n",d.n);
      var td1=document.createElement("td");
      td1.innerHTML='<span class="gdot" style="background:'+GCOLOR[d.g]+'"></span><span class="nm">'+d.n+'</span>';
      var td2=document.createElement("td"); td2.className="rr"; td2.textContent=d.rr;
      tr.appendChild(td1); tr.appendChild(td2); rankBody.appendChild(tr);
    });
  }
  function tableMode(state){
    // state: 'hidden' | 'all' (10 of 17) | 'four'
    if(state==="hidden"){ panel.classList.remove("show"); return; }
    panel.classList.add("show");
    rrHead.className="rr hl";
    var rows=rankBody.children;
    if(state==="all"){
      panelCap.textContent="Showing 10 of 17  (filtered from 122)";
      for(var i=0;i<rows.length;i++){ rows[i].className="row"; }
    } else if(state==="four"){
      panelCap.textContent="Showing 4 of 17  (filtered from 122)";
      for(var j=0;j<rows.length;j++){
        var nm=rows[j].getAttribute("data-n");
        var isTop=TOP4.some(function(d){ return d.n===nm; });
        rows[j].className="row"+(isTop?" spot":" dim");
      }
    }
  }

  // ---- legend --------------------------------------------------------------
  function buildLegend(){
    legend.innerHTML="";
    Object.keys(GLABEL).sort(function(a,b){ return GLABEL[a]<GLABEL[b]?-1:1; }).forEach(function(k){
      var s=document.createElement("span");
      s.innerHTML='<span class="gdot" style="background:'+GCOLOR[k]+'"></span>'+GLABEL[k];
      legend.appendChild(s);
    });
  }

  // ---- tooltip (earns its keep: rank range / group not otherwise visible) --
  function showTip(d,e){
    var html="<b>"+(d.n||d.lab||(GLABEL[d.g]+" food"))+"</b>";
    html+='<div style="margin-top:4px;color:#cfe0d4">'+GLABEL[d.g]+'</div>';
    if(d.out){ html+='<div class="row" style="margin-top:4px"><span>eaten</span><span><b>'+d.x+' g carb/day</b></span></div>'; }
    if(d.rr!=null){ html+='<div class="row" style="margin-top:4px"><span>rank range</span><span><b>'+d.rr+'</b></span></div>'; }
    tip.innerHTML=html; tip.style.opacity="1"; moveTip(e);
  }
  function moveTip(e){ tip.style.left=(e.clientX+14)+"px"; tip.style.top=(e.clientY+14)+"px"; }
  function hideTip(){ tip.style.opacity="0"; }

  // ---- progress dots -------------------------------------------------------
  var STEPNAMES=["b1","b2","b3","b4"];
  STEPNAMES.forEach(function(){ var d=document.createElement("div"); d.className="dot"; progress.appendChild(d); });
  function mark(i){ var ds=progress.children; for(var k=0;k<ds.length;k++) ds[k].className="dot"+(k<=i?" on":""); }

  function eachFood(fn){ for(var i=0;i<nodes.length;i++){ fn(nodes[i], CLOUD[i]); } }
  function inBox(d){ return d.x>=BOX_X && d.y>=BOX_YLO && d.y<=BOX_YHI; }
  function cls(g,s){ g.setAttribute("class",s); }   // SVG className is read-only — use setAttribute

  // ---- the four beats (one idea + one layer each) --------------------------
  // b1 — referent: the whole field of 122, by group
  function beat1(){ setCap("b1"); mark(0);
    document.getElementById("selbox").classList.remove("show");
    tableMode("hidden");
    eachFood(function(g){ cls(g,"food show"); });
    if(g4) g4(false);
    live.textContent="122 carbohydrate foods shown on the map.";
  }
  // b2 — filter: draw the box, dim everything outside it
  function beat2(){ setCap("b2"); mark(1);
    tableMode("hidden");
    document.getElementById("selDrop").classList.remove("strike");
    document.getElementById("selbox").classList.add("show");
    eachFood(function(g,d){ cls(g,"food show"+(inBox(d)?"":" dim")); });
    if(g4) g4(false);
  }
  // b3 — rank: keep only the survivors, strike "Certainly Neutral", show the table
  function beat3(){ setCap("b3"); mark(2);
    document.getElementById("selbox").classList.add("show");
    document.getElementById("selDrop").classList.add("strike");
    eachFood(function(g,d){ cls(g,"food "+(d.n?"show":"gone")); });
    tableMode("all");
    if(g4) g4(false);
    live.textContent="17 contested foods, ranked by rank range; ten shown.";
  }
  // b4 — spotlight the four finalists (halo ping + table spot + fade rest)
  var g4=null;
  function beat4(){ setCap("b4"); mark(3);
    document.getElementById("selbox").classList.remove("show");
    eachFood(function(g,d){ cls(g,"food "+(d.t?"show":"gone")); });
    tableMode("four");
    g4(true);
    live.textContent="Four staples top the list: wheat bread, iced tea, white rice, white bread.";
  }
  // toggle the finalist halos + labels
  g4=function(on){
    eachFood(function(g,d){
      if(!d.t) return;
      if(on){ g.__halo.classList.add("on"); g.__lab.classList.add("show"); }
      else  { g.__halo.classList.remove("on"); g.__lab.classList.remove("show"); }
    });
  };

  function home(){
    setCap("rest");
    document.getElementById("selbox").classList.remove("show");
    tableMode("four");
    eachFood(function(g){ cls(g,"food show"); });
    g4(true);
    document.getElementById("skip").hidden=true;
    document.getElementById("replay").hidden=false;
    live.textContent="The four most contested, most-eaten carb foods. Hover any dot for its rank range.";
  }
  function finishRun(){ home(); setPlayLabel("↻ Replay the walkthrough"); demoHover(); }
  function setPlayLabel(t){ document.getElementById("replay").innerHTML=t; }
  // demo the hover affordance (#10) on the top finalist so "hover any dot" is concrete
  function demoHover(){
    var i=-1; for(var k=0;k<CLOUD.length;k++){ if(CLOUD[k].n==="Wheat bread"){ i=k; break; } }
    if(i<0) return;
    var g=nodes[i], d=CLOUD[i];
    g.classList.add("demo-hover");
    var box=svg.getBoundingClientRect(), scale=box.width/L.W;
    showTip(d,{clientX:box.left+fx(d.x)*scale, clientY:box.top+fy(d.y)*scale});
    setTimeout(function(){ g.classList.remove("demo-hover"); hideTip(); }, 3200);
  }

  // ---- scheduler (rAF clock) ----------------------------------------------
  var BEATS=[[0,beat1],[6000,beat2],[12500,beat3],[19500,beat4],[26500,finishRun]];
  var STEPFNS=[beat1,beat2,beat3,beat4];
  var LAST=STEPFNS.length-1;
  var rafId=null, playing=false, t0=0, idx=0, current=-1, atRest=true;
  var prevBtn=document.getElementById("prevStep"), nextBtn=document.getElementById("nextStep");

  function clearAll(){ if(rafId){ cancelAnimationFrame(rafId); rafId=null; } playing=false; }
  function updateNav(){ prevBtn.disabled=(current<=0); nextBtn.disabled=(current>=LAST); }
  function resetCanvas(){
    if(g4) g4(false);
    document.getElementById("selbox").classList.remove("show");
    document.getElementById("selDrop").classList.remove("strike");
    tableMode("hidden");
    eachFood(function(g){ cls(g,"food"); });
    mark(-1);
  }
  function tick(now){
    if(!playing){ return; }
    if(!t0){ t0=now; }
    var el=now-t0;
    while(idx<BEATS.length && el>=BEATS[idx][0]){
      BEATS[idx][1]();
      if(idx<=LAST){ current=idx; updateNav(); }
      idx++;
    }
    if(idx<BEATS.length){ rafId=requestAnimationFrame(tick); } else { playing=false; rafId=null; }
  }
  function run(){
    clearAll(); atRest=false;
    document.getElementById("replay").hidden=false; setPlayLabel("↻ Replay");
    document.getElementById("skip").hidden=false;
    resetCanvas();
    idx=0; t0=0; current=-1; playing=true; updateNav();
    rafId=requestAnimationFrame(tick);
  }
  function goTo(n){
    clearAll(); autoplayed=true; atRest=false;
    n=Math.max(0,Math.min(LAST,n));
    resetCanvas();
    for(var i=0;i<=n;i++){ STEPFNS[i](); }
    current=n;
    document.getElementById("skip").hidden=false;
    document.getElementById("replay").hidden=false; setPlayLabel("↻ Replay");
    updateNav();
  }
  function jumpToEnd(){ clearAll(); atRest=true; resetCanvas(); home(); current=LAST; mark(LAST); updateNav(); }

  function fitParent(){ try{ if(window.parent && window.parent!==window) window.parent.postMessage("story-fit","*"); }catch(e){} }
  function render(){
    layout(); applySvgSize(); drawGridAxis(); drawSel(); buildFoods(); buildTable(); buildLegend();
    if(atRest){ jumpToEnd(); }
    else if(current<0){ resetCanvas(); }
    else { resetCanvas(); for(var i=0;i<=current;i++){ STEPFNS[i](); } }
    fitParent();
  }

  document.getElementById("skip").addEventListener("click",function(){ jumpToEnd(); setPlayLabel("↻ Replay the walkthrough"); });
  document.getElementById("replay").addEventListener("click",run);
  prevBtn.addEventListener("click",function(){ goTo((current<0?0:current)-1); });
  nextBtn.addEventListener("click",function(){ goTo((current<0?-1:current)+1); });
  document.addEventListener("keydown",function(e){
    if(e.key==="ArrowLeft"){ goTo((current<0?0:current)-1); }
    else if(e.key==="ArrowRight"){ goTo((current<0?-1:current)+1); }
  });

  render();
  setCap("rest");
  setPlayLabel("▶ Play the walkthrough");
  updateNav();

  var rt=null;
  window.addEventListener("resize",function(){ if(rt) clearTimeout(rt); rt=setTimeout(render,120); });
  if("ResizeObserver" in window){ var ro=new ResizeObserver(function(){ if(rt) clearTimeout(rt); rt=setTimeout(render,120); }); ro.observe(wrap); }

  var reduced = window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches;
  var autoplayed=false;
  var embedded = !!(window.parent && window.parent !== window);
  function maybeAutoPlay(){ if(autoplayed||reduced){ return; } autoplayed=true; run(); }
  window.addEventListener("message", function(e){
    if(!e||!e.data){ return; }
    if(e.data==="play-story"){ maybeAutoPlay(); }
    else if(e.data.kind==="vph" && e.data.h){ if(Math.abs(e.data.h-parentVpH)>4){ parentVpH=e.data.h; render(); } }
  });
  if(!embedded){
    if("IntersectionObserver" in window){
      var io=new IntersectionObserver(function(entries){
        entries.forEach(function(en){ if(en.isIntersecting){ maybeAutoPlay(); } });
      }, {threshold:0.4});
      io.observe(document.getElementById("chart"));
    } else { maybeAutoPlay(); }
    document.addEventListener("visibilitychange", maybeAutoPlay);
  }
  if(reduced){ jumpToEnd(); }
})();
</script>
</body>
</html>
