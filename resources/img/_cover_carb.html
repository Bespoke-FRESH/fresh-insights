<!doctype html>
<html><head><meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,500;0,600;1,500&family=Source+Sans+3:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root{ --ink:#1a3a2a; --ink2:#2a5a3a; --paper:#fffdf8; --gold:#c8a24a; }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{width:1200px;height:675px}
  .card{
    width:1200px;height:675px;position:relative;overflow:hidden;
    background:
      radial-gradient(1200px 600px at 80% -10%, #2f6841 0%, rgba(47,104,65,0) 55%),
      linear-gradient(135deg,#15311f 0%, #1a3a2a 45%, #20402c 100%);
    color:var(--paper);font-family:"Source Sans 3",Segoe UI,sans-serif;
    padding:74px 88px;display:flex;flex-direction:column;
  }
  /* wheat/grain motif */
  .motif{position:absolute;right:-120px;bottom:-160px;width:520px;height:520px;border-radius:50%;
    background:radial-gradient(circle at 35% 35%, rgba(200,162,74,.28), rgba(200,162,74,.05) 60%, transparent 70%);}
  .tag{display:inline-flex;align-self:flex-start;gap:.5ch;align-items:center;
    border:1.5px solid var(--gold);color:var(--gold);border-radius:999px;
    padding:7px 18px;font-weight:600;font-size:21px;letter-spacing:.04em;text-transform:uppercase}
  .year{margin-left:auto;color:#bcd2c2;font-weight:600;font-size:22px;letter-spacing:.05em}
  .toprow{display:flex;align-items:center;width:100%}
  h1{font-family:"Lora",Georgia,serif;font-weight:600;font-size:56px;line-height:1.18;
    margin-top:auto;max-width:980px;text-wrap:balance}
  .authors{font-family:"Lora",Georgia,serif;font-style:italic;font-size:26px;color:#cfe0d4;margin-top:26px}
  .journal{margin-top:8px;font-size:23px;color:#9fb6a6}
  .rule{height:4px;width:96px;background:var(--gold);border-radius:3px;margin-top:34px}
</style></head>
<body><div class="card">
  <div class="motif"></div>
  <div class="toprow">
    <span class="tag">Communication</span>
    <span class="year">2026</span>
  </div>
  <h1>Educational gaps and communication priorities for the healthfulness of carbohydrate foods</h1>
  <div class="rule"></div>
  <div class="authors">Erndt-Marino J, Ghirardelli A</div>
  <div class="journal">Journal of the American Nutrition Association · 2026</div>
</div></body></html>
