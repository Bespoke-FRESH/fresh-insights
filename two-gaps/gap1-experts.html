<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="icon" href="data:,">
<title>Gap 1 — do the experts even agree?</title>
<style>
  :root{ --ink:#1a3a2a; --ink-soft:#2a5a3a; --muted:#5e6c5e; --muted-soft:#9aaa9a;
    --paper:#fffdf8; --cream:#fbf3e0; --line:#eee8df;
    --green:#2f7d54; --gold:#c69a3a; --meta:#7a5ea8;
    --healthy:#3f7d52; --unhealthy:#b4532f; --neutral:#8a8f8a; --uncertain:#b8bcc0; --uncertain-ink:#7c8186; }
  *{box-sizing:border-box}
  html,body{margin:0;background:var(--paper);color:var(--ink);font-family:"Source Sans 3","Segoe UI",system-ui,sans-serif;}
  .wrap{max-width:880px;margin:0 auto;padding:8px 10px 12px;}
  .narrator{font-family:"Lora",Georgia,serif;font-weight:600;font-size:clamp(16px,2.1vw,21px);line-height:1.32;min-height:3.0em;margin:.1rem 0 .2rem;text-wrap:balance;max-width:42em;}
  .narrator b{color:var(--ink)} .narrator .g{color:var(--gold);font-weight:800} .narrator .pur{color:var(--meta);font-weight:800}
  svg{display:block;margin:0 auto;touch-action:manipulation;}
  .scene{opacity:0;transition:opacity .5s ease;} .scene.on{opacity:1;}
  .it{opacity:0;transition:opacity .5s ease;} .it.on{opacity:1;}
  .controls{display:flex;gap:12px;align-items:center;margin-top:8px;min-height:24px;}
  .btn{background:none;border:none;color:var(--ink-soft);font:inherit;font-size:.85rem;font-weight:600;cursor:pointer;padding:6px 4px;}
  .btn:hover{color:var(--ink);text-decoration:underline}.btn[hidden]{display:none}
  .navbtn{background:#fff;border:1.5px solid var(--line);color:var(--ink-soft);border-radius:8px;width:34px;height:32px;font-size:.85rem;font-weight:700;cursor:pointer;line-height:1;padding:0}
  .navbtn:hover:not(:disabled){border-color:var(--muted-soft);color:var(--ink)}.navbtn:disabled{opacity:.3;cursor:default}
  .btn:focus-visible,.navbtn:focus-visible,#replay:focus-visible{outline:2.5px solid var(--gold);outline-offset:2px;border-radius:6px}
  #replay{background:var(--ink);color:var(--paper);border-radius:999px;padding:8px 18px;font-weight:600;font-size:.92rem}
  #replay:hover{background:var(--ink-soft);color:var(--paper);text-decoration:none}
  .progress{display:flex;gap:6px;margin-left:auto}.dot{width:7px;height:7px;border-radius:50%;background:var(--line)}.dot.on{background:var(--gold)}
  .vh{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0 0 0 0);white-space:nowrap;border:0}
</style>
</head>
<body>
<div class="wrap">
  <div id="narrator" class="narrator"></div>
  <svg id="stage" viewBox="0 0 960 560" role="img" aria-label="Gap one: do the experts even agree on what's healthy? Five expert rating systems score whole-wheat bread from 12 to 99 on a health-percentile scale, so the pooled meta-NPS score is uncertain. Across twenty carbohydrate foods grouped by type, fifteen come back uncertain.">
    <defs>
      <symbol id="ic-user" viewBox="0 0 96 96"><g fill="currentColor"><circle cx="48" cy="30" r="16"/><path d="M80 82 80 66C80 63.6 78.8 61.2 76.8 59.6 72.4 56 66.8 53.6 61.2 52 57.2 50.8 52.8 50 48 50 43.6 50 39.2 50.8 34.8 52 29.2 53.6 23.6 56.4 19.2 59.6 17.2 61.2 16 63.6 16 66L16 82 80 82Z"/></g></symbol>
      <symbol id="ic-question" viewBox="0 0 96 96"><g fill="currentColor"><path d="M77 30C76.2 30 75.5 30.1 74.7 30.3 74.9 29.6 75 28.8 75 28 75 22.5 70.5 18 65 18 62.7 18 60.5 18.8 58.8 20.1 58 15.5 53.9 12 49 12 44.4 12 40.5 15.2 39.3 19.5 37.5 16.8 34.5 15 31 15 25.5 15 21 19.5 21 25 21 25.8 21.1 26.5 21.3 27.3 20.5 27.1 19.8 27 19 27 13.5 27 9 31.5 9 37 9 42.5 13.5 47 19 47 19 47 19 47 19.1 47 19.6 52.1 23.9 56 29 56 31.3 56 33.4 55.2 35.1 53.9 35.1 54.2 35 54.6 35 55 35 60.5 39.5 65 45 65 50.2 65 54.5 61 55 55.9 56.8 58.4 59.7 60 63 60 68.5 60 73 55.5 73 50 73 49.7 73 49.4 73 49.1 74.2 49.6 75.6 50 77 50 82.5 50 87 45.5 87 40 87 34.5 82.5 30 77 30Z"/><circle cx="29" cy="69" r="6"/><circle cx="17" cy="79.5" r="4.5"/></g></symbol>
      <symbol id="ic-expert" viewBox="0 0 96 96"><g fill="currentColor"><circle cx="24" cy="30.8" r="9"/><circle cx="72" cy="30.8" r="9"/><path d="M66 74.2 66 65.2C66 63.8 65.4 62.4 64.2 61.6 61.8 59.6 58.6 58.2 55.4 57.4 53.2 56.8 50.6 56.2 48 56.2 45.6 56.2 43 56.6 40.6 57.4 37.4 58.2 34.4 59.8 31.8 61.6 30.6 62.6 30 63.8 30 65.2L30 74.2 66 74.2Z"/><circle cx="48" cy="44.8" r="9"/><path d="M88.2 47.6C85.8 45.6 82.6 44.2 79.4 43.4 77.2 42.8 74.6 42.2 72 42.2 69.6 42.2 67 42.6 64.6 43.4 63.4 43.8 62.2 44.2 61 44.8L61 45C61 48.4 59.6 51.6 57.4 53.8 61.2 55 64.2 56.6 66.6 58.4 67.2 59 67.8 59.4 68.2 60.2L90 60.2 90 51.2C90 49.8 89.4 48.4 88.2 47.6Z"/><path d="M29.4 58.4 29.4 58.4C32.2 56.4 35.4 54.8 38.6 53.8 36.4 51.4 35 48.4 35 45 35 44.8 35 44.8 35 44.6 33.8 44.2 32.6 43.6 31.4 43.4 29.2 42.8 26.6 42.2 24 42.2 21.6 42.2 19 42.6 16.6 43.4 13.4 44.4 10.4 45.8 7.8 47.6 6.6 48.4 6 49.8 6 51.2L6 60.2 27.6 60.2C28.2 59.4 28.6 59 29.4 58.4Z"/></g></symbol>
      <symbol id="ic-uncertain" viewBox="0 0 96 96"><path fill="currentColor" d="M48 10C27 10 10 27 10 48 10 69 27 86 48 86 69 86 86 69 86 48 86 27 69 10 48 10ZM48 76C45.2 76 43 73.8 43 71 43 68.2 45.2 66 48 66 50.8 66 53 68.2 53 71 53 73.8 50.8 76 48 76ZM51 52.8C51 55.4 51 62 51 62L45 62 45 47 48 47C54.7 47 59 43.1 59 37 59 30.7 54.3 26 48 26 41.1 26 37 30.1 37 37L31 37C31 26.8 37.8 20 48 20 57.5 20 65 27.5 65 37 65 45.5 59.4 51.6 51 52.8Z"/></symbol>
    </defs>

    <!-- SCENE 1: query -->
    <g class="scene" id="s1">
      <use href="#ic-user" x="250" y="250" width="150" height="150" style="color:var(--ink)"/>
      <use href="#ic-question" x="380" y="150" width="150" height="150" style="color:var(--gold)"/>
      <text x="480" y="120" text-anchor="middle" font-family="Lora,Georgia,serif" font-size="40" font-weight="700" fill="var(--ink)">Is whole-wheat bread healthy?</text>
      <text x="560" y="430" text-anchor="middle" font-size="24" fill="var(--muted)">a fair question to ask</text>
    </g>

    <!-- SCENE 2: ask the experts -->
    <g class="scene" id="s2">
      <text x="480" y="120" text-anchor="middle" font-family="Lora,Georgia,serif" font-size="34" font-weight="700" fill="var(--ink)">We ask five expert rating systems.</text>
      <use href="#ic-expert" x="380" y="210" width="200" height="200" style="color:var(--green)"/>
      <text x="480" y="450" text-anchor="middle" font-size="22" fill="var(--muted)">NRF&nbsp;4:3:3 · NRF&nbsp;9f.3 · Food&nbsp;Compass · Food&nbsp;Processing · Nutri-score</text>
    </g>

    <!-- SCENE 3: the chart (axis + progressive reveal) -->
    <g class="scene" id="s3">
      <g id="axis"></g>
      <g id="foods"></g>
      <g id="anno"></g>
    </g>
  </svg>
  <div class="vh" id="datatable"></div>
  <div class="controls">
    <button id="prevStep" class="navbtn" aria-label="Previous step" title="Previous (←)">◀</button>
    <button id="nextStep" class="navbtn" aria-label="Next step" title="Next (→)">▶</button>
    <button id="skip" class="btn">Skip ▸</button>
    <button id="replay" class="btn" hidden>▶ Play the walkthrough</button>
    <div class="progress" id="progress"></div>
  </div>
  <div aria-live="polite" id="live" style="position:absolute;left:-9999px"></div>
</div>
<script>
(function(){
  "use strict";
  var NS="http://www.w3.org/2000/svg";
  function el(t,a,tx){ var e=document.createElementNS(NS,t); for(var k in a) e.setAttribute(k,a[k]); if(tx!=null) e.textContent=tx; return e; }

  // five expert percentiles per food (sorted), grouped; cls = meta-NPS verdict
  var GROUPS=[
    {grp:"Grains", foods:[
      {n:"Whole-wheat bread",s:[12,69,74,93,99],cls:"u"},
      {n:"Honey-oat cereal",s:[5,24,86,90,96],cls:"u"},
      {n:"Corn tortilla",s:[35,50,68,73,98],cls:"u"},
      {n:"White rice",s:[23,25,30,63,95],cls:"u"},
      {n:"White bread",s:[3,8,29,49,72],cls:"u"},
      {n:"Pasta",s:[42,43,47,89,91],cls:"u"},
      {n:"Fried rice",s:[24,25,28,55,93],cls:"u"},
      {n:"Granola bar",s:[28,42,50,72,83],cls:"u"}]},
    {grp:"Beverages", foods:[
      {n:"100% juice",s:[34,69,80,92,100],cls:"u"},
      {n:"Vitamin-C juice",s:[3,31,34,52,72],cls:"u"},
      {n:"Soy milk",s:[26,67,81,87,89],cls:"u"},
      {n:"Smoothie",s:[36,70,76,85,87],cls:"u"},
      {n:"Cola",s:[1,2,5,7,36],cls:"x"}]},
    {grp:"Fruits & veg", foods:[
      {n:"French fries",s:[34,47,49,62,72],cls:"t"},
      {n:"Baked potato",s:[69,76,84,87,93],cls:"h"},
      {n:"Apple",s:[88,93,96,98,100],cls:"h"}]},
    {grp:"Snacks", foods:[
      {n:"Honey",s:[1,1,20,31,84],cls:"u"},
      {n:"Potato chips",s:[17,31,43,55,75],cls:"u"},
      {n:"Popcorn, plain",s:[78,90,94,97,100],cls:"h"},
      {n:"Popcorn, butter",s:[4,7,20,48,98],cls:"u"}]}
  ];
  var CLS={u:{f:"var(--uncertain)",s:"var(--uncertain-ink)",lab:"Uncertain"},h:{f:"#bfe0cb",s:"var(--healthy)",lab:"Healthy"},
           t:{f:"#cbd8e3",s:"#5f7d9c",lab:"Neutral"},x:{f:"#e8c4b6",s:"var(--unhealthy)",lab:"Unhealthy"}};

  var svg=document.getElementById("stage"), axisG=document.getElementById("axis"), foodsG=document.getElementById("foods"), annoG=document.getElementById("anno");
  var narrator=document.getElementById("narrator"), live=document.getElementById("live"), progress=document.getElementById("progress");
  var s1=document.getElementById("s1"), s2=document.getElementById("s2"), s3=document.getElementById("s3");

  // layout: vertical health-percentile axis; foods along x in 4 clusters
  var X0=150, X1=905, TOP=78, BOT=470, SLOT=34, GAPG=18;
  function yP(p){ return BOT - (p/100)*(BOT-TOP); }
  // assign each food an x; record group label spans
  var flat=[], groupSpans=[]; (function(){ var x=X0+SLOT/2;
    GROUPS.forEach(function(G,gi){ var x0=x;
      G.foods.forEach(function(f){ f.x=x; f.grp=G.grp; f.gi=gi; flat.push(f); x+=SLOT; });
      groupSpans.push({grp:G.grp,gi:gi,x0:x0-SLOT/2,x1:x-SLOT/2}); x+=GAPG;
    }); })();

  function drawAxis(){
    axisG.innerHTML="";
    axisG.appendChild(el("text",{x:130,y:64,"text-anchor":"middle","font-size":"20","font-weight":"800",fill:"var(--healthy)"},"Healthy ▲"));
    axisG.appendChild(el("text",{x:130,y:500,"text-anchor":"middle","font-size":"20","font-weight":"800",fill:"var(--unhealthy)"},"Unhealthy ▼"));
    axisG.appendChild(el("line",{x1:130,y1:TOP,x2:130,y2:BOT,stroke:"var(--ink)","stroke-width":2.4}));
    [0,25,50,75,100].forEach(function(p){ axisG.appendChild(el("line",{x1:126,y1:yP(p),x2:130,y2:yP(p),stroke:"var(--ink)","stroke-width":2}));
      axisG.appendChild(el("text",{x:120,y:yP(p)+5,"text-anchor":"end","font-size":"14",fill:"var(--muted)"},p)); });
    var t=el("text",{transform:"translate(96,"+((TOP+BOT)/2)+") rotate(-90)","text-anchor":"middle","font-size":"15","font-weight":"700",fill:"var(--muted)"},"health percentile"); axisG.appendChild(t);
    axisG.appendChild(el("line",{x1:130,y1:BOT,x2:X1,y2:BOT,stroke:"var(--ink)","stroke-width":2.4}));
  }

  // draw one food's vertical boxplot into a <g class="it"> (hidden until its beat)
  function drawFood(f){
    var g=el("g",{"class":"it"}), c=CLS[f.cls], lo=f.s[0],q1=f.s[1],md=f.s[2],q3=f.s[3],hi=f.s[4], bw=15;
    g.appendChild(el("line",{x1:f.x,y1:yP(lo),x2:f.x,y2:yP(hi),stroke:c.s,"stroke-width":1.4,"stroke-opacity":.7})); // whisker
    g.appendChild(el("rect",{x:f.x-bw/2,y:yP(q3),width:bw,height:Math.max(2,yP(q1)-yP(q3)),fill:c.f,stroke:c.s,"stroke-width":1.6,rx:2})); // IQR
    f.s.forEach(function(v){ g.appendChild(el("circle",{cx:f.x,cy:yP(v),r:2.6,fill:"#33403a","fill-opacity":.85})); });
    g.appendChild(el("line",{x1:f.x-bw/2,y1:yP(md),x2:f.x+bw/2,y2:yP(md),stroke:"#1a2a20","stroke-width":2.2})); // median
    f.__g=g; foodsG.appendChild(g);
  }
  function drawGroupLabels(){
    groupSpans.forEach(function(G){ var cx=(G.x0+G.x1)/2;
      var t=el("text",{"class":"it","data-gl":G.gi,x:cx,y:BOT+22,"text-anchor":"middle","font-size":"14","font-weight":"700",fill:"var(--muted)"},G.grp); foodsG.appendChild(t); G.__lab=t; });
  }

  function buildChart(){ drawAxis(); foodsG.innerHTML=""; annoG.innerHTML=""; flat.forEach(drawFood); drawGroupLabels(); buildAnno(); }

  var ww=flat[0]; // whole-wheat bread
  function buildAnno(){
    annoG.innerHTML="";
    // meta-score band on WW bread (purple, at median)
    var ms=el("g",{"class":"it",id:"ms"}); var md=ww.s[2];
    ms.appendChild(el("rect",{x:ww.x-16,y:yP(md)-4,width:32,height:8,rx:2,fill:"var(--meta)","fill-opacity":.85}));
    ms.appendChild(el("text",{x:ww.x+26,y:yP(md)+5,"text-anchor":"start","font-size":"15","font-weight":"800",fill:"var(--meta)"},"meta-score"));
    annoG.appendChild(ms); annoG.__ms=ms;
    // stability bracket (orange) spanning the range
    var st=el("g",{"class":"it",id:"st"}); var bx=ww.x+24;
    st.appendChild(el("line",{x1:bx,y1:yP(ww.s[0]),x2:bx,y2:yP(ww.s[4]),stroke:"var(--gold)","stroke-width":2.4}));
    st.appendChild(el("line",{x1:bx-5,y1:yP(ww.s[0]),x2:bx+5,y2:yP(ww.s[0]),stroke:"var(--gold)","stroke-width":2.4}));
    st.appendChild(el("line",{x1:bx-5,y1:yP(ww.s[4]),x2:bx+5,y2:yP(ww.s[4]),stroke:"var(--gold)","stroke-width":2.4}));
    st.appendChild(el("text",{x:bx+10,y:(yP(ww.s[0])+yP(ww.s[4]))/2,"font-size":"15","font-weight":"800",fill:"var(--gold)"},"wide range ="));
    st.appendChild(el("text",{x:bx+10,y:(yP(ww.s[0])+yP(ww.s[4]))/2+18,"font-size":"15","font-weight":"800",fill:"var(--gold)"},"low consensus"));
    annoG.appendChild(st); annoG.__st=st;
    // uncertain mark + label above WW bread
    var un=el("g",{"class":"it",id:"un"});
    un.appendChild(el("use",{href:"#ic-uncertain",x:ww.x-18,y:34,width:36,height:36,style:"color:var(--uncertain-ink)"}));
    un.appendChild(el("text",{x:ww.x,y:24,"text-anchor":"middle","font-size":"16","font-weight":"800",fill:"var(--uncertain-ink)"},"Uncertain"));
    annoG.appendChild(un); annoG.__un=un;
    // count callout
    var ct=el("text",{"class":"it",id:"ct",x:(X0+X1)/2,y:524,"text-anchor":"middle","font-family":"Lora,Georgia,serif","font-size":"26","font-weight":"800",fill:"var(--ink)"});
    ct.innerHTML='<tspan fill="var(--gold)" font-size="32">15 of 20</tspan> come back uncertain';
    annoG.appendChild(ct); annoG.__ct=ct;
  }

  function on(node,v){ if(node) node.classList.toggle("on",!!v); }
  function showFoods(pred){ flat.forEach(function(f){ on(f.__g, pred(f)); }); }
  function showGroupLabels(maxGi){ groupSpans.forEach(function(G){ on(G.__lab, G.gi<=maxGi); }); }
  function colorMode(realColors){ flat.forEach(function(f){ var c=CLS[f.cls];
      var rect=f.__g.querySelector("rect"), wk=f.__g.querySelectorAll("line")[0];
      if(realColors){ rect.setAttribute("fill",c.f); rect.setAttribute("stroke",c.s); wk.setAttribute("stroke",c.s); }
      else { rect.setAttribute("fill","var(--uncertain)"); rect.setAttribute("stroke","var(--uncertain-ink)"); wk.setAttribute("stroke","var(--uncertain-ink)"); }
    }); }

  // ---- beats ----
  var CAP=[
    {t:"It starts with a fair question: <b>is whole-wheat bread healthy?</b>", l:"Is whole-wheat bread healthy?"},
    {t:"So we ask <b>five expert rating systems</b> — the tools that decide what counts as healthy.", l:"We ask five expert rating systems."},
    {t:"First, the scale they score on: a <b>health percentile</b>, from <b>unhealthy</b> at the bottom to <b>healthy</b> at the top.", l:"The scale is a health percentile, unhealthy at the bottom to healthy at the top."},
    {t:"Each system rates whole-wheat bread. Their five scores land <b>far apart</b> — from 12 to 99.", l:"The five systems rate whole-wheat bread from 12 to 99, far apart."},
    {t:"Pool them and the middle is the <b class='pur'>meta-NPS score</b> — the single harmonized rating.", l:"The pooled middle is the meta-NPS score."},
    {t:"But the <b class='g'>range is wide</b>: low consensus. The verdict for whole-wheat bread is <b>uncertain</b>.", l:"The range is wide, low consensus, so whole-wheat bread is uncertain."},
    {t:"Whole-wheat bread is a <b>grain</b>. Its neighbours scatter just as much.", l:"Whole-wheat bread sits among the grains, which scatter just as much."},
    {t:"Add the <b>beverages</b> — same picture: tall, scattered boxes.", l:"Beverages scatter the same way."},
    {t:"And the <b>fruits, vegetables and snacks</b>. A few are tight; most are not.", l:"Fruits, vegetables and snacks: a few tight, most not."},
    {t:"Colour the verdicts and the pattern is clear: <b class='g'>15 of 20</b> carb foods are <b>uncertain</b> even among experts.", l:"15 of 20 carb foods are uncertain even among the experts."}
  ];
  var LAST=CAP.length-1;
  CAP.forEach(function(){ var d=document.createElement("div"); d.className="dot"; progress.appendChild(d); });
  function mark(i){ var d=progress.children; for(var k=0;k<d.length;k++) d[k].className="dot"+(k<=i?" on":""); }

  function render(i){
    narrator.innerHTML=CAP[i].t; live.textContent=CAP[i].l; mark(i);
    on(s1,i===0); on(s2,i===1); on(s3,i>=2);
    if(i<2) return;
    // chart sub-states
    showGroupLabels(i>=6 ? (i>=8?3:(i>=7?1:0)) : -1);
    if(i===2){ showFoods(function(){return false;}); on(annoG.__ms,0);on(annoG.__st,0);on(annoG.__un,0);on(annoG.__ct,0); colorMode(false); }
    else if(i===3){ showFoods(function(f){return f===ww;}); on(annoG.__ms,0);on(annoG.__st,0);on(annoG.__un,0);on(annoG.__ct,0); colorMode(false); }
    else if(i===4){ showFoods(function(f){return f===ww;}); on(annoG.__ms,1);on(annoG.__st,0);on(annoG.__un,0);on(annoG.__ct,0); colorMode(false); }
    else if(i===5){ showFoods(function(f){return f===ww;}); on(annoG.__ms,1);on(annoG.__st,1);on(annoG.__un,1);on(annoG.__ct,0); colorMode(false); }
    else if(i===6){ showFoods(function(f){return f.gi===0;}); on(annoG.__ms,0);on(annoG.__st,0);on(annoG.__un,0);on(annoG.__ct,0); colorMode(false); }
    else if(i===7){ showFoods(function(f){return f.gi<=1;}); colorMode(false); on(annoG.__ct,0); }
    else if(i===8){ showFoods(function(f){return true;}); colorMode(false); on(annoG.__ct,0); }
    else if(i===9){ showFoods(function(){return true;}); colorMode(true); showGroupLabels(3); on(annoG.__ct,1); }
  }

  var current=-1, atRest=true, playing=false, rafId=null, t0=0, idx=0;
  var BEATS=[0,4500,9000,13500,18000,22500,27000,31000,35000,39000];
  var prevBtn=document.getElementById("prevStep"), nextBtn=document.getElementById("nextStep"),
      skipBtn=document.getElementById("skip"), replayBtn=document.getElementById("replay");
  function clearAll(){ if(rafId){cancelAnimationFrame(rafId);rafId=null;} playing=false; }
  function updateNav(){ prevBtn.disabled=(current<=0); nextBtn.disabled=(current>=LAST); }
  function setPlayLabel(t){ replayBtn.innerHTML=t; }
  function go(i){ current=Math.max(0,Math.min(LAST,i)); render(current); updateNav(); }
  function tick(now){ if(!playing) return; if(!t0) t0=now; var e=now-t0;
    while(idx<=LAST && e>=BEATS[idx]){ go(idx); idx++; }
    if(idx<=LAST){ rafId=requestAnimationFrame(tick); }
    else if(e>=BEATS[LAST]+5000){ finishRun(); } else { rafId=requestAnimationFrame(tick); } }
  function run(){ clearAll(); atRest=false; replayBtn.hidden=false; setPlayLabel("↻ Replay"); skipBtn.hidden=false; current=-1; idx=0; t0=0; playing=true; updateNav(); rafId=requestAnimationFrame(tick); }
  function step(n){ clearAll(); autoplayed=true; atRest=false; skipBtn.hidden=false; replayBtn.hidden=false; setPlayLabel("↻ Replay"); go(n); }
  function home(){ atRest=true; go(LAST); skipBtn.hidden=true; replayBtn.hidden=false; }
  function finishRun(){ clearAll(); home(); setPlayLabel("↻ Replay the walkthrough"); }
  function fitParent(){ try{ if(window.parent && window.parent!==window) window.parent.postMessage("story-fit","*"); }catch(e){} }

  skipBtn.addEventListener("click",function(){ clearAll(); home(); setPlayLabel("↻ Replay the walkthrough"); });
  replayBtn.addEventListener("click",run);
  prevBtn.addEventListener("click",function(){ step((current<0?0:current)-1); });
  nextBtn.addEventListener("click",function(){ step((current<0?0:current)+1); });
  document.addEventListener("keydown",function(e){ if(e.key==="ArrowLeft") step((current<0?0:current)-1); else if(e.key==="ArrowRight") step((current<0?0:current)+1); });

  (function buildTable(){
    var h="<table><caption>Expert ratings of 20 carbohydrate foods on a 0-100 health percentile, grouped by food type. Five expert systems per food; a wide range means low consensus (uncertain).</caption><thead><tr><th>Food</th><th>Group</th><th>Verdict</th><th>Five scores</th></tr></thead><tbody>";
    flat.forEach(function(f){ h+="<tr><td>"+f.n+"</td><td>"+f.grp+"</td><td>"+CLS[f.cls].lab+"</td><td>"+f.s.join(", ")+"</td></tr>"; });
    h+="</tbody></table>"; document.getElementById("datatable").innerHTML=h;
  })();

  buildChart();
  var params=new URLSearchParams(location.search), forced=params.get("beat");
  setPlayLabel("▶ Play the walkthrough");
  if(forced){ var b=Math.max(1,Math.min(LAST+1,parseInt(forced,10)))-1; clearAll(); atRest=false; go(b); skipBtn.hidden=false; }
  else { home(); }
  updateNav(); fitParent(); setTimeout(fitParent,400);

  var reduced=window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches;
  var autoplayed=!!forced, embedded=!!(window.parent && window.parent!==window);
  function maybeAutoPlay(){ if(autoplayed||reduced) return; autoplayed=true; run(); }
  window.addEventListener("message",function(e){ if(!e||!e.data) return; if(e.data==="play-story") maybeAutoPlay(); });
  if(!embedded){ if("IntersectionObserver" in window){ new IntersectionObserver(function(es){ es.forEach(function(en){ if(en.isIntersecting) maybeAutoPlay(); }); },{threshold:0.4}).observe(svg); } else maybeAutoPlay(); }
  if(reduced){ home(); }
})();
</script>
</body>
</html>
