<style>
  :root{ --ink:#1a3a2a; --ink-soft:#2a5a3a; --muted:#5e6c5e; --muted-soft:#9aaa9a;

    --green:#2f7d54; --gold:#c69a3a; --meta:#7a5ea8;
    --healthy:#3f7d52; --unhealthy:#b4532f; --neutral:#6f756f; --uncertain:#aab2b8; --uncertain-ink:#5a6470;
    --iqr:#9a5a16; --range:#4a6480; }
  *{box-sizing:border-box}
  html,body{margin:0;background:var(--paper);color:var(--ink);font-family:"Source Sans 3","Segoe UI",system-ui,sans-serif;}
  .wrap{max-width:880px;margin:0 auto;padding:8px 10px 12px;}
  .narrator{font-family:"Lora",Georgia,serif;font-weight:600;font-size:clamp(16px,2.1vw,21px);line-height:1.32;min-height:3.0em;margin:.1rem 0 .2rem;text-wrap:balance;max-width:42em;}
  .narrator b{color:var(--ink)} .narrator .g{color:var(--gold);font-weight:800} .narrator .pur{color:var(--meta);font-weight:800}
  .narrator .or{color:var(--iqr);font-weight:800} .narrator .bl{color:var(--range);font-weight:800} .narrator .un{color:#6f7e88;font-weight:800}
  svg{display:block;margin:0 auto;touch-action:manipulation;}
  .scene{opacity:0;transition:opacity .55s ease;} .scene.on{opacity:1;}
  .it{opacity:0;transition:opacity .5s ease;} .it.on{opacity:1;}
  .controls{display:flex;gap:12px;align-items:center;margin-top:8px;min-height:24px;}
  .btn{background:none;border:none;color:var(--ink-soft);font:inherit;font-size:.85rem;font-weight:600;cursor:pointer;padding:6px 4px;}
  .btn:hover{color:var(--ink);text-decoration:underline}.btn[hidden]{display:none}
  .navbtn{background:#fff;border:1.5px solid var(--line);color:var(--ink-soft);border-radius:8px;width:34px;height:32px;font-size:.85rem;font-weight:700;cursor:pointer;line-height:1;padding:0}
  .navbtn:hover:not(:disabled){border-color:var(--muted-soft);color:var(--ink)}.navbtn:disabled{opacity:.3;cursor:default}
  .btn:focus-visible,.navbtn:focus-visible,#replay:focus-visible{outline:2.5px solid var(--gold);outline-offset:2px;border-radius:6px}
  #replay{background:var(--ink);color:var(--paper);border-radius:999px;padding:8px 18px;font-weight:600;font-size:.92rem}
  #replay:hover{background:var(--ink-soft);color:var(--paper);text-decoration:none}
  .progress{display:flex;gap:6px;margin-left:auto}.dot{width:7px;height:7px;border-radius:50%;background:var(--line)}.dot.on{background:var(--gold)}
  .vh{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0 0 0 0);white-space:nowrap;border:0}
</style>
</head>
<body>
<div class="wrap">

  <svg id="stage" viewBox="0 0 960 580" role="img" aria-label="Gap one: do the experts even agree on what's healthy? Five expert rating systems — FPro, NRF 9.3, Food Compass, Nutri-Score and NRF 4:3:3 — score whole-wheat bread from 12 to 99 on a health-percentile scale, so the pooled meta-NPS verdict is uncertain. Across twenty carbohydrate foods grouped by type, fifteen come back uncertain; only an apple, a baked potato, plain popcorn, French fries and a cola are settled.">

    <!-- SCENE 1: the genuine meta-NPS bridge infographic (deck slide 1-2) -->

<script>
(function(){
  "use strict";
  var NS="http://www.w3.org/2000/svg";
  function el(t,a,tx){ var e=document.createElementNS(NS,t); for(var k in a) e.setAttribute(k,a[k]); if(tx!=null) e.textContent=tx; return e; }
  function on(n,v){ if(n) n.classList.toggle("on",!!v); }

  var TOP=120, BOT=470;
  function yP(p){ return BOT - (p/100)*(BOT-TOP); }
  var CLS={u:{f:"#eef1f3",s:"var(--uncertain)",lab:"Uncertain"},h:{f:"#bfe0cb",s:"var(--healthy)",lab:"Healthy"},
           // neutral fill darkened so it reads distinct from the light uncertain box (judge clip-11 fix)
           t:{f:"#c2c7c2",s:"var(--neutral)",lab:"Neutral"},x:{f:"#e8c4b6",s:"var(--unhealthy)",lab:"Unhealthy"}};

  // whole-wheat bread: five named systems -> verified scores (metaNPS_FNDDS1718_iqr_noNNPS.csv)
  var WWB=[{n:"FPro",v:12},{n:"NRF 9.3",v:69},{n:"Food Compass",v:74},{n:"Nutri-Score",v:93},{n:"NRF 4:3:3",v:99}];
  var WW={s:[12,69,74,93,99],q1:69,md:74,q3:93,lo:12,hi:99};

  function axis(g,xax){
    g.innerHTML="";
    g.appendChild(el("text",{x:xax,y:TOP-30,"text-anchor":"middle","font-size":"19","font-weight":"800",fill:"var(--healthy)"},"Healthy ▲"));
    g.appendChild(el("text",{x:xax,y:BOT+34,"text-anchor":"middle","font-size":"19","font-weight":"800",fill:"var(--unhealthy)"},"Unhealthy ▼"));
    g.appendChild(el("line",{x1:xax,y1:TOP,x2:xax,y2:BOT,stroke:"var(--ink)","stroke-width":2.4}));
    [0,25,50,75,100].forEach(function(p){ g.appendChild(el("line",{x1:xax-4,y1:yP(p),x2:xax,y2:yP(p),stroke:"var(--ink)","stroke-width":2}));
      g.appendChild(el("text",{x:xax-9,y:yP(p)+5,"text-anchor":"end","font-size":"13",fill:"var(--muted)"},p)); });
    g.appendChild(el("text",{transform:"translate("+(xax-38)+","+((TOP+BOT)/2)+") rotate(-90)","text-anchor":"middle","font-size":"14","font-weight":"700",fill:"var(--muted)"},"health percentile"));
  }

  // a vertical boxplot at cx; opts.dotsOnly hides box/median
  function boxplot(parent,cx,d,c,bw,opts){ opts=opts||{};
    var g=el("g",{});
    if(!opts.noWhisker) g.appendChild(el("line",{x1:cx,y1:yP(d.lo),x2:cx,y2:yP(d.hi),stroke:c.s,"stroke-width":1.6,"stroke-opacity":.7}));
    if(!opts.dotsOnly){ g.appendChild(el("rect",{x:cx-bw/2,y:yP(d.q3),width:bw,height:Math.max(2,yP(d.q1)-yP(d.q3)),fill:c.f,stroke:c.s,"stroke-width":1.6,rx:2}));
      g.appendChild(el("line",{x1:cx-bw/2,y1:yP(d.md),x2:cx+bw/2,y2:yP(d.md),stroke:"#1a2a20","stroke-width":2.2})); }
    parent.appendChild(g); return g;
  }
  function dots(parent,cx,arr,fill){ var g=el("g",{}); arr.forEach(function(v){ g.appendChild(el("circle",{cx:cx,cy:yP(v),r:4,fill:fill||"#33403a","fill-opacity":.9})); }); parent.appendChild(g); return g; }

  // ---------- FOCUS scene (whole-wheat bread) ----------
  var fAxis=document.getElementById("fAxis"), fBox=document.getElementById("fBox"), fAnno=document.getElementById("fAnno");
  var FX=300, FCX=410, FBW=64;
  function buildFocus(){
    axis(fAxis,FX); fBox.innerHTML=""; fAnno.innerHTML="";
    // named systems -> 1:1 dots with leaders (beat: systems)
    var gsys=el("g",{"class":"it",id:"fSys"});
    WWB.forEach(function(sy){ var dy=yP(sy.v);
      gsys.appendChild(el("circle",{cx:FCX,cy:dy,r:5,fill:"#33403a"}));
      gsys.appendChild(el("line",{x1:FCX+10,y1:dy,x2:600,y2:dy,stroke:"var(--muted-soft)","stroke-width":1.2,"stroke-dasharray":"3 3"}));
      gsys.appendChild(el("text",{x:610,y:dy+5,"font-size":"16","font-weight":"700",fill:"var(--ink)"},sy.n+" = "+sy.v));
    });
    fBox.appendChild(gsys); fBox.__sys=gsys;
    // box (IQR) + median
    var gbox=el("g",{"class":"it",id:"fIQR"});
    gbox.appendChild(el("line",{x1:FCX,y1:yP(WW.q1),x2:FCX,y2:yP(WW.q3),stroke:"transparent"}));
    gbox.appendChild(el("rect",{x:FCX-FBW/2,y:yP(WW.q3),width:FBW,height:yP(WW.q1)-yP(WW.q3),fill:"#f2dcc4",stroke:"var(--iqr)","stroke-width":2.4,rx:3}));
    gbox.appendChild(el("text",{x:FCX-FBW/2-10,y:(yP(WW.q1)+yP(WW.q3))/2-2,"text-anchor":"end","font-size":"14","font-weight":"800",fill:"var(--iqr)"},"Stability (IQR):"));
    gbox.appendChild(el("text",{x:FCX-FBW/2-10,y:(yP(WW.q1)+yP(WW.q3))/2+16,"text-anchor":"end","font-size":"14","font-weight":"700",fill:"var(--iqr)"},"middle 50%"));
    fBox.appendChild(gbox); fBox.__iqr=gbox;
    // whiskers (range overlay)
    var grng=el("g",{"class":"it",id:"fRng"}); var wx=FCX+FBW/2+26;
    grng.appendChild(el("line",{x1:wx,y1:yP(WW.lo),x2:wx,y2:yP(WW.hi),stroke:"var(--range)","stroke-width":3}));
    grng.appendChild(el("line",{x1:wx-9,y1:yP(WW.lo),x2:wx+9,y2:yP(WW.lo),stroke:"var(--range)","stroke-width":3}));
    grng.appendChild(el("line",{x1:wx-9,y1:yP(WW.hi),x2:wx+9,y2:yP(WW.hi),stroke:"var(--range)","stroke-width":3}));
    grng.appendChild(el("text",{x:wx+14,y:yP(WW.hi)+4,"font-size":"14","font-weight":"800",fill:"var(--range)"},"Stability (range):"));
    grng.appendChild(el("text",{x:wx+14,y:yP(WW.hi)+22,"font-size":"14","font-weight":"700",fill:"var(--range)"},"full spread 12–99"));
    fBox.appendChild(grng); fBox.__rng=grng;
    // median = meta-score (purple)
    var gmeta=el("g",{"class":"it",id:"fMeta"});
    gmeta.appendChild(el("rect",{x:FCX-FBW/2-3,y:yP(WW.md)-4,width:FBW+6,height:8,rx:2,fill:"var(--meta)"}));
    gmeta.appendChild(el("text",{x:FCX-FBW/2-10,y:yP(WW.md)+5,"text-anchor":"end","font-size":"15","font-weight":"800",fill:"var(--meta)",id:"fMetaLab"},"meta-NPS"));
    fBox.appendChild(gmeta); fBox.__meta=gmeta;
    // uncertain verdict
    var gun=el("g",{"class":"it",id:"fUn"});
    gun.appendChild(el("image",{href:"img/shrug.png",x:660,y:300,width:120,height:120}));
    gun.appendChild(el("text",{x:720,y:300,"text-anchor":"middle","font-family":"Lora,Georgia,serif","font-size":"28","font-weight":"800",fill:"var(--uncertain-ink)"},"Uncertain."));
    fAnno.appendChild(gun); fAnno.__un=gun;
    // title chip
    var gt=el("g",{"class":"it on",id:"fTitle"});
    gt.appendChild(el("image",{href:"img/bread.png",x:FX+6,y:46,width:46,height:46}));
    gt.appendChild(el("text",{x:FX+58,y:76,"font-size":"19","font-weight":"800",fill:"var(--ink)"},"Whole-wheat bread"));
    fAnno.appendChild(gt);
  }
  function focusState(systems,meta,iqr,rng,un){ on(fBox.__sys,systems); on(fBox.__meta,meta); on(fBox.__iqr,iqr); on(fBox.__rng,rng); on(fAnno.__un,un); }

  // ---------- ALL scene (20 foods grouped) ----------
  var aAxis=document.getElementById("aAxis"), aFoods=document.getElementById("aFoods"), aAnno=document.getElementById("aAnno");
  var GROUPS=[
    {grp:"Grains", foods:[["Whole-wheat bread",[12,69,74,93,99],"u"],["Honey-oat cereal",[5,24,86,90,96],"u"],["Corn tortilla",[35,50,68,73,98],"u"],["White rice",[23,25,30,63,95],"u"],["White bread",[3,8,29,49,72],"u"],["Pasta",[42,43,47,89,91],"u"],["Fried rice",[24,25,28,55,93],"u"],["Granola bar",[28,42,50,72,83],"u"]]},
    {grp:"Beverages", foods:[["100% juice",[34,69,80,92,100],"u"],["Vitamin-C juice",[3,31,34,52,72],"u"],["Soy milk",[26,67,81,87,89],"u"],["Smoothie",[36,70,76,85,87],"u"],["Cola",[1,2,5,7,36],"x"]]},
    {grp:"Fruits & veg", foods:[["French fries",[34,47,49,62,72],"t"],["Baked potato",[69,76,84,87,93],"h"],["Apple",[88,93,96,98,100],"h"]]},
    {grp:"Snacks", foods:[["Honey",[1,1,20,31,84],"u"],["Potato chips",[17,31,43,55,75],"u"],["Popcorn, plain",[78,90,94,97,100],"h"],["Popcorn, butter",[4,7,20,48,98],"u"]]}
  ];
  var AX=132, AX1=908, ASLOT=33, AGAP=20;
  var flat=[], gspans=[];
  (function(){ var x=AX+24; GROUPS.forEach(function(G,gi){ var x0=x; G.foods.forEach(function(fr){ var s=fr[1];
      flat.push({n:fr[0],s:s,cls:fr[2],grp:G.grp,gi:gi,x:x,d:{s:s,q1:s[1],md:s[2],q3:s[3],lo:s[0],hi:s[4]}}); x+=ASLOT; });
    gspans.push({grp:G.grp,gi:gi,x0:x0,x1:x-ASLOT,cx:(x0+x-ASLOT)/2}); x+=AGAP; }); })();
  function buildAll(){
    axis(aAxis,AX); aFoods.innerHTML=""; aAnno.innerHTML="";
    gspans.forEach(function(G){ // cluster name on top (Figure 2 style)
      var t=el("text",{"class":"it",x:G.cx,y:TOP-30,"text-anchor":"middle","font-size":"14","font-weight":"800",fill:"var(--ink-soft)"},G.grp); aFoods.appendChild(t); G.__lab=t; });
    flat.forEach(function(f){ var g=el("g",{}), c=CLS[f.cls];
      f.__box=boxplot(g,f.x,f.d,CLS.u,13); // start as uncertain (deck default)
      f.__rect=f.__box.querySelector("rect"); f.__wk=f.__box.querySelector("line");
      dots(g,f.x,f.s,"#5c6660");
      var nm=el("text",{x:f.x,y:BOT+18,"text-anchor":"end","font-size":"12",fill:"var(--muted)","transform":"rotate(-40 "+f.x+" "+(BOT+18)+")"},f.n); g.appendChild(nm);
      g.setAttribute("class","it"); f.__g=g; aFoods.appendChild(g); });
    // priority asterisks (the 4 flagged foods) — slide 7
    var PRIO={"White rice":1,"White bread":1,"Corn tortilla":1,"Vitamin-C juice":1};
    var gp=el("g",{"class":"it",id:"aPrio"});
    flat.forEach(function(f){ if(PRIO[f.n]) gp.appendChild(el("text",{x:f.x,y:BOT+12,"text-anchor":"middle","font-size":"20","font-weight":"800",fill:"var(--unhealthy)"},"*")); });
    aAnno.appendChild(gp); aAnno.__prio=gp;
    // count callout (two lines, slide 7 footer)
    var ct=el("text",{"class":"it",id:"aCt",x:(AX+AX1)/2,y:548,"text-anchor":"middle","font-family":"Lora,Georgia,serif","font-size":"22","font-weight":"800",fill:"var(--ink)"});
    ct.innerHTML='<tspan>15 of 20 (75%) come back </tspan><tspan fill="var(--iqr)">uncertain</tspan>'
      +'<tspan x="'+((AX+AX1)/2)+'" dy="26" font-size="19" fill="var(--unhealthy)">★ 4 (20%) flagged as priorities</tspan>';
    aAnno.appendChild(ct); aAnno.__ct=ct;
    // verdict legend (clip-12 fix: so the colours are decodable) — top of the chart
    var leg=el("g",{"class":"it",id:"aLeg"});
    [["u","Uncertain"],["h","Healthy"],["t","Neutral"],["x","Unhealthy"]].forEach(function(d,i){ var c=CLS[d[0]], lx=300+i*155, ly=52;
      leg.appendChild(el("rect",{x:lx,y:ly-11,width:14,height:14,rx:2,fill:c.f,stroke:c.s,"stroke-width":1.6}));
      leg.appendChild(el("text",{x:lx+19,y:ly,"font-size":"14","font-weight":"700",fill:"var(--ink)"},d[1])); });
    aAnno.appendChild(leg); aAnno.__leg=leg;
  }
  function colorClass(cls){ flat.forEach(function(f){ if(f.cls===cls){ var c=CLS[cls]; f.__rect.setAttribute("fill",c.f); f.__rect.setAttribute("stroke",c.s); f.__wk.setAttribute("stroke",c.s); } }); }
  function neutralAll(){ flat.forEach(function(f){ f.__rect.setAttribute("fill",CLS.u.f); f.__rect.setAttribute("stroke",CLS.u.s); f.__wk.setAttribute("stroke",CLS.u.s); }); }
  function showAllFoods(v){ flat.forEach(function(f){ on(f.__g,v); }); gspans.forEach(function(G){ on(G.__lab,v); }); }

  // ---------- beats ----------
  var s1=document.getElementById("s1"), sF=document.getElementById("sFocus"), sA=document.getElementById("sAll");
  var narrator=document.getElementById("narrator"), live=document.getElementById("live"), progress=document.getElementById("progress");
  var CAP=[
    {t:"The <b>meta-NPS</b> is a bridge from the science to clear health information — and inside it sits a <b>panel of expert rating systems</b>.", l:"The meta-NPS bridges the science and health information, built on a panel of expert rating systems."},
    {t:"Those systems score on a <b>health percentile</b>: <b>unhealthy</b> at the bottom, <b>healthy</b> at the top.", l:"The scale is a health percentile, unhealthy at the bottom to healthy at the top."},
    {t:"Asked one at a time, each system says <b>healthy or unhealthy</b> &mdash; depending on which you trust. FPro says 12, NRF 4:3:3 says 99.", l:"Asked individually, each system says healthy or unhealthy depending on which you trust: FPro 12, NRF 4:3:3 99."},
    {t:"Pool them, and the middle becomes the <b class='pur'>meta-NPS score</b> &mdash; one harmonized rating.", l:"Pooled, the middle becomes the meta-NPS score."},
    {t:"How much do they agree? The <b class='or'>middle 50% (IQR)</b> is the first read on consensus.", l:"The middle 50 percent, the IQR, is the first read on consensus."},
    {t:"And the <b class='bl'>full range</b>, 12 to 99, is the second. Both are <b>wide</b>.", l:"The full range, 12 to 99, is the second read; both are wide."},
    {t:"So collectively the meta-NPS says: <b>likely healthy, but <span class='un'>uncertain</span></b> &mdash; the experts don&rsquo;t agree.", l:"Collectively the meta-NPS says likely healthy but uncertain; the experts do not agree."},
    {t:"Now let&rsquo;s look at <b>more foods</b> than just whole-wheat bread.", l:"Now let's look at more foods than just whole-wheat bread."},
    {t:"A few are clearly <b style='color:var(--healthy)'>healthy</b> &mdash; an apple, a baked potato, plain popcorn.", l:"A few are clearly healthy: an apple, a baked potato, plain popcorn."},
    {t:"One is clearly <b style='color:var(--unhealthy)'>unhealthy</b> &mdash; a cola.", l:"One is clearly unhealthy: a cola."},
    {t:"And one is agreed <b style='color:var(--neutral)'>middling</b> &mdash; French fries.", l:"And one is agreed middling: French fries."},
    {t:"Every other food stays <b class='un'>uncertain</b>: <b>15 of 20 (75%)</b>, with <b class='or'>4 flagged as priorities</b>.", l:"Every other food stays uncertain: 15 of 20, 75 percent, with 4 flagged as priorities."}
  ];
  var LAST=CAP.length-1;
  CAP.forEach(function(){ var d=document.createElement("div"); d.className="dot"; progress.appendChild(d); });
  function mark(i){ var d=progress.children; for(var k=0;k<d.length;k++) d[k].className="dot"+(k<=i?" on":""); }

  function render(i){
    narrator.innerHTML=CAP[i].t; live.textContent=CAP[i].l; mark(i);
    on(s1,i===0); on(sF,i>=1&&i<=6); on(sA,i>=7);
    document.getElementById("s1hi").style.opacity=(i===0?"1":"0");
    if(i>=1&&i<=6){ // focus
      focusState(i>=2, i>=3, i>=4, i>=5, i>=6);
    }
    if(i>=7){ // all foods (uncertain by default), reveal settled verdicts
      showAllFoods(true); neutralAll();
      if(i>=8) colorClass("h");
      if(i>=9) colorClass("x");
      if(i>=10) colorClass("t");
      on(aAnno.__leg, i>=8); on(aAnno.__ct, i>=11); on(aAnno.__prio, i>=11);
    }
  }

  var current=-1, atRest=true, playing=false, rafId=null, t0=0, idx=0;
  var BEATS=[0,4500,9000,13500,18000,22500,27000,31500,36000,40000,44000,48000];
  var prevBtn=document.getElementById("prevStep"), nextBtn=document.getElementById("nextStep"),
      skipBtn=document.getElementById("skip"), replayBtn=document.getElementById("replay");
  function clearAll(){ if(rafId){cancelAnimationFrame(rafId);rafId=null;} playing=false; }
  function updateNav(){ prevBtn.disabled=(current<=0); nextBtn.disabled=(current>=LAST); }
  function setPlayLabel(t){ replayBtn.innerHTML=t; }
  function go(i){ current=Math.max(0,Math.min(LAST,i)); render(current); updateNav(); }
  function tick(now){ if(!playing) return; if(!t0) t0=now; var e=now-t0;
    while(idx<=LAST && e>=BEATS[idx]){ go(idx); idx++; }
    if(idx<=LAST){ rafId=requestAnimationFrame(tick); }
    else if(e>=BEATS[LAST]+5500){ finishRun(); } else { rafId=requestAnimationFrame(tick); } }
  function run(){ clearAll(); atRest=false; replayBtn.hidden=false; setPlayLabel("↻ Replay"); skipBtn.hidden=false; current=-1; idx=0; t0=0; playing=true; updateNav(); rafId=requestAnimationFrame(tick); }
  function step(n){ clearAll(); autoplayed=true; atRest=false; skipBtn.hidden=false; replayBtn.hidden=false; setPlayLabel("↻ Replay"); go(n); }
  function home(){ atRest=true; go(LAST); skipBtn.hidden=true; replayBtn.hidden=false; }
  function finishRun(){ clearAll(); home(); setPlayLabel("↻ Replay the walkthrough"); }
  function fitParent(){ try{ if(window.parent && window.parent!==window) window.parent.postMessage("story-fit","*"); }catch(e){} }

  skipBtn.addEventListener("click",function(){ clearAll(); home(); setPlayLabel("↻ Replay the walkthrough"); });
  replayBtn.addEventListener("click",run);
  prevBtn.addEventListener("click",function(){ step((current<0?0:current)-1); });
  nextBtn.addEventListener("click",function(){ step((current<0?0:current)+1); });
  document.addEventListener("keydown",function(e){ if(e.key==="ArrowLeft") step((current<0?0:current)-1); else if(e.key==="ArrowRight") step((current<0?0:current)+1); });

  (function buildTable(){
    var h="<table><caption>Expert ratings of 20 carbohydrate foods on a 0-100 health percentile, grouped by type. Five expert systems per food (FPro, NRF 9.3, Food Compass, Nutri-Score, NRF 4:3:3); a wide range means low consensus (uncertain).</caption><thead><tr><th>Food</th><th>Group</th><th>Verdict</th><th>Five scores</th></tr></thead><tbody>";
    flat.forEach(function(f){ h+="<tr><td>"+f.n+"</td><td>"+f.grp+"</td><td>"+CLS[f.cls].lab+"</td><td>"+f.s.join(", ")+"</td></tr>"; });
    h+="</tbody></table>"; document.getElementById("datatable").innerHTML=h;
  })();

  buildFocus(); buildAll();
  var params=new URLSearchParams(location.search), forced=params.get("beat");
  setPlayLabel("▶ Play the walkthrough");
  if(forced){ var b=Math.max(1,Math.min(LAST+1,parseInt(forced,10)))-1; clearAll(); atRest=false; go(b); skipBtn.hidden=false; }
  else home();
  updateNav(); fitParent(); setTimeout(fitParent,400);

  var reduced=window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches;
  var autoplayed=!!forced, embedded=!!(window.parent && window.parent!==window);
  function maybeAutoPlay(){ if(autoplayed||reduced) return; autoplayed=true; run(); }
  window.addEventListener("message",function(e){ if(!e||!e.data) return; if(e.data==="play-story") maybeAutoPlay(); });
  if(!embedded){ if("IntersectionObserver" in window){ new IntersectionObserver(function(es){ es.forEach(function(en){ if(en.isIntersecting) maybeAutoPlay(); }); },{threshold:0.4}).observe(document.getElementById("stage")); } else maybeAutoPlay(); }
  if(reduced) home();
})();
</script>
</body>
</html>
