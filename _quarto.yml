project:
  type: website
  output-dir: _site
  render:
    - "*.qmd"
  resources:
    - CNAME
    - favicon.png
    - favicon-mark.ico
    - fresh-mark.png
    - fresh-mark-cream.png

website:
  title: "FRESH Insights"
  description: "Notes on nutrition measurement, dietary surveys, and what the headline numbers miss — from the FRESH dietary surveillance and equity pipeline."
  site-url: "https://insights.freshfoodrecs.com"
  favicon: favicon-mark.ico
  google-analytics: "G-KR59MZC5RR"
  cookie-consent:
    type: implied
    style: simple
    palette: dark
  navbar:
    background: "#1a3a2a"
    foreground: "#fffdf8"
    logo: fresh-mark-cream.png
    logo-alt: "FRESH"
    title: false   # logo is the brand mark; no wordmark in the bar (keeps nav close to the logo)
    left:
      - text: "Insights"
        href: index.qmd
      - text: "Resources"
        href: resources/index.qmd
      - text: "Archive"
        href: archive.qmd
    right:
      - icon: rss
        href: index.xml
  page-footer:
    background: "#1a3a2a"
    foreground: "#fffdf8"
    center: >-
      **FRESH** — Fresh Food Recommendations for Equitable, Sustainable Health<br>
      Claims carried end to end, with the uncertainty kept intact<br>
      **Measurement Engine** · **Evidence Engine** · **Consumption & Equity Engine** ·
      **Decision Engine** · **Policy & Distribution Layer**

format:
  html:
    theme: cosmo
    css: styles.css
    toc: true
    toc-depth: 2
    fig-cap-location: bottom
    grid:
      sidebar-width: 0px
      body-width: 980px
      margin-width: 250px
      gutter-width: 1.5rem
    mainfont: "Source Sans 3, Segoe UI, sans-serif"
    fontcolor: "#1a2a22"
    linkcolor: "#2a5a3a"
    code-tools: false
