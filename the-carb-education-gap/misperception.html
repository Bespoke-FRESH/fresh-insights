<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="icon" href="data:,">
<title>How the public reads carbs</title>
<style>
  :root{ --ink:#1a3a2a; --ink-soft:#2a5a3a; --muted:#5e6c5e; --muted-soft:#9aaa9a;
    --paper:#fffdf8; --line:#eee8df; --focal:#9a7a2e;
    /* reserved misalignment palette — purple = consumers think it LESS healthy,
       orange = MORE healthy (Part 3 only). */
    --neg:#7a5ea8; --pos:#d98a3d; --pos-ink:#a85d1a;   /* --pos-ink = darker orange for TEXT (clears WCAG; bright --pos stays for bars/circles) */
    --neg-tint:#c4a9e0; --pos-tint:#f0b86e;            /* lighter tints for swatch text on the dark tooltip */
    --expert:#2a3a32; }
  *{box-sizing:border-box}
  html,body{margin:0;background:var(--paper);color:var(--ink);font-family:"Source Sans 3","Segoe UI",system-ui,sans-serif;}
  .wrap{max-width:880px;margin:0 auto;padding:8px 10px 12px;}
  .narrator{font-family:"Lora",Georgia,serif;font-weight:600;font-size:clamp(16px,2.1vw,21px);line-height:1.3;min-height:2.7em;margin:.1rem 0 .04rem;transition:color .5s ease;text-wrap:balance;max-width:40em;}
  .narrator .focal{font-weight:800;font-size:1.45em;display:inline-block;margin:0 .04em;animation:fg .55s cubic-bezier(.2,.8,.2,1);}
  .narrator .fneg{color:var(--neg)} .narrator .fpos{color:var(--pos-ink)}
  @keyframes fg{from{transform:scale(.55);opacity:.2}to{transform:scale(1);opacity:1}}
  .sub{color:var(--muted);font-size:14px;min-height:.6em;line-height:1.2;}
  svg{display:block;margin:0 auto;touch-action:manipulation;}
  .foodname{font-size:.86em;font-weight:600;fill:var(--ink);}
  .tick{fill:var(--muted);font-size:.86em;}
  .gradeline{stroke:var(--muted-soft);stroke-width:1;stroke-dasharray:3 3;opacity:0;transition:opacity .5s ease;}
  .gradeline.on{opacity:.65;}
  .gradelab{fill:var(--muted);font-size:.84em;font-weight:800;opacity:0;transition:opacity .5s ease;}
  .gradelab.on{opacity:.9;}
  .row{opacity:0;transition:opacity .5s ease;}
  .row.show{opacity:1;}
  .row.dim{opacity:.2;}
  .row.spot .foodname{font-weight:800;}
  /* the app circle (size = total misperception, dual-shaded by direction) */
  .mcirc{transition:opacity .55s ease;}
  /* bars unroll from the left (transform-origin set per-row in JS) */
  .bars{opacity:0;transition:opacity .45s ease;}
  .bars.on{opacity:1;}
  .barwrap{transform:scaleX(0);transition:transform .65s cubic-bezier(.2,.7,.2,1);}
  .bars.on .barwrap{transform:scaleX(1);}
  /* the diverging move: purple grows left, orange grows right from the experts line */
  .bneg,.bpos{transition:x .7s cubic-bezier(.4,0,.2,1),width .7s cubic-bezier(.4,0,.2,1);}
  .divider{stroke:var(--expert);stroke-width:1.6;opacity:0;transition:opacity .5s ease;}
  .divider.on{opacity:.55;}
  .divlab{fill:var(--expert);font-size:.82em;font-weight:800;opacity:0;transition:opacity .5s ease;}
  .divlab.on{opacity:.9;}
  /* per-row direction glyph (colour-blind-safe cue for which way the food leans) */
  .dirg{font-size:.9em;font-weight:800;}
  @media(prefers-reduced-motion:reduce){.bneg,.bpos{transition:none}}
  .halo{fill:none;stroke:var(--pos);stroke-width:2.4;transform-box:fill-box;transform-origin:center;opacity:0;}
  .halo.on{opacity:1;animation:hp 1.35s ease-out infinite;}
  @keyframes hp{0%,100%{transform:scale(.7);opacity:.8}50%{transform:scale(1.5);opacity:.06}}
  @media(prefers-reduced-motion:reduce){.halo.on{animation:none;opacity:.5}.barwrap{transition:none}}
  .controls{display:flex;gap:12px;align-items:center;margin-top:6px;min-height:24px;}
  .btn{background:none;border:none;color:var(--ink-soft);font:inherit;font-size:.85rem;font-weight:600;cursor:pointer;padding:6px 4px;}
  .btn:hover{color:var(--ink);text-decoration:underline}
  .btn[hidden]{display:none}
  .navbtn{background:#fff;border:1.5px solid var(--line);color:var(--ink-soft);border-radius:8px;width:34px;height:32px;font-size:.85rem;font-weight:700;cursor:pointer;line-height:1;padding:0}
  .navbtn:hover:not(:disabled){border-color:var(--muted-soft);color:var(--ink)}
  .navbtn:disabled{opacity:.3;cursor:default}
  .btn:focus-visible,.navbtn:focus-visible,#replay:focus-visible{outline:2.5px solid var(--focal);outline-offset:2px;border-radius:6px}
  .row{outline:none} .row:focus-visible .foodname{text-decoration:underline} .row:focus-visible .mcirc{stroke:var(--focal);stroke-width:2}
  .vh{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0 0 0 0);white-space:nowrap;border:0}
  #replay{background:var(--ink);color:var(--paper);border-radius:999px;padding:8px 18px;font-weight:600;font-size:.92rem}
  #replay:hover{background:var(--ink-soft);color:var(--paper);text-decoration:none}
  .progress{display:flex;gap:6px;margin-left:auto}
  .dot{width:7px;height:7px;border-radius:50%;background:var(--line)}
  .dot.on{background:var(--focal)}
  .legend{display:flex;flex-wrap:wrap;gap:4px 16px;justify-content:center;margin-top:6px;font-size:.78rem;color:var(--muted)}
  .legend b{font-weight:700}
  .sw{display:inline-block;width:10px;height:10px;border-radius:2px;margin-right:5px;vertical-align:middle}
  .tip{position:absolute;pointer-events:none;background:var(--ink);color:var(--paper);border-radius:8px;padding:8px 11px;font-size:12.5px;line-height:1.5;opacity:0;transition:opacity .15s ease;box-shadow:0 6px 20px rgba(26,58,42,.28);z-index:5;max-width:240px}
  .tip b{color:#ffe6a8}
  .tip .row2{display:flex;justify-content:space-between;gap:14px}
</style>
</head>
<body>
<div class="wrap">
  <div id="narrator" class="narrator"></div>
  <div id="sub" class="sub"></div>
  <svg id="chart" role="img" aria-label="Figure 1: Overall Misperception for 20 carbohydrate foods, split into less healthy (purple) and more healthy (orange) versus experts. The potato foods read less healthy; honey is the most misperceived, read healthier than experts; the two juices flip, 100% juice marked down and a vitamin-C drink up; 70% of foods carry both directions; only apple and cola are read close to experts. Alignment Grade A to D scores the gap size; 17 of 20 are C or D.">
    <g id="grades"></g>
    <g id="divider"></g>
    <g id="rows"></g>
    <g id="halos"></g>
  </svg>
  <div class="legend" id="legend"></div>
  <div class="vh" id="datatable"></div>
  <div class="controls">
    <button id="prevStep" class="navbtn" aria-label="Previous step" title="Previous (←)">◀</button>
    <button id="nextStep" class="navbtn" aria-label="Next step" title="Next (→)">▶</button>
    <button id="skip" class="btn">Skip ▸</button>
    <button id="replay" class="btn" hidden>▶ Play the walkthrough</button>
    <div class="progress" id="progress"></div>
  </div>
  <div aria-live="polite" id="live" style="position:absolute;left:-9999px"></div>
</div>
<div id="tip" class="tip"></div>
<script>
(function(){
  "use strict";
  var NS="http://www.w3.org/2000/svg";
  function el(t,a,tx){ var e=document.createElementNS(NS,t); for(var k in a) e.setAttribute(k,a[k]); if(tx!=null) e.textContent=tx; return e; }
  function clamp(v,lo,hi){ return Math.max(lo,Math.min(hi,v)); }

  // Real per-food AUC values from overall_summary_perception_expert.csv (AUC, the
  // version the manuscript uses), ordered by Overall Misperception (POP) descending.
  // neg = Negative Misperception (NPAUC; consumers rate it LESS healthy than experts,
  // purple); pos = Positive Misperception (PPAAC; MORE healthy, orange); tot ~= POP.
  // ALIGNMENT GRADE = a school grade on the SIZE of POP, direction-agnostic:
  // A 0-10, B 11-20, C 21-30, D 31-40 (Methods + Figure 1). Published spread: 1A/2B/15C/2D.
  var FOODS=[
    {n:"Honey",            neg:3.2,  pos:34.0, grade:"D"},
    {n:"French fries",     neg:29.9, pos:0.9,  grade:"D"},
    {n:"Honey-oat cereal", neg:20.6, pos:7.8,  grade:"C"},
    {n:"100% juice",       neg:22.3, pos:4.9,  grade:"C"},
    {n:"Potato chips",     neg:24.5, pos:2.2,  grade:"C"},
    {n:"Popcorn, plain",   neg:25.5, pos:0.4,  grade:"C"},
    {n:"Whole-wheat bread",neg:16.3, pos:9.1,  grade:"C"},
    {n:"Baked potato",     neg:23.4, pos:1.5,  grade:"C"},
    {n:"Popcorn, butter",  neg:15.7, pos:8.5,  grade:"C"},
    {n:"Corn tortilla",    neg:19.9, pos:4.3,  grade:"C"},
    {n:"White rice",       neg:12.7, pos:10.9, grade:"C"},
    {n:"White bread",      neg:17.2, pos:6.2,  grade:"C"},
    {n:"Vit-C juice",      neg:7.9,  pos:15.4, grade:"C"},
    {n:"Pasta",            neg:17.0, pos:6.2,  grade:"C"},
    {n:"Fried rice",       neg:18.3, pos:4.6,  grade:"C"},
    {n:"Granola bar",      neg:14.4, pos:8.0,  grade:"C"},
    {n:"Soy milk",         neg:14.3, pos:7.7,  grade:"C"},
    {n:"Smoothie",         neg:12.6, pos:7.0,  grade:"B"},
    {n:"Apple",            neg:12.8, pos:0.0,  grade:"B"},
    {n:"Cola",             neg:3.2,  pos:7.0,  grade:"A"}
  ];
  FOODS.forEach(function(f){ f.tot=f.neg+f.pos; });
  var SCALE=40;                         // the grade scale runs 0-40 (D tops out at 40)
  var DSCALE=36;                        // per-side scale for the diverging view (max neg ~30, max pos ~34)
  var GR=[10,20,30];                    // Alignment-Grade cutoffs on Overall Misperception
  var LOPSIDED={"Honey":1,"French fries":1,"Potato chips":1,"Popcorn, plain":1,"Baked potato":1,"Apple":1}; // >85% one direction; the other 14 (70%) are mixtures

  var svg=document.getElementById("chart"), gradesG=document.getElementById("grades"), rowsG=document.getElementById("rows"),
      halosG=document.getElementById("halos"), legend=document.getElementById("legend"), dividerG=document.getElementById("divider");
  var narrator=document.getElementById("narrator"), sub=document.getElementById("sub");
  var tip=document.getElementById("tip"), progress=document.getElementById("progress"), live=document.getElementById("live");
  var wrap=document.querySelector(".wrap");
  var parentVpH=0;

  var CAP={
    rest:{t:"How the public reads 20 carb foods — next to the experts.", s:"hover a row for its grade and misperception"},
    b1:{t:"In the tool, each food is a circle: how <b>big</b> is its total gap from the experts; the colour split is which way &mdash; <b class='fneg'>less healthy</b> or <b class='fpos'>more healthy</b>.", s:""},
    b2:{t:"Unroll them into Figure 1 and grade the <b>size</b> of each gap &mdash; the <b>Alignment Grade</b>, A (closely aligned) to D (far off). <span class='focal'>17 of 20</span> land at C or D.", s:""},
    b3:{t:"Now split each bar around the experts &mdash; <b class='fneg'>less healthy</b> to the left, <b class='fpos'>more healthy</b> to the right. The <b class='fneg'>potato family</b> all falls left: French fries, chips, even a plain baked potato.", s:""},
    b4:{t:"The single biggest gap is far to the <b class='fpos'>right</b>: <b class='fpos'>honey</b>, read as much healthier than experts &mdash; the most misperceived food of the twenty.", s:""},
    b5:{t:"The two juices land on <b>opposite sides</b>: real <b class='fneg'>100% juice</b> sits <b class='fneg'>left</b>, while a sugary &lsquo;<b class='fpos'>vitamin&nbsp;C</b>&rsquo; drink earns a health <b class='fpos'>halo</b> on the right.", s:""},
    b6:{t:"Most foods <b>straddle the line</b>: <span class='focal'>70%</span> reach <b class='fneg'>left</b> and <b class='fpos'>right</b> at once &mdash; <b>white rice</b> splits almost evenly, and even the <b>smoothie</b> carries a real dose of each.", s:""},
    b7:{t:"Only an apple and a soda sit close to the experts line. The gap isn&rsquo;t one blind spot &mdash; it&rsquo;s a food-by-food map of where the message has to work.", s:""}
  };
  function setCap(k){ var c=CAP[k]; narrator.innerHTML=c.t; sub.innerHTML=c.s||""; }

  var MAXW=860, MINW=300, L={};
  function layout(){
    var availW=Math.max(MINW, wrap.clientWidth-20), W=clamp(availW,MINW,MAXW);
    var F=clamp(13+(W-MINW)*(15.5-13)/(MAXW-MINW),13,15.5);
    var labW=Math.round(F*9.6), circW=Math.round(F*2.4), MR=14;
    var MT=Math.round(F*2.0), MB=Math.round(F*1.2);
    var vpH=parentVpH||window.innerHeight||700;
    var availH=Math.round(vpH*0.92)-140;
    var n=FOODS.length, rowH=clamp(Math.floor((availH-MT-MB)/n),15,25);
    var X0=labW+circW, X1=W-MR, plotW=X1-X0;
    L={W:W,F:F,X0:X0,X1:X1,plotW:plotW,labW:labW,circW:circW,MT:MT,MB:MB,rowH:rowH,n:n,
       H:MT+rowH*n+MB, barH:Math.max(7,Math.round(rowH*0.6)), maxR:Math.min(circW*0.40, rowH*0.40), CX:0};
    L.CX=L.X0+L.plotW/2;
  }
  function rowY(i){ return L.MT + L.rowH*(i+0.5); }
  function fx(v){ return L.X0 + (v/SCALE)*L.plotW; }
  function cr(tot){ return 3 + (Math.sqrt(tot)-Math.sqrt(10))/(Math.sqrt(40)-Math.sqrt(10))*(L.maxR-3); }

  function applySvgSize(){ svg.setAttribute("width",L.W); svg.setAttribute("height",L.H);
    svg.setAttribute("viewBox","0 0 "+L.W+" "+L.H); svg.style.width=L.W+"px"; svg.style.height=L.H+"px"; svg.style.fontSize=L.F+"px"; }

  function pie(cx,cy,r,negFrac){   // purple sector = neg share (from top, clockwise), orange the rest
    var g=el("g",{});
    if(negFrac>=0.999){ g.appendChild(el("circle",{cx:cx,cy:cy,r:r,fill:"var(--neg)"})); return g; }
    if(negFrac<=0.001){ g.appendChild(el("circle",{cx:cx,cy:cy,r:r,fill:"var(--pos)"})); return g; }
    var a0=-Math.PI/2, a1=a0+2*Math.PI*negFrac;
    function seg(s,e,fill){ var x0=cx+r*Math.cos(s),y0=cy+r*Math.sin(s),x1=cx+r*Math.cos(e),y1=cy+r*Math.sin(e),big=(e-s)>Math.PI?1:0;
      return el("path",{d:"M"+cx+","+cy+" L"+x0+","+y0+" A"+r+","+r+" 0 "+big+" 1 "+x1+","+y1+" Z",fill:fill}); }
    g.appendChild(seg(a0,a1,"var(--neg)")); g.appendChild(seg(a1,a0+2*Math.PI,"var(--pos)"));
    return g;
  }

  function drawGrades(){
    gradesG.innerHTML="";
    GR.forEach(function(x){ gradesG.appendChild(el("line",{"class":"gradeline",x1:fx(x),y1:L.MT-2,x2:fx(x),y2:L.MT+L.rowH*L.n+2})); });
    [{lab:"A",mid:5},{lab:"B",mid:15},{lab:"C",mid:25},{lab:"D",mid:35}].forEach(function(b){
      gradesG.appendChild(el("text",{"class":"gradelab",x:fx(b.mid),y:L.MT-Math.round(L.F*0.4),"text-anchor":"middle"},b.lab));
    });
  }
  function gradesOn(on){ gradesG.querySelectorAll(".gradeline,.gradelab").forEach(function(e){ e.classList.toggle("on",on); }); }

  function drawDivider(){
    dividerG.innerHTML="";
    dividerG.appendChild(el("line",{"class":"divider",x1:L.CX,y1:L.MT-2,x2:L.CX,y2:L.MT+L.rowH*L.n+2}));
    dividerG.appendChild(el("text",{"class":"divlab",x:L.CX,y:L.MT-Math.round(L.F*0.4),"text-anchor":"middle"},"experts"));
  }
  function dividerOn(on){ dividerG.querySelectorAll(".divider,.divlab").forEach(function(e){ e.classList.toggle("on",on); }); }

  function leanOf(f){ return f.neg>f.pos*1.15 ? "neg" : (f.pos>f.neg*1.15 ? "pos" : "both"); }
  var DIRG={neg:"▼",pos:"▲",both:"◆"}, DIRTXT={neg:"read mostly less healthy than experts",pos:"read mostly more healthy than experts",both:"read both ways about equally"};

  var nodes=[], honeyHalo=null, honeyY=0;
  function drawRows(){
    rowsG.innerHTML=""; halosG.innerHTML=""; nodes=[]; honeyHalo=null;
    FOODS.forEach(function(f,i){
      var y=rowY(i), lean=leanOf(f);
      var g=el("g",{"class":"row",tabindex:"0",role:"img",
        "aria-label":f.n+", alignment grade "+f.grade+", "+DIRTXT[lean]+". Negative misperception "+f.neg.toFixed(0)+", positive "+f.pos.toFixed(0)+", total "+f.tot.toFixed(0)+"."});
      g.appendChild(el("title",{},f.n+" · grade "+f.grade+" · "+DIRTXT[lean]));
      // colour-blind-safe direction glyph at the far left
      g.appendChild(el("text",{"class":"dirg",x:2,y:y+L.F*0.34,"text-anchor":"start",
        fill:(lean==="neg"?"var(--neg)":lean==="pos"?"var(--pos-ink)":"var(--muted)")},DIRG[lean]));
      g.appendChild(el("text",{"class":"foodname",x:L.labW-6,y:y+L.F*0.34,"text-anchor":"end"},f.n));
      // the app circle (size = total, dual-shaded), at the circle column
      var ccx=L.labW+L.circW/2, c=pie(ccx,y,cr(f.tot),f.neg/f.tot); c.setAttribute("class","mcirc"); g.appendChild(c); g.__circ=c;
      // bars: purple (neg) then orange (pos), unrolling from X0; refs kept for the diverging move
      var bars=el("g",{"class":"bars"}); var wrapg=el("g",{"class":"barwrap"});
      wrapg.style.transformOrigin=L.X0+"px "+y+"px"; wrapg.style.transformBox="view-box";
      var bh=L.barH, ny=y-bh/2, pw=(f.neg/SCALE)*L.plotW, ow=(f.pos/SCALE)*L.plotW;
      var ne=null, po=null;
      if(pw>0){ ne=el("rect",{"class":"bneg",x:L.X0,y:ny,width:pw,height:bh,fill:"var(--neg)","fill-opacity":.9,rx:1.5}); wrapg.appendChild(ne); }
      if(ow>0){ po=el("rect",{"class":"bpos",x:L.X0+pw,y:ny,width:ow,height:bh,fill:"var(--pos)","fill-opacity":.9,rx:1.5}); wrapg.appendChild(po); }
      bars.appendChild(wrapg); g.appendChild(bars); g.__bars=bars; g.__neg=ne; g.__po=po; g.__f=f;
      g.addEventListener("mouseenter",function(e){ showTip(f,e); });
      g.addEventListener("mousemove",moveTip); g.addEventListener("mouseleave",hideTip);
      g.addEventListener("focus",function(){ showTipAt(f,g); }); g.addEventListener("blur",hideTip);
      rowsG.appendChild(g); nodes.push(g);
      if(f.n==="Honey"){ honeyHalo=el("circle",{"class":"halo honeyhalo",cx:L.X0+pw+ow,cy:y,r:bh*0.85}); honeyY=y; halosG.appendChild(honeyHalo); }
    });
  }

  // animate bars between the stacked Figure 1 and the diverging (experts-centred) view
  var diverging=false;
  function setDiverge(on){
    diverging=on; dividerOn(on);
    nodes.forEach(function(g){ var f=g.__f, ne=g.__neg, po=g.__po, bh=L.barH;
      if(on){ var dnw=(f.neg/DSCALE)*(L.plotW/2), dpw=(f.pos/DSCALE)*(L.plotW/2);
        if(ne){ ne.setAttribute("x",L.CX-dnw); ne.setAttribute("width",Math.max(0,dnw)); }
        if(po){ po.setAttribute("x",L.CX); po.setAttribute("width",Math.max(0,dpw)); }
      } else { var pw=(f.neg/SCALE)*L.plotW, ow=(f.pos/SCALE)*L.plotW;
        if(ne){ ne.setAttribute("x",L.X0); ne.setAttribute("width",Math.max(0,pw)); }
        if(po){ po.setAttribute("x",L.X0+pw); po.setAttribute("width",Math.max(0,ow)); }
      }
    });
    if(honeyHalo){ var hf=FOODS[idxOf("Honey")];
      honeyHalo.setAttribute("cx", on ? L.CX+(hf.pos/DSCALE)*(L.plotW/2) : L.X0+((hf.neg+hf.pos)/SCALE)*L.plotW); }
  }

  function tipHTML(f){
    var html="<b>"+f.n+"</b><div class='row2' style='margin-top:4px'><span>alignment grade</span><span><b>"+f.grade+"</b></span></div>";
    html+="<div class='row2'><span style='color:var(--neg-tint)'>▼ less healthy than experts</span><span>"+f.neg.toFixed(0)+"</span></div>";
    html+="<div class='row2'><span style='color:var(--pos-tint)'>▲ more healthy than experts</span><span>"+f.pos.toFixed(0)+"</span></div>";
    html+="<div class='row2'><span>total misperception</span><span><b>"+f.tot.toFixed(0)+"</b></span></div>";
    html+="<div style='margin-top:5px;color:#cfe0d4;font-size:11px'>consumer beliefs vs the experts</div>";
    return html;
  }
  function showTip(f,e){ tip.innerHTML=tipHTML(f); tip.style.opacity="1"; moveTip(e); }
  function showTipAt(f,g){ tip.innerHTML=tipHTML(f); tip.style.opacity="1";
    var b=g.getBoundingClientRect(); tip.style.left=(b.left+b.width*0.35)+"px"; tip.style.top=(b.bottom+6)+"px"; }
  function moveTip(e){ tip.style.left=(e.clientX+14)+"px"; tip.style.top=(e.clientY+14)+"px"; }
  function hideTip(){ tip.style.opacity="0"; }

  function buildLegend(){ legend.innerHTML=
    '<span><span class="sw" style="background:var(--neg)"></span><b style="color:var(--neg)">▼ Less healthy</b> than experts (consumers &lt; experts)</span>'+
    '<span><span class="sw" style="background:var(--pos)"></span><b style="color:var(--pos-ink)">▲ More healthy</b> than experts (consumers &gt; experts)</span>'; }

  var STEPS=["b1","b2","b3","b4","b5","b6","b7"];
  STEPS.forEach(function(){ var d=document.createElement("div"); d.className="dot"; progress.appendChild(d); });
  function mark(i){ var d=progress.children; for(var k=0;k<d.length;k++) d[k].className="dot"+(k<=i?" on":""); }
  function showRows(on){ nodes.forEach(function(g){ g.classList.toggle("show",on); }); }
  function circs(on){ nodes.forEach(function(g){ if(g.__circ) g.__circ.style.opacity=on?"1":"0"; }); }
  function bars(on){ nodes.forEach(function(g){ if(g.__bars) g.__bars.classList.toggle("on",on); }); }
  function clearFx(){ nodes.forEach(function(g){ g.classList.remove("dim"); g.classList.remove("spot"); }); halo(false); }
  function halo(on){ var h=halosG.querySelector(".honeyhalo"); if(h) h.classList.toggle("on",!!on); }

  function idxOf(name){ for(var i=0;i<FOODS.length;i++) if(FOODS[i].n===name) return i; return -1; }
  function spotNames(names){ clearFx(); nodes.forEach(function(g,i){ if(names.indexOf(FOODS[i].n)>=0) g.classList.add("spot"); else g.classList.add("dim"); }); }

  function beat1(){ setCap("b1"); mark(0); showRows(true); circs(true); bars(false); gradesOn(false); setDiverge(false); clearFx();
    live.textContent="Each food is a circle sized by its total gap from the experts, shaded by direction."; }
  function beat2(){ setCap("b2"); mark(1); showRows(true); circs(false); bars(true); gradesOn(true); setDiverge(false); clearFx();
    live.textContent="Alignment Grade scores the size of the gap, A to D; 17 of 20 foods are C or D."; }
  function beat3(){ setCap("b3"); mark(2); showRows(true); circs(false); bars(true); gradesOn(false); setDiverge(true);
    spotNames(["French fries","Potato chips","Baked potato"]);
    live.textContent="Split around the experts: every potato food sits on the less-healthy side."; }
  function beat4(){ setCap("b4"); mark(3); showRows(true); circs(false); bars(true); gradesOn(false); setDiverge(true);
    spotNames(["Honey"]); halo(true);
    live.textContent="Honey is the most misperceived food, far over on the more-healthy side."; }
  function beat5(){ setCap("b5"); mark(4); showRows(true); circs(false); bars(true); gradesOn(false); setDiverge(true);
    spotNames(["100% juice","Vit-C juice"]);
    live.textContent="The two juices flip across the line: 100% juice marked down, the vitamin C drink up."; }
  function beat6(){ setCap("b6"); mark(5); showRows(true); circs(false); bars(true); gradesOn(false); setDiverge(true);
    spotNames(["White rice","Smoothie"]);
    live.textContent="70% of foods straddle the line; white rice and the smoothie split fairly evenly."; }
  function beat7(){ setCap("b7"); mark(6); showRows(true); circs(false); bars(true); gradesOn(false); setDiverge(true);
    spotNames(["Apple","Cola"]); halo(false);
    live.textContent="Only apple and cola sit close to the experts line."; }

  var BEATS=[[0,beat1],[6000,beat2],[12000,beat3],[18000,beat4],[24000,beat5],[30000,beat6],[36000,beat7],[42000,finishRun]];
  var STEPFNS=[beat1,beat2,beat3,beat4,beat5,beat6,beat7], LAST=STEPFNS.length-1;
  var rafId=null,playing=false,t0=0,idx=0,current=-1,atRest=true;
  var prevBtn=document.getElementById("prevStep"), nextBtn=document.getElementById("nextStep");
  function clearAll(){ if(rafId){cancelAnimationFrame(rafId);rafId=null;} playing=false; }
  function updateNav(){ prevBtn.disabled=(current<=0); nextBtn.disabled=(current>=LAST); }
  function setPlayLabel(t){ document.getElementById("replay").innerHTML=t; }
  function tick(now){ if(!playing) return; if(!t0) t0=now; var e=now-t0;
    while(idx<BEATS.length && e>=BEATS[idx][0]){ BEATS[idx][1](); if(idx<=LAST){current=idx;updateNav();} idx++; }
    if(idx<BEATS.length){ rafId=requestAnimationFrame(tick); } else { playing=false; rafId=null; } }
  function run(){ clearAll(); atRest=false; document.getElementById("replay").hidden=false; setPlayLabel("↻ Replay"); document.getElementById("skip").hidden=false;
    showRows(false); circs(true); bars(false); gradesOn(false); setDiverge(false); clearFx(); current=-1; idx=0; t0=0; playing=true; updateNav(); rafId=requestAnimationFrame(tick); }
  function goTo(n){ clearAll(); autoplayed=true; atRest=false; n=Math.max(0,Math.min(LAST,n)); STEPFNS[n](); current=n;
    document.getElementById("skip").hidden=false; document.getElementById("replay").hidden=false; setPlayLabel("↻ Replay"); updateNav(); }
  function home(){ setCap("rest"); showRows(true); circs(false); bars(true); gradesOn(true); setDiverge(false); clearFx();
    document.getElementById("skip").hidden=true; document.getElementById("replay").hidden=false;
    live.textContent="The public's beliefs about 20 carb foods, against the experts and the grade scale."; }
  function finishRun(){ home(); setPlayLabel("↻ Replay the walkthrough"); }
  function jumpToEnd(){ clearAll(); atRest=true; home(); current=LAST; mark(LAST); updateNav(); }

  function fitParent(){ try{ if(window.parent && window.parent!==window) window.parent.postMessage("story-fit","*"); }catch(e){} }
  function render(){ layout(); applySvgSize(); drawGrades(); drawDivider(); drawRows(); buildLegend();
    if(atRest){ jumpToEnd(); } else if(current<0){ showRows(false); circs(true); bars(false); gradesOn(false); setDiverge(false); } else { clearFx(); STEPFNS[current](); }
    fitParent(); }

  document.getElementById("skip").addEventListener("click",function(){ jumpToEnd(); setPlayLabel("↻ Replay the walkthrough"); });
  document.getElementById("replay").addEventListener("click",run);
  prevBtn.addEventListener("click",function(){ goTo((current<0?0:current)-1); });
  nextBtn.addEventListener("click",function(){ goTo((current<0?-1:current)+1); });
  document.addEventListener("keydown",function(e){ if(e.key==="ArrowLeft") goTo((current<0?0:current)-1); else if(e.key==="ArrowRight") goTo((current<0?-1:current)+1); });

  (function buildTable(){
    var h="<table><caption>Figure 1: Overall Misperception for 20 carbohydrate foods (consumer beliefs versus the expert meta-NPS), decomposed into negative misperception (read less healthy) and positive misperception (read more healthy), with the Alignment Grade on the size of the total gap (A 0–10, B 11–20, C 21–30, D 31–40).</caption>"+
      "<thead><tr><th>Food</th><th>Alignment grade</th><th>Negative (less healthy)</th><th>Positive (more healthy)</th><th>Total misperception</th></tr></thead><tbody>";
    FOODS.forEach(function(f){ h+="<tr><td>"+f.n+"</td><td>"+f.grade+"</td><td>"+f.neg.toFixed(1)+"</td><td>"+f.pos.toFixed(1)+"</td><td>"+f.tot.toFixed(1)+"</td></tr>"; });
    h+="</tbody></table>"; document.getElementById("datatable").innerHTML=h;
  })();
  render(); setCap("rest"); setPlayLabel("▶ Play the walkthrough"); updateNav();

  var rt=null;
  window.addEventListener("resize",function(){ if(rt) clearTimeout(rt); rt=setTimeout(render,120); });
  if("ResizeObserver" in window){ var ro=new ResizeObserver(function(){ if(rt) clearTimeout(rt); rt=setTimeout(render,120); }); ro.observe(wrap); }

  var reduced=window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches;
  var autoplayed=false, embedded=!!(window.parent && window.parent!==window);
  function maybeAutoPlay(){ if(autoplayed||reduced) return; autoplayed=true; run(); }
  window.addEventListener("message",function(e){ if(!e||!e.data) return;
    if(e.data==="play-story"){ maybeAutoPlay(); }
    else if(e.data.kind==="vph"&&e.data.h){ if(Math.abs(e.data.h-parentVpH)>4){ parentVpH=e.data.h; render(); } } });
  if(!embedded){ if("IntersectionObserver" in window){ new IntersectionObserver(function(es){ es.forEach(function(en){ if(en.isIntersecting) maybeAutoPlay(); }); },{threshold:0.4}).observe(document.getElementById("chart")); } else { maybeAutoPlay(); }
    document.addEventListener("visibilitychange", maybeAutoPlay); }
  if(reduced){ jumpToEnd(); }
})();
</script>
</body>
</html>
