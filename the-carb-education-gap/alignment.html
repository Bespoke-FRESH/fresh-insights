<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="icon" href="data:,">
<title>Do the public and the experts agree?</title>
<style>
  :root{ --ink:#1a3a2a; --ink-soft:#2a5a3a; --muted:#5e6c5e; --muted-soft:#9aaa9a;
    --paper:#fffdf8; --line:#eee8df; --focal:#9a7a2e;
    --aligned:#3f7d52; --contested:#5f7d9c; }
  *{box-sizing:border-box}
  html,body{margin:0;background:var(--paper);color:var(--ink);font-family:"Source Sans 3","Segoe UI",system-ui,sans-serif;}
  .wrap{max-width:840px;margin:0 auto;padding:8px 10px 12px;}
  .narrator{font-family:"Lora",Georgia,serif;font-weight:600;font-size:clamp(16px,2.1vw,21px);line-height:1.3;min-height:2.7em;margin:.1rem 0 .04rem;transition:color .5s ease;text-wrap:balance;max-width:40em;}
  .narrator .focal{font-weight:800;font-size:1.45em;color:var(--focal);display:inline-block;margin:0 .04em;animation:fg .55s cubic-bezier(.2,.8,.2,1);}
  .narrator .fal{color:var(--aligned);font-weight:800} .narrator .fco{color:var(--contested);font-weight:800}
  @keyframes fg{from{transform:scale(.55);opacity:.2}to{transform:scale(1);opacity:1}}
  .sub{color:var(--muted);font-size:14px;min-height:.6em;line-height:1.2;}
  svg{display:block;margin:0 auto;touch-action:manipulation;}
  .zhead{font-size:.92em;font-weight:800;} .zsub{font-size:.86em;font-weight:600;fill:var(--muted);}
  .zsep{stroke:var(--line);stroke-width:1;}
  .fdot{opacity:0;transition:opacity .45s ease, transform .5s ease;}
  .fdot.show{opacity:1;}
  .fdot.dim{opacity:.16;}
  .fdot.spot circle{stroke:var(--ink);stroke-width:2.2;}
  .flab{font-size:.86em;font-weight:700;fill:var(--ink);opacity:0;transition:opacity .4s ease;}
  .flab.show{opacity:1;}
  .controls{display:flex;gap:12px;align-items:center;margin-top:8px;min-height:24px;}
  .btn{background:none;border:none;color:var(--ink-soft);font:inherit;font-size:.85rem;font-weight:600;cursor:pointer;padding:6px 4px;}
  .btn:hover{color:var(--ink);text-decoration:underline}
  .btn[hidden]{display:none}
  .navbtn{background:#fff;border:1.5px solid var(--line);color:var(--ink-soft);border-radius:8px;width:34px;height:32px;font-size:.85rem;font-weight:700;cursor:pointer;line-height:1;padding:0}
  .navbtn:hover:not(:disabled){border-color:var(--muted-soft);color:var(--ink)}
  .navbtn:disabled{opacity:.3;cursor:default}
  #replay{background:var(--ink);color:var(--paper);border-radius:999px;padding:8px 18px;font-weight:600;font-size:.92rem}
  #replay:hover{background:var(--ink-soft);color:var(--paper);text-decoration:none}
  .progress{display:flex;gap:6px;margin-left:auto}
  .dot{width:7px;height:7px;border-radius:50%;background:var(--line)}
  .dot.on{background:var(--focal)}
  .tip{position:absolute;pointer-events:none;background:var(--ink);color:var(--paper);border-radius:8px;padding:7px 10px;font-size:12.5px;line-height:1.45;opacity:0;transition:opacity .15s ease;box-shadow:0 6px 20px rgba(26,58,42,.28);z-index:5}
  .tip b{color:#ffe6a8}
</style>
</head>
<body>
<div class="wrap">
  <div id="narrator" class="narrator"></div>
  <div id="sub" class="sub"></div>
  <svg id="chart" role="img" aria-label="20 carbohydrate foods graded on public-expert alignment: 17 of 20 graded C or D (far apart); only soda, apple and a smoothie come close">
    <g id="zones"></g>
    <g id="dots"></g>
    <g id="labs"></g>
  </svg>
  <div class="controls">
    <button id="prevStep" class="navbtn" aria-label="Previous step" title="Previous (←)">◀</button>
    <button id="nextStep" class="navbtn" aria-label="Next step" title="Next (→)">▶</button>
    <button id="skip" class="btn">Skip ▸</button>
    <button id="replay" class="btn" hidden>▶ Play the walkthrough</button>
    <div class="progress" id="progress"></div>
  </div>
  <div aria-live="polite" id="live" style="position:absolute;left:-9999px"></div>
</div>
<div id="tip" class="tip"></div>
<script>
(function(){
  "use strict";
  var NS="http://www.w3.org/2000/svg";
  function el(t,a,tx){ var e=document.createElementNS(NS,t); for(var k in a) e.setAttribute(k,a[k]); if(tx!=null) e.textContent=tx; return e; }
  function clamp(v,lo,hi){ return Math.max(lo,Math.min(hi,v)); }

  // grade = consumer-expert alignment (A best ... D worst), from the webinar table.
  var ZONES=[
    {g:"A",lab:"agree",      foods:["Cola"]},
    {g:"B",lab:"close",      foods:["Apple","Smoothie"]},
    {g:"C",lab:"a grade apart",foods:["White rice","Granola bar","Soy milk","White bread","Popcorn, butter","Whole wheat bread","Honey-oat cereal","Pasta","Fried rice","Corn tortilla","100% juice","Potato chips","Baked potato","Popcorn, plain","Vit-C juice"]},
    {g:"D",lab:"far apart",  foods:["Honey","French fries"]}
  ];
  var ALIGNED={A:1,B:1};

  var svg=document.getElementById("chart"), zonesG=document.getElementById("zones"), dotsG=document.getElementById("dots"), labsG=document.getElementById("labs");
  var narrator=document.getElementById("narrator"), sub=document.getElementById("sub");
  var tip=document.getElementById("tip"), progress=document.getElementById("progress"), live=document.getElementById("live");
  var wrap=document.querySelector(".wrap");
  var parentVpH=0;

  var CAP={
    rest:{t:"Twenty carb foods, graded on how well the public's beliefs match the experts'.", s:"hover a dot for its food and grade"},
    b1:{t:"For each of 20 foods, grade how well the public's belief matches the experts' &mdash; from <b class='fal'>A (they agree)</b> to <b class='fco'>D (far apart)</b>.", s:""},
    b2:{t:"Sort the foods by their grade. They don&rsquo;t spread evenly &mdash; they pile up on the right.", s:""},
    b3:{t:"<span class='focal'>17 of 20</span> land a <b class='fco'>C or D</b> &mdash; a full grade apart. The public and the experts rarely see a carb food the same way.", s:""},
    b4:{t:"Only three come close: <b class='fal'>soda, an apple, a smoothie</b>. Everywhere else, there&rsquo;s a gap to explain.", s:""}
  };
  function setCap(k){ var c=CAP[k]; narrator.innerHTML=c.t; sub.innerHTML=c.s||""; }

  var MAXW=820, MINW=300, L={};
  function layout(){
    var availW=Math.max(MINW, wrap.clientWidth-20), W=clamp(availW,MINW,MAXW);
    var F=clamp(13+(W-MINW)*(15.5-13)/(MAXW-MINW),13,15.5);
    var MT=Math.round(F*2.6), MB=Math.round(F*0.6), MR=8, ML=8;
    var vpH=parentVpH||window.innerHeight||700;
    var availH=Math.round(vpH*0.92)-135;
    var plotH=clamp(availH, 230, 360);
    var X0=ML, X1=W-MR, zoneW=(X1-X0)/4;
    L={W:W,F:F,X0:X0,X1:X1,zoneW:zoneW,MT:MT,plotH:plotH,H:MT+plotH+MB,
       cols:[1,1,4,1], r:clamp(Math.round(zoneW/12),6,11)};
  }
  function applySvgSize(){ svg.setAttribute("width",L.W); svg.setAttribute("height",L.H);
    svg.setAttribute("viewBox","0 0 "+L.W+" "+L.H); svg.style.width=L.W+"px"; svg.style.height=L.H+"px"; svg.style.fontSize=L.F+"px"; }

  // position of the k-th dot within zone zi (grid fill, top-down)
  function dotPos(zi,k){
    var cx0=L.X0+L.zoneW*zi, cols=L.cols[zi], cellW=L.zoneW/(cols+0.0);
    var col=k%cols, row=Math.floor(k/cols);
    var gap=L.r*2.5;
    var x=cx0 + cellW*(col+0.5);
    var y=L.MT + 6 + row*gap + L.r;
    return {x:x,y:y};
  }

  var nodes=[], labels=[];
  function build(){
    zonesG.innerHTML=""; dotsG.innerHTML=""; labsG.innerHTML=""; nodes=[]; labels=[];
    ZONES.forEach(function(z,zi){
      var cx=L.X0+L.zoneW*(zi+0.5);
      zonesG.appendChild(el("text",{"class":"zhead",x:cx,y:L.MT-Math.round(L.F*1.0),"text-anchor":"middle",fill:(ALIGNED[z.g]?"var(--aligned)":"var(--contested)")},z.g));
      zonesG.appendChild(el("text",{"class":"zsub",x:cx,y:L.MT-Math.round(L.F*0.0)-2,"text-anchor":"middle"},z.lab));
      if(zi>0) zonesG.appendChild(el("line",{"class":"zsep",x1:L.X0+L.zoneW*zi,y1:L.MT+2,x2:L.X0+L.zoneW*zi,y2:L.MT+L.plotH-4}));
      z.foods.forEach(function(food,k){
        var p=dotPos(zi,k), fill=ALIGNED[z.g]?"var(--aligned)":"var(--contested)";
        var g=el("g",{"class":"fdot"}); g.setAttribute("transform","translate("+p.x+","+p.y+")");
        g.appendChild(el("circle",{r:L.r,fill:fill,"fill-opacity":.85,stroke:fill,"stroke-width":1}));
        g.__food=food; g.__grade=z.g;
        g.addEventListener("mouseenter",function(e){ showTip(food,z.g,e); });
        g.addEventListener("mousemove",moveTip); g.addEventListener("mouseleave",hideTip);
        dotsG.appendChild(g); nodes.push({g:g,zi:zi,grade:z.g,food:food,x:p.x,y:p.y});
      });
    });
  }
  function showTip(food,grade,e){ tip.innerHTML="<b>"+food+"</b><br>alignment grade "+grade; tip.style.opacity="1"; moveTip(e); }
  function moveTip(e){ tip.style.left=(e.clientX+13)+"px"; tip.style.top=(e.clientY+13)+"px"; }
  function hideTip(){ tip.style.opacity="0"; }

  var STEPS=["b1","b2","b3","b4"];
  STEPS.forEach(function(){ var d=document.createElement("div"); d.className="dot"; progress.appendChild(d); });
  function mark(i){ var d=progress.children; for(var k=0;k<d.length;k++) d[k].className="dot"+(k<=i?" on":""); }
  function show(on){ nodes.forEach(function(n){ n.g.classList.toggle("show",on); }); }
  function clearFx(){ nodes.forEach(function(n){ n.g.classList.remove("dim"); n.g.classList.remove("spot"); }); labsG.innerHTML=""; }
  function dimGrades(set,keep){ nodes.forEach(function(n){ n.g.classList.toggle("dim", keep ? set.indexOf(n.grade)<0 : set.indexOf(n.grade)>=0); }); }

  function beat1(){ setCap("b1"); mark(0); show(false); clearFx();
    live.textContent="Grade scale A (agree) to D (far apart)."; }
  function beat2(){ setCap("b2"); mark(1); show(true); clearFx();
    live.textContent="Foods sorted by grade pile up on the right."; }
  function beat3(){ setCap("b3"); mark(2); show(true); clearFx(); dimGrades(["C","D"],true);
    live.textContent="17 of 20 foods graded C or D."; }
  function beat4(){ setCap("b4"); mark(3); show(true); clearFx(); dimGrades(["A","B"],true);
    // label the three aligned foods
    nodes.forEach(function(n){ if(n.grade==="A"||n.grade==="B"){ n.g.classList.add("spot");
      labsG.appendChild(el("text",{"class":"flab show",x:n.x+L.r+5,y:n.y+4,"text-anchor":"start"},n.food)); } });
    live.textContent="Only soda, apple and a smoothie come close to agreement."; }

  var BEATS=[[0,beat1],[5500,beat2],[11000,beat3],[17000,beat4],[23000,finishRun]];
  var STEPFNS=[beat1,beat2,beat3,beat4], LAST=STEPFNS.length-1;
  var rafId=null,playing=false,t0=0,idx=0,current=-1,atRest=true;
  var prevBtn=document.getElementById("prevStep"), nextBtn=document.getElementById("nextStep");
  function clearAll(){ if(rafId){cancelAnimationFrame(rafId);rafId=null;} playing=false; }
  function updateNav(){ prevBtn.disabled=(current<=0); nextBtn.disabled=(current>=LAST); }
  function setPlayLabel(t){ document.getElementById("replay").innerHTML=t; }
  function tick(now){ if(!playing) return; if(!t0) t0=now; var e=now-t0;
    while(idx<BEATS.length && e>=BEATS[idx][0]){ BEATS[idx][1](); if(idx<=LAST){current=idx;updateNav();} idx++; }
    if(idx<BEATS.length){ rafId=requestAnimationFrame(tick); } else { playing=false; rafId=null; } }
  function run(){ clearAll(); atRest=false; document.getElementById("replay").hidden=false; setPlayLabel("↻ Replay"); document.getElementById("skip").hidden=false;
    show(false); clearFx(); current=-1; idx=0; t0=0; playing=true; updateNav(); rafId=requestAnimationFrame(tick); }
  function goTo(n){ clearAll(); autoplayed=true; atRest=false; n=Math.max(0,Math.min(LAST,n)); clearFx(); STEPFNS[n](); current=n;
    document.getElementById("skip").hidden=false; document.getElementById("replay").hidden=false; setPlayLabel("↻ Replay"); updateNav(); }
  function home(){ setCap("rest"); show(true); clearFx(); document.getElementById("skip").hidden=true; document.getElementById("replay").hidden=false;
    live.textContent="20 carb foods graded on public-expert alignment; 17 of 20 a full grade apart."; }
  function finishRun(){ home(); setPlayLabel("↻ Replay the walkthrough"); }
  function jumpToEnd(){ clearAll(); atRest=true; home(); current=LAST; mark(LAST); updateNav(); }

  function fitParent(){ try{ if(window.parent && window.parent!==window) window.parent.postMessage("story-fit","*"); }catch(e){} }
  function render(){ layout(); applySvgSize(); build();
    if(atRest){ jumpToEnd(); } else if(current<0){ show(false); } else { clearFx(); STEPFNS[current](); }
    fitParent(); }

  document.getElementById("skip").addEventListener("click",function(){ jumpToEnd(); setPlayLabel("↻ Replay the walkthrough"); });
  document.getElementById("replay").addEventListener("click",run);
  prevBtn.addEventListener("click",function(){ goTo((current<0?0:current)-1); });
  nextBtn.addEventListener("click",function(){ goTo((current<0?-1:current)+1); });
  document.addEventListener("keydown",function(e){ if(e.key==="ArrowLeft") goTo((current<0?0:current)-1); else if(e.key==="ArrowRight") goTo((current<0?-1:current)+1); });

  render(); setCap("rest"); setPlayLabel("▶ Play the walkthrough"); updateNav();

  var rt=null;
  window.addEventListener("resize",function(){ if(rt) clearTimeout(rt); rt=setTimeout(render,120); });
  if("ResizeObserver" in window){ var ro=new ResizeObserver(function(){ if(rt) clearTimeout(rt); rt=setTimeout(render,120); }); ro.observe(wrap); }

  var reduced=window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches;
  var autoplayed=false, embedded=!!(window.parent && window.parent!==window);
  function maybeAutoPlay(){ if(autoplayed||reduced) return; autoplayed=true; run(); }
  window.addEventListener("message",function(e){ if(!e||!e.data) return;
    if(e.data==="play-story"){ maybeAutoPlay(); }
    else if(e.data.kind==="vph"&&e.data.h){ if(Math.abs(e.data.h-parentVpH)>4){ parentVpH=e.data.h; render(); } } });
  if(!embedded){ if("IntersectionObserver" in window){ new IntersectionObserver(function(es){ es.forEach(function(en){ if(en.isIntersecting) maybeAutoPlay(); }); },{threshold:0.4}).observe(document.getElementById("chart")); } else { maybeAutoPlay(); }
    document.addEventListener("visibilitychange", maybeAutoPlay); }
  if(reduced){ jumpToEnd(); }
})();
</script>
</body>
</html>
