<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="icon" href="data:,">
<title>What is misperception?</title>
<style>
  :root{ --ink:#1a3a2a; --ink-soft:#2a5a3a; --muted:#5e6c5e; --muted-soft:#9aaa9a;
    --paper:#fffdf8; --line:#eee8df; --focal:#9a7a2e;
    --neg:#7a5ea8; --pos:#d98a3d;   /* reserved: purple = public thinks LESS healthy, orange = MORE */
    --consumer:#2a5a8a; --expert:#1a3a2a; }
  *{box-sizing:border-box}
  html,body{margin:0;background:var(--paper);color:var(--ink);font-family:"Source Sans 3","Segoe UI",system-ui,sans-serif;}
  .wrap{max-width:820px;margin:0 auto;padding:8px 10px 12px;}
  .narrator{font-family:"Lora",Georgia,serif;font-weight:600;font-size:clamp(16px,2.2vw,21px);line-height:1.3;min-height:3.0em;margin:.1rem 0 .04rem;transition:color .5s ease;text-wrap:balance;max-width:40em;}
  .narrator .fneg{color:var(--neg);font-weight:800} .narrator .fpos{color:var(--pos);font-weight:800}
  .narrator .fcon{color:var(--consumer);font-weight:800} .narrator .fexp{color:var(--ink);font-weight:800}
  .sub{color:var(--muted);font-size:14px;min-height:.6em;line-height:1.2;}
  svg{display:block;margin:0 auto;touch-action:manipulation;}
  .axis-line{stroke:var(--ink);stroke-width:2;}
  .axend{font-size:.92em;font-weight:700;}
  .mk{opacity:0;transition:opacity .55s ease, transform .7s cubic-bezier(.2,.7,.2,1);}
  .mk.show{opacity:1;}
  .mklab{font-size:.92em;font-weight:700;}
  .gap{opacity:0;transition:opacity .55s ease;}
  .gap.show{opacity:1;}
  .kde{opacity:0;transition:opacity .55s ease;}
  .kde.show{opacity:.5;}
  .circ{opacity:0;transition:opacity .6s ease;}
  .circ.show{opacity:1;}
  .controls{display:flex;gap:12px;align-items:center;margin-top:8px;min-height:24px;}
  .btn{background:none;border:none;color:var(--ink-soft);font:inherit;font-size:.85rem;font-weight:600;cursor:pointer;padding:6px 4px;}
  .btn:hover{color:var(--ink);text-decoration:underline}
  .btn[hidden]{display:none}
  .navbtn{background:#fff;border:1.5px solid var(--line);color:var(--ink-soft);border-radius:8px;width:34px;height:32px;font-size:.85rem;font-weight:700;cursor:pointer;line-height:1;padding:0}
  .navbtn:hover:not(:disabled){border-color:var(--muted-soft);color:var(--ink)}
  .navbtn:disabled{opacity:.3;cursor:default}
  #replay{background:var(--ink);color:var(--paper);border-radius:999px;padding:8px 18px;font-weight:600;font-size:.92rem}
  #replay:hover{background:var(--ink-soft);color:var(--paper);text-decoration:none}
  .progress{display:flex;gap:6px;margin-left:auto}
  .dot{width:7px;height:7px;border-radius:50%;background:var(--line)}
  .dot.on{background:var(--focal)}
</style>
</head>
<body>
<div class="wrap">
  <div id="narrator" class="narrator"></div>
  <div id="sub" class="sub"></div>
  <svg id="chart" role="img" aria-label="What misperception means: the public's belief about a food's healthfulness versus the experts', and the gap between them">
    <g id="axis"></g>
    <g id="marks"></g>
  </svg>
  <div class="controls">
    <button id="prevStep" class="navbtn" aria-label="Previous step" title="Previous (←)">◀</button>
    <button id="nextStep" class="navbtn" aria-label="Next step" title="Next (→)">▶</button>
    <button id="skip" class="btn">Skip ▸</button>
    <button id="replay" class="btn" hidden>▶ Play the walkthrough</button>
    <div class="progress" id="progress"></div>
  </div>
  <div aria-live="polite" id="live" style="position:absolute;left:-9999px"></div>
</div>
<script>
(function(){
  "use strict";
  var NS="http://www.w3.org/2000/svg";
  function el(t,a,tx){ var e=document.createElementNS(NS,t); for(var k in a) e.setAttribute(k,a[k]); if(tx!=null) e.textContent=tx; return e; }
  function clamp(v,lo,hi){ return Math.max(lo,Math.min(hi,v)); }

  // illustrative belief positions on a 0-100 healthfulness scale. Honey: the public
  // rates it high, experts land it low-mid -> the public thinks it MORE healthy
  // (positive/orange). French fries: the public rates it low, experts call it
  // middling -> the public thinks it LESS healthy (negative/purple). These teach the
  // concept; the per-food magnitudes live in the next chart.
  var HONEY={name:"Honey", con:68, exp:35, dir:"pos"};
  var FRIES={name:"French fries", con:13, exp:42, dir:"neg"};

  var svg=document.getElementById("chart"), axisG=document.getElementById("axis"), marksG=document.getElementById("marks");
  var narrator=document.getElementById("narrator"), sub=document.getElementById("sub");
  var progress=document.getElementById("progress"), live=document.getElementById("live");
  var wrap=document.querySelector(".wrap");
  var parentVpH=0;

  var CAP={
    rest:{t:"Misperception is the gap between what the public believes and what the experts say.", s:""},
    b1:{t:"Ask the public to rate a food &mdash; less healthy to more healthy. For <b>honey</b>, most land it high: <b class='fcon'>the public says healthy</b>.", s:""},
    b2:{t:"Now the experts &mdash; five rating systems harmonized into the meta-NPS. They put honey much lower: <b class='fexp'>only middling</b>.", s:""},
    b3:{t:"The distance between them is <b>misperception</b>. The public sits higher, so they think honey <b class='fpos'>more healthy</b> than the experts do &mdash; positive, <b class='fpos'>orange</b>.", s:""},
    b4:{t:"Flip it. <b>French fries</b>: the public rates it low, the experts call it middling &mdash; the public is the harsher one. That gap is <b class='fneg'>less healthy</b> than experts &mdash; negative, <b class='fneg'>purple</b>.", s:""},
    b5:{t:"Every food gets a gap like this: a <b>direction</b> (<b class='fneg'>purple</b> harsher, <b class='fpos'>orange</b> kinder) and a <b>size</b> &mdash; how far apart. Twenty foods, twenty gaps.", s:""}
  };
  function setCap(k){ var c=CAP[k]; narrator.innerHTML=c.t; sub.innerHTML=c.s||""; }

  var MAXW=760, MINW=300, L={};
  function layout(){
    var availW=Math.max(MINW, wrap.clientWidth-20), W=clamp(availW,MINW,MAXW);
    var F=clamp(13+(W-MINW)*(16-13)/(MAXW-MINW),13,16);
    var ML=Math.round(F*1.2), MR=Math.round(F*1.2);
    var vpH=parentVpH||window.innerHeight||700;
    var availH=Math.round(vpH*0.92)-150;
    var plotH=clamp(availH,210,330);
    var X0=ML, X1=W-MR, axisY=Math.round(plotH*0.52)+10;
    L={W:W,F:F,X0:X0,X1:X1,axisY:axisY,plotH:plotH+20,H:plotH+20,
       conY:axisY-Math.round(plotH*0.30), expY:axisY+Math.round(plotH*0.30)};
  }
  function fx(v){ return L.X0 + (v/100)*(L.X1-L.X0); }
  function applySvgSize(){ svg.setAttribute("width",L.W); svg.setAttribute("height",L.H);
    svg.setAttribute("viewBox","0 0 "+L.W+" "+L.H); svg.style.width=L.W+"px"; svg.style.height=L.H+"px"; svg.style.fontSize=L.F+"px"; }

  function drawAxis(){
    axisG.innerHTML="";
    axisG.appendChild(el("line",{"class":"axis-line",x1:L.X0,y1:L.axisY,x2:L.X1,y2:L.axisY}));
    axisG.appendChild(el("text",{"class":"axend",x:L.X0,y:L.axisY+Math.round(L.F*1.6),"text-anchor":"start",fill:"var(--neg)"},"◂ less healthy"));
    axisG.appendChild(el("text",{"class":"axend",x:L.X1,y:L.axisY+Math.round(L.F*1.6),"text-anchor":"end",fill:"var(--pos)"},"more healthy ▸"));
    axisG.appendChild(el("text",{"class":"axend",x:(L.X0+L.X1)/2,y:L.axisY+Math.round(L.F*1.6),"text-anchor":"middle",fill:"var(--muted)"},"healthfulness"));
  }

  // a soft "belief" bump (kde-ish) + a labelled marker
  function bump(cx,cy,w,h,fill,cls){ var g=el("g",{"class":cls});
    g.appendChild(el("path",{d:"M"+(cx-w)+","+cy+" Q"+cx+","+(cy-h)+" "+(cx+w)+","+cy+" Z",fill:fill,"fill-opacity":.5})); return g; }
  function marker(cx,y,fill,label,labAbove){ var g=el("g",{"class":"mk"});
    g.appendChild(el("line",{x1:cx,y1:y,x2:cx,y2:L.axisY,stroke:fill,"stroke-width":2,"stroke-dasharray":"2 3","stroke-opacity":.7}));
    g.appendChild(el("circle",{cx:cx,cy:y,r:7,fill:fill,stroke:"var(--paper)","stroke-width":2}));
    g.appendChild(el("text",{"class":"mklab",x:cx,y:y+(labAbove?-12:20),"text-anchor":"middle",fill:fill},label));
    return g; }

  var els={};
  function build(){
    marksG.innerHTML=""; els={};
    var mid=fx(50);
    // gap rect (between consumer and expert, at axis) — init centered, zero-width
    els.gap=el("rect",{"class":"gap",x:mid,width:0,y:L.axisY-9,height:18,rx:3});
    marksG.appendChild(els.gap);
    // consumer bump + marker (above), expert marker (below) — init centered so the
    // hidden (opacity-0) elements never extend past the viewBox edges
    els.conKde=bump(mid,L.conY+22,42,30,"var(--consumer)","kde"); marksG.appendChild(els.conKde);
    els.con=marker(mid,L.conY,"var(--consumer)","the public",true); marksG.appendChild(els.con);
    els.exp=marker(mid,L.expY,"var(--expert)","the experts",false); marksG.appendChild(els.exp);
    // the resulting dual circle (summary), drawn at right
    els.circ=el("g",{"class":"circ"}); marksG.appendChild(els.circ);
  }

  function placeMarker(g,cx,y){ // move marker group to cx (line + circle + label share x)
    g.querySelector("line").setAttribute("x1",cx); g.querySelector("line").setAttribute("x2",cx); g.querySelector("line").setAttribute("y1",y);
    g.querySelector("circle").setAttribute("cx",cx); g.querySelector("circle").setAttribute("cy",y);
    g.querySelector("text").setAttribute("x",cx);
  }
  function setGap(a,b,dir){ var x0=Math.min(a,b),w=Math.abs(b-a);
    els.gap.setAttribute("x",x0); els.gap.setAttribute("width",w);
    els.gap.setAttribute("fill", dir==="pos"?"var(--pos)":"var(--neg)"); els.gap.setAttribute("fill-opacity",.35); }
  function showCirc(food){ els.circ.innerHTML="";
    var cx=L.X1-28, cy=L.conY, r=20, negFrac=food.dir==="pos"?0.12:0.88;   // fixed top-right; never collides with the markers
    var a0=-Math.PI/2,a1=a0+2*Math.PI*negFrac;
    function seg(s,e,fill){ var x0=cx+r*Math.cos(s),y0=cy+r*Math.sin(s),x1=cx+r*Math.cos(e),y1=cy+r*Math.sin(e),big=(e-s)>Math.PI?1:0;
      return el("path",{d:"M"+cx+","+cy+" L"+x0+","+y0+" A"+r+","+r+" 0 "+big+" 1 "+x1+","+y1+" Z",fill:fill}); }
    els.circ.appendChild(seg(a0,a1,"var(--neg)")); els.circ.appendChild(seg(a1,a0+2*Math.PI,"var(--pos)"));
    els.circ.appendChild(el("text",{x:cx,y:cy-r-6,"text-anchor":"middle","font-size":".82em","font-weight":700,fill:"var(--ink)"},food.name));
  }

  function show(o,on){ o.classList.toggle("show",!!on); }
  function reset(){ [els.con,els.exp].forEach(function(m){ m.classList.remove("show"); }); els.gap.classList.remove("show"); els.conKde.classList.remove("show"); els.circ.classList.remove("show"); }

  var STEPS=["b1","b2","b3","b4","b5"];
  STEPS.forEach(function(){ var d=document.createElement("div"); d.className="dot"; progress.appendChild(d); });
  function mark(i){ var d=progress.children; for(var k=0;k<d.length;k++) d[k].className="dot"+(k<=i?" on":""); }

  function beat1(){ setCap("b1"); mark(0); reset();
    placeMarker(els.con,fx(HONEY.con),L.conY); els.conKde.querySelector("path").setAttribute("d","M"+(fx(HONEY.con)-42)+","+(L.conY+22)+" Q"+fx(HONEY.con)+","+(L.conY-8)+" "+(fx(HONEY.con)+42)+","+(L.conY+22)+" Z");
    show(els.con,true); show(els.conKde,true);
    live.textContent="The public rates honey high on healthfulness."; }
  function beat2(){ setCap("b2"); mark(1);
    placeMarker(els.con,fx(HONEY.con),L.conY); placeMarker(els.exp,fx(HONEY.exp),L.expY);
    show(els.con,true); show(els.conKde,true); show(els.exp,true);
    live.textContent="The experts place honey only middling."; }
  function beat3(){ setCap("b3"); mark(2);
    placeMarker(els.con,fx(HONEY.con),L.conY); placeMarker(els.exp,fx(HONEY.exp),L.expY);
    show(els.con,true); show(els.conKde,true); show(els.exp,true);
    setGap(fx(HONEY.exp),fx(HONEY.con),"pos"); show(els.gap,true);
    showCirc(HONEY); show(els.circ,true);
    live.textContent="The public thinks honey more healthy than experts: positive misperception, orange."; }
  function beat4(){ setCap("b4"); mark(3);
    placeMarker(els.con,fx(FRIES.con),L.conY); placeMarker(els.exp,fx(FRIES.exp),L.expY);
    els.conKde.querySelector("path").setAttribute("d","M"+(fx(FRIES.con)-42)+","+(L.conY+22)+" Q"+fx(FRIES.con)+","+(L.conY-8)+" "+(fx(FRIES.con)+42)+","+(L.conY+22)+" Z");
    show(els.con,true); show(els.conKde,true); show(els.exp,true);
    setGap(fx(FRIES.con),fx(FRIES.exp),"neg"); show(els.gap,true);
    showCirc(FRIES); show(els.circ,true);
    live.textContent="The public thinks French fries less healthy than experts: negative misperception, purple."; }
  function beat5(){ setCap("b5"); mark(4);
    // show both circles as the takeaway
    els.circ.innerHTML=""; reset(); show(els.circ,true);
    [HONEY,FRIES].forEach(function(food){
      var cx=fx(food===HONEY?70:30), cy=L.axisY, r=22, negFrac=food.dir==="pos"?0.12:0.88, a0=-Math.PI/2,a1=a0+2*Math.PI*negFrac;
      function seg(s,e,fill){ var x0=cx+r*Math.cos(s),y0=cy+r*Math.sin(s),x1=cx+r*Math.cos(e),y1=cy+r*Math.sin(e),big=(e-s)>Math.PI?1:0;
        return el("path",{d:"M"+cx+","+cy+" L"+x0+","+y0+" A"+r+","+r+" 0 "+big+" 1 "+x1+","+y1+" Z",fill:fill}); }
      els.circ.appendChild(seg(a0,a1,"var(--neg)")); els.circ.appendChild(seg(a1,a0+2*Math.PI,"var(--pos)"));
      els.circ.appendChild(el("text",{x:cx,y:cy+r+16,"text-anchor":"middle","font-size":".82em","font-weight":700,fill:"var(--ink)"},food.name));
    });
    live.textContent="Each food gets a gap: a direction and a size. Twenty foods, twenty gaps."; }

  var BEATS=[[0,beat1],[6000,beat2],[11500,beat3],[18000,beat4],[24000,beat5],[30000,finishRun]];
  var STEPFNS=[beat1,beat2,beat3,beat4,beat5], LAST=STEPFNS.length-1;
  var rafId=null,playing=false,t0=0,idx=0,current=-1,atRest=true;
  var prevBtn=document.getElementById("prevStep"), nextBtn=document.getElementById("nextStep");
  function clearAll(){ if(rafId){cancelAnimationFrame(rafId);rafId=null;} playing=false; }
  function updateNav(){ prevBtn.disabled=(current<=0); nextBtn.disabled=(current>=LAST); }
  function setPlayLabel(t){ document.getElementById("replay").innerHTML=t; }
  function tick(now){ if(!playing) return; if(!t0) t0=now; var e=now-t0;
    while(idx<BEATS.length && e>=BEATS[idx][0]){ BEATS[idx][1](); if(idx<=LAST){current=idx;updateNav();} idx++; }
    if(idx<BEATS.length){ rafId=requestAnimationFrame(tick); } else { playing=false; rafId=null; } }
  function run(){ clearAll(); atRest=false; document.getElementById("replay").hidden=false; setPlayLabel("↻ Replay"); document.getElementById("skip").hidden=false;
    reset(); current=-1; idx=0; t0=0; playing=true; updateNav(); rafId=requestAnimationFrame(tick); }
  function goTo(n){ clearAll(); autoplayed=true; atRest=false; n=Math.max(0,Math.min(LAST,n)); reset(); STEPFNS[n](); current=n;
    document.getElementById("skip").hidden=false; document.getElementById("replay").hidden=false; setPlayLabel("↻ Replay"); updateNav(); }
  function home(){ beat5(); setCap("rest"); document.getElementById("skip").hidden=true; document.getElementById("replay").hidden=false;
    live.textContent="Misperception is the gap between public belief and expert verdict, with a direction and a size."; }
  function finishRun(){ home(); setPlayLabel("↻ Replay the walkthrough"); }
  function jumpToEnd(){ clearAll(); atRest=true; home(); current=LAST; mark(LAST); updateNav(); }

  function fitParent(){ try{ if(window.parent && window.parent!==window) window.parent.postMessage("story-fit","*"); }catch(e){} }
  function render(){ layout(); applySvgSize(); drawAxis(); build();
    if(atRest){ jumpToEnd(); } else if(current<0){ reset(); } else { reset(); STEPFNS[current](); }
    fitParent(); }

  document.getElementById("skip").addEventListener("click",function(){ jumpToEnd(); setPlayLabel("↻ Replay the walkthrough"); });
  document.getElementById("replay").addEventListener("click",run);
  prevBtn.addEventListener("click",function(){ goTo((current<0?0:current)-1); });
  nextBtn.addEventListener("click",function(){ goTo((current<0?-1:current)+1); });
  document.addEventListener("keydown",function(e){ if(e.key==="ArrowLeft") goTo((current<0?0:current)-1); else if(e.key==="ArrowRight") goTo((current<0?-1:current)+1); });

  render(); setCap("rest"); setPlayLabel("▶ Play the walkthrough"); updateNav();

  var rt=null;
  window.addEventListener("resize",function(){ if(rt) clearTimeout(rt); rt=setTimeout(render,120); });
  if("ResizeObserver" in window){ var ro=new ResizeObserver(function(){ if(rt) clearTimeout(rt); rt=setTimeout(render,120); }); ro.observe(wrap); }

  var reduced=window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches;
  var autoplayed=false, embedded=!!(window.parent && window.parent!==window);
  function maybeAutoPlay(){ if(autoplayed||reduced) return; autoplayed=true; run(); }
  window.addEventListener("message",function(e){ if(!e||!e.data) return;
    if(e.data==="play-story"){ maybeAutoPlay(); }
    else if(e.data.kind==="vph"&&e.data.h){ if(Math.abs(e.data.h-parentVpH)>4){ parentVpH=e.data.h; render(); } } });
  if(!embedded){ if("IntersectionObserver" in window){ new IntersectionObserver(function(es){ es.forEach(function(en){ if(en.isIntersecting) maybeAutoPlay(); }); },{threshold:0.4}).observe(document.getElementById("chart")); } else { maybeAutoPlay(); }
    document.addEventListener("visibilitychange", maybeAutoPlay); }
  if(reduced){ jumpToEnd(); }
})();
</script>
</body>
</html>
