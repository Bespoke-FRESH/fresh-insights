<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="icon" href="data:,">
<title>What is misperception?</title>
<style>
  :root{ --ink:#1a3a2a; --ink-soft:#2a5a3a; --muted:#5e6c5e; --muted-soft:#9aaa9a;
    --paper:#fffdf8; --line:#eee8df; --focal:#9a7a2e;
    --neg:#7a5ea8; --pos:#d98a3d; --expert:#2a3a32; }
  *{box-sizing:border-box}
  html,body{margin:0;background:var(--paper);color:var(--ink);font-family:"Source Sans 3","Segoe UI",system-ui,sans-serif;}
  .wrap{max-width:820px;margin:0 auto;padding:8px 10px 12px;}
  .narrator{font-family:"Lora",Georgia,serif;font-weight:600;font-size:clamp(16px,2.2vw,21px);line-height:1.3;min-height:2.7em;margin:.1rem 0 .04rem;transition:color .5s ease;text-wrap:balance;max-width:41em;}
  .narrator .fneg{color:var(--neg);font-weight:800} .narrator .fpos{color:var(--pos);font-weight:800} .narrator .fexp{color:var(--expert);font-weight:800}
  .sub{color:var(--muted);font-size:14px;min-height:.6em;line-height:1.2;}
  svg{display:block;margin:0 auto;touch-action:manipulation;}
  .axis-line{stroke:var(--ink);stroke-width:2.5;}
  .axend{font-size:.9em;font-weight:700;}
  .lab{font-size:.86em;font-weight:700;}
  .g{opacity:0;transition:opacity .55s ease;} .g.show{opacity:1;}
  .controls{display:flex;gap:12px;align-items:center;margin-top:8px;min-height:24px;}
  .btn{background:none;border:none;color:var(--ink-soft);font:inherit;font-size:.85rem;font-weight:600;cursor:pointer;padding:6px 4px;}
  .btn:hover{color:var(--ink);text-decoration:underline}.btn[hidden]{display:none}
  .navbtn{background:#fff;border:1.5px solid var(--line);color:var(--ink-soft);border-radius:8px;width:34px;height:32px;font-size:.85rem;font-weight:700;cursor:pointer;line-height:1;padding:0}
  .navbtn:hover:not(:disabled){border-color:var(--muted-soft);color:var(--ink)}.navbtn:disabled{opacity:.3;cursor:default}
  .btn:focus-visible,.navbtn:focus-visible,#replay:focus-visible{outline:2.5px solid var(--focal);outline-offset:2px;border-radius:6px}
  #replay{background:var(--ink);color:var(--paper);border-radius:999px;padding:8px 18px;font-weight:600;font-size:.92rem}
  #replay:hover{background:var(--ink-soft);color:var(--paper);text-decoration:none}
  .progress{display:flex;gap:6px;margin-left:auto}.dot{width:7px;height:7px;border-radius:50%;background:var(--line)}.dot.on{background:var(--focal)}
</style>
</head>
<body>
<div class="wrap">
  <div id="narrator" class="narrator"></div>
  <div id="sub" class="sub"></div>
  <svg id="chart" role="img" aria-label="How misperception works: experts sit at one point on a healthfulness line; one consumer reads the food less healthy (negative), another more healthy (positive)">
    <g id="axis"></g><g id="exp" class="g"></g><g id="cneg" class="g"></g><g id="cpos" class="g"></g><g id="agg" class="g"></g>
  </svg>
  <div class="controls">
    <button id="prevStep" class="navbtn" aria-label="Previous step" title="Previous (←)">◀</button>
    <button id="nextStep" class="navbtn" aria-label="Next step" title="Next (→)">▶</button>
    <button id="skip" class="btn">Skip ▸</button>
    <button id="replay" class="btn" hidden>▶ Play the walkthrough</button>
    <div class="progress" id="progress"></div>
  </div>
  <div aria-live="polite" id="live" style="position:absolute;left:-9999px"></div>
</div>
<script>
(function(){
  "use strict";
  var NS="http://www.w3.org/2000/svg";
  function el(t,a,tx){ var e=document.createElementNS(NS,t); for(var k in a) e.setAttribute(k,a[k]); if(tx!=null) e.textContent=tx; return e; }
  function clamp(v,lo,hi){ return Math.max(lo,Math.min(hi,v)); }

  // Whole-wheat bread on a healthfulness line. Experts (meta-NPS) sit healthy-ish;
  // one example person reads it less healthy (negative), one more healthy (positive).
  // Aggregate over ~450 people: negative outweighs positive (real values 16 vs 9).
  var EXPX=53, NEGX=28, POSX=86;   // experts at bread's real expert position (FRI_100 ~53)

  var svg=document.getElementById("chart"), axisG=document.getElementById("axis"),
      expG=document.getElementById("exp"), cnegG=document.getElementById("cneg"), cposG=document.getElementById("cpos"), aggG=document.getElementById("agg");
  var narrator=document.getElementById("narrator"), sub=document.getElementById("sub");
  var progress=document.getElementById("progress"), live=document.getElementById("live");
  var wrap=document.querySelector(".wrap");
  var parentVpH=0;

  var CAP={
    rest:{t:"Misperception is just this: where people place a food, relative to where the experts place it.", s:""},
    b1:{t:"Put healthfulness on a line. The <b class='fexp'>experts</b> &mdash; the meta-NPS &mdash; place whole-wheat bread about here.", s:""},
    b2:{t:"One person reads it as <b class='fneg'>less healthy</b> than the experts. That gap, pointing down, is <b class='fneg'>negative perception</b>.", s:""},
    b3:{t:"Another reads it as <b class='fpos'>more healthy</b>. That gap, pointing up, is <b class='fpos'>positive perception</b>.", s:""},
    b4:{t:"Across everyone, the gaps add up. For bread, <b class='fneg'>negative</b> outweighs <b class='fpos'>positive</b> &mdash; people see it as less healthy than the experts do.", s:""}
  };
  function setCap(k){ var c=CAP[k]; narrator.innerHTML=c.t; sub.innerHTML=c.s||""; }

  var MAXW=760, MINW=300, L={};
  function layout(){
    var availW=Math.max(MINW, wrap.clientWidth-20), W=clamp(availW,MINW,MAXW);
    var F=clamp(13+(W-MINW)*(16-13)/(MAXW-MINW),13,16);
    var ML=Math.round(F*2.6), MR=Math.round(F*2.6);
    var vpH=parentVpH||window.innerHeight||700, availH=Math.round(vpH*0.92)-150;
    var plotH=clamp(availH,210,300);
    L={W:W,F:F,X0:ML,X1:W-MR,lineY:Math.round(plotH*0.56),H:plotH};
  }
  function fx(v){ return L.X0 + (v/100)*(L.X1-L.X0); }
  function applySvgSize(){ svg.setAttribute("width",L.W); svg.setAttribute("height",L.H);
    svg.setAttribute("viewBox","0 0 "+L.W+" "+L.H); svg.style.width=L.W+"px"; svg.style.height=L.H+"px"; svg.style.fontSize=L.F+"px"; }

  function drawAxis(){ axisG.innerHTML="";
    var y=L.lineY;
    axisG.appendChild(el("line",{"class":"axis-line",x1:L.X0,y1:y,x2:L.X1,y2:y}));
    axisG.appendChild(el("text",{"class":"axend",x:L.X0,y:y+Math.round(L.F*1.7),"text-anchor":"start",fill:"var(--neg)"},"◂ less healthy"));
    axisG.appendChild(el("text",{"class":"axend",x:L.X1,y:y+Math.round(L.F*1.7),"text-anchor":"end",fill:"var(--pos)"},"more healthy ▸"));
  }

  // a labelled dot on the line
  function dot(g,x,fill,label,labelBelow){
    var y=L.lineY;
    g.appendChild(el("circle",{cx:fx(x),cy:y,r:7,fill:fill,stroke:"var(--paper)","stroke-width":2}));
    var ly = labelBelow ? y+Math.round(L.F*2.9) : y-Math.round(L.F*2.0);
    g.appendChild(el("text",{"class":"lab",x:fx(x),y:ly,"text-anchor":"middle",fill:fill},label));
  }
  // a vertical gap arrow from the consumer up/down toward the expert level, colour-coded
  function gapArrow(g,x,color,down){
    var y=L.lineY, len=Math.round(L.H*0.20), tipY=down? y+len : y-len, headX=fx(x);
    g.appendChild(el("line",{x1:headX,y1:y,x2:headX,y2:tipY,stroke:color,"stroke-width":3}));
    var hy=tipY, dir=down?-1:1;
    g.appendChild(el("path",{d:"M"+(headX-5)+","+(hy+dir*7)+" L"+headX+","+hy+" L"+(headX+5)+","+(hy+dir*7)+" Z",fill:color}));
    // a thin connector back to the expert position so the "relative to experts" reading is explicit
    g.appendChild(el("line",{x1:headX,y1:tipY,x2:fx(EXPX),y2:tipY,stroke:color,"stroke-width":1.4,"stroke-dasharray":"3 3","stroke-opacity":.7}));
  }
  function expert(g){
    var y=L.lineY;
    g.appendChild(el("line",{x1:fx(EXPX),y1:y-Math.round(L.H*0.30),x2:fx(EXPX),y2:y+Math.round(L.H*0.30),stroke:"var(--expert)","stroke-width":2,"stroke-dasharray":"4 3"}));
    g.appendChild(el("circle",{cx:fx(EXPX),cy:y,r:7.5,fill:"var(--expert)",stroke:"var(--paper)","stroke-width":2}));
    g.appendChild(el("text",{"class":"lab",x:fx(EXPX),y:y-Math.round(L.H*0.30)-6,"text-anchor":"middle",fill:"var(--expert)"},"experts (meta-NPS)"));
  }

  function build(){
    expG.innerHTML=""; cnegG.innerHTML=""; cposG.innerHTML=""; aggG.innerHTML="";
    expert(expG);
    // negative consumer (below experts): dot + downward purple gap arrow + label
    gapArrow(cnegG, NEGX, "var(--neg)", true);
    dot(cnegG, NEGX, "var(--neg)", "one person", true);
    cnegG.appendChild(el("text",{"class":"lab",x:fx((NEGX+EXPX)/2),y:L.lineY+Math.round(L.H*0.20)+Math.round(L.F*1.5),"text-anchor":"middle",fill:"var(--neg)"},"negative perception"));
    // positive consumer (above experts): dot + upward orange gap arrow + label
    gapArrow(cposG, POSX, "var(--pos)", false);
    dot(cposG, POSX, "var(--pos)", "another person", false);
    cposG.appendChild(el("text",{"class":"lab",x:fx((POSX+EXPX)/2),y:L.lineY-Math.round(L.H*0.20)-Math.round(L.F*0.7),"text-anchor":"middle",fill:"var(--pos)"},"positive perception"));
    // aggregate: many faint people, more on the negative side
    var pts=[12,18,22,26,30,36,42,48,55,70,82,90];
    pts.forEach(function(p){ aggG.appendChild(el("circle",{cx:fx(p),cy:L.lineY,r:4.5,fill:(p<EXPX?"var(--neg)":"var(--pos)"),"fill-opacity":.4})); });
    aggG.appendChild(el("text",{"class":"lab",x:fx(28),y:L.lineY+Math.round(L.H*0.32),"text-anchor":"middle",fill:"var(--neg)"},"most people land below"));
  }

  var STEPS=["b1","b2","b3","b4"];
  STEPS.forEach(function(){ var d=document.createElement("div"); d.className="dot"; progress.appendChild(d); });
  function mark(i){ var d=progress.children; for(var k=0;k<d.length;k++) d[k].className="dot"+(k<=i?" on":""); }
  function show(g,on){ g.classList.toggle("show",!!on); }

  function beat1(){ setCap("b1"); mark(0); show(expG,true); show(cnegG,false); show(cposG,false); show(aggG,false);
    live.textContent="Experts place the food at one point on the healthfulness line."; }
  function beat2(){ setCap("b2"); mark(1); show(expG,true); show(cnegG,true); show(cposG,false); show(aggG,false);
    live.textContent="One person reads it less healthy than the experts: negative perception."; }
  function beat3(){ setCap("b3"); mark(2); show(expG,true); show(cnegG,true); show(cposG,true); show(aggG,false);
    live.textContent="Another reads it more healthy: positive perception."; }
  function beat4(){ setCap("b4"); mark(3); show(expG,true); show(cnegG,false); show(cposG,false); show(aggG,true);
    live.textContent="Across everyone, negative outweighs positive for bread."; }

  var BEATS=[[0,beat1],[5500,beat2],[11000,beat3],[16500,beat4],[22500,finishRun]];
  var STEPFNS=[beat1,beat2,beat3,beat4], LAST=STEPFNS.length-1;
  var rafId=null,playing=false,t0=0,idx=0,current=-1,atRest=true;
  var prevBtn=document.getElementById("prevStep"), nextBtn=document.getElementById("nextStep");
  function clearAll(){ if(rafId){cancelAnimationFrame(rafId);rafId=null;} playing=false; }
  function updateNav(){ prevBtn.disabled=(current<=0); nextBtn.disabled=(current>=LAST); }
  function setPlayLabel(t){ document.getElementById("replay").innerHTML=t; }
  function tick(now){ if(!playing) return; if(!t0) t0=now; var e=now-t0;
    while(idx<BEATS.length && e>=BEATS[idx][0]){ BEATS[idx][1](); if(idx<=LAST){current=idx;updateNav();} idx++; }
    if(idx<BEATS.length){ rafId=requestAnimationFrame(tick); } else { playing=false; rafId=null; } }
  function run(){ clearAll(); atRest=false; document.getElementById("replay").hidden=false; setPlayLabel("↻ Replay"); document.getElementById("skip").hidden=false;
    show(expG,false); show(cnegG,false); show(cposG,false); show(aggG,false); current=-1; idx=0; t0=0; playing=true; updateNav(); rafId=requestAnimationFrame(tick); }
  function goTo(n){ clearAll(); autoplayed=true; atRest=false; n=Math.max(0,Math.min(LAST,n)); STEPFNS[n](); current=n;
    document.getElementById("skip").hidden=false; document.getElementById("replay").hidden=false; setPlayLabel("↻ Replay"); updateNav(); }
  function home(){ beat3(); setCap("rest"); document.getElementById("skip").hidden=true; document.getElementById("replay").hidden=false;
    live.textContent="Misperception is where people place a food relative to the experts: one reads it less healthy, another more healthy."; }
  function finishRun(){ home(); setPlayLabel("↻ Replay the walkthrough"); }
  function jumpToEnd(){ clearAll(); atRest=true; home(); current=LAST; mark(LAST); updateNav(); }

  function fitParent(){ try{ if(window.parent && window.parent!==window) window.parent.postMessage("story-fit","*"); }catch(e){} }
  function render(){ layout(); applySvgSize(); drawAxis(); build();
    if(atRest){ jumpToEnd(); } else if(current<0){ show(expG,false); show(cnegG,false); show(cposG,false); show(aggG,false); } else { STEPFNS[current](); }
    fitParent(); }

  document.getElementById("skip").addEventListener("click",function(){ jumpToEnd(); setPlayLabel("↻ Replay the walkthrough"); });
  document.getElementById("replay").addEventListener("click",run);
  prevBtn.addEventListener("click",function(){ goTo((current<0?0:current)-1); });
  nextBtn.addEventListener("click",function(){ goTo((current<0?-1:current)+1); });
  document.addEventListener("keydown",function(e){ if(e.key==="ArrowLeft") goTo((current<0?0:current)-1); else if(e.key==="ArrowRight") goTo((current<0?-1:current)+1); });

  render(); setCap("rest"); setPlayLabel("▶ Play the walkthrough"); updateNav();
  var rt=null;
  window.addEventListener("resize",function(){ if(rt) clearTimeout(rt); rt=setTimeout(render,120); });
  if("ResizeObserver" in window){ var ro=new ResizeObserver(function(){ if(rt) clearTimeout(rt); rt=setTimeout(render,120); }); ro.observe(wrap); }
  var reduced=window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches;
  var autoplayed=false, embedded=!!(window.parent && window.parent!==window);
  function maybeAutoPlay(){ if(autoplayed||reduced) return; autoplayed=true; run(); }
  window.addEventListener("message",function(e){ if(!e||!e.data) return;
    if(e.data==="play-story"){ maybeAutoPlay(); } else if(e.data.kind==="vph"&&e.data.h){ if(Math.abs(e.data.h-parentVpH)>4){ parentVpH=e.data.h; render(); } } });
  if(!embedded){ if("IntersectionObserver" in window){ new IntersectionObserver(function(es){ es.forEach(function(en){ if(en.isIntersecting) maybeAutoPlay(); }); },{threshold:0.4}).observe(document.getElementById("chart")); } else { maybeAutoPlay(); }
    document.addEventListener("visibilitychange", maybeAutoPlay); }
  if(reduced){ jumpToEnd(); }
})();
</script>
</body>
</html>
