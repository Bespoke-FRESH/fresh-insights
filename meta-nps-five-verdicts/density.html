<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Five systems, five food supplies</title>
<style>
  :root{ --ink:#1a3a2a; --ink-soft:#2a5a3a; --muted:#6b7b6b; --muted-soft:#9aaa9a;
    --paper:#fffdf8; --line:#eee8df; --gold:#c8a24a; --healthy:#3f7d52; --unhealthy:#b4532f; --uncertain:#7a6cae; }
  *{box-sizing:border-box}
  html,body{margin:0;background:var(--paper);color:var(--ink);font-family:"Source Sans 3","Segoe UI",system-ui,sans-serif;}
  .wrap{max-width:840px;margin:0 auto;padding:8px 10px 14px;}
  .narrator{font-family:"Lora",Georgia,serif;font-weight:600;font-size:clamp(1.3rem,3.2vw,1.8rem);line-height:1.3;min-height:2.5em;margin:.2rem 0 .15rem;transition:color .5s ease;text-wrap:balance;}
  .sub{color:var(--muted);font-size:1rem;min-height:1.3em;}
  svg{width:100%;height:auto;display:block;touch-action:manipulation;}
  .axis-line{stroke:var(--ink);stroke-width:1.4;}
  .axis-label{fill:var(--ink);font-size:17px;font-weight:600;}
  .tick{fill:var(--muted);font-size:13px;}
  .curve{opacity:0;transition:opacity .8s ease;}
  .curve.show{opacity:1;}
  .curve path{fill-opacity:.14;stroke-width:2.6;stroke-linejoin:round;}
  .clabel{font-size:15px;font-weight:700;opacity:0;transition:opacity .8s ease;}
  .clabel.show{opacity:1;}
  .cue{opacity:0;transition:opacity .8s ease;}
  .cue.show{opacity:1;}
  .cuelab{font-size:15px;font-weight:700;}
  .cuelab2{font-size:13px;}
  .controls{display:flex;gap:12px;align-items:center;margin-top:6px;min-height:30px;}
  .btn{background:none;border:none;color:var(--ink-soft);font:inherit;font-size:.85rem;font-weight:600;cursor:pointer;padding:2px 0;}
  .btn:hover{color:var(--ink);text-decoration:underline}
  .btn[hidden]{display:none}
  .navbtn{background:#fff;border:1.5px solid var(--line);color:var(--ink-soft);border-radius:8px;width:34px;height:30px;font-size:.85rem;font-weight:700;cursor:pointer;line-height:1;padding:0}
  .navbtn:hover:not(:disabled){border-color:var(--muted-soft);color:var(--ink)}
  .navbtn:disabled{opacity:.3;cursor:default}
  #replay{background:var(--ink);color:var(--paper);border-radius:999px;padding:8px 18px;font-weight:600;font-size:.92rem}
  #replay:hover{background:var(--ink-soft);color:var(--paper);text-decoration:none}
  .progress{display:flex;gap:6px;margin-left:auto}
  .dot{width:7px;height:7px;border-radius:50%;background:var(--line)}
  .dot.on{background:var(--gold)}
</style>
</head>
<body>
<div class="wrap">
  <div id="narrator" class="narrator"></div>
  <div id="sub" class="sub"></div>

  <svg id="chart" viewBox="0 0 760 470" role="img" aria-label="Healthfulness-score distributions of ~6,450 foods under five expert systems">
    <line class="axis-line" x1="70" y1="400" x2="734" y2="400"/>
    <line class="axis-line" x1="70" y1="50"  x2="70"  y2="400"/>
    <text class="axis-label" x="402" y="445" text-anchor="middle">How healthy the system rates a food  (0–100)  →</text>
    <text class="axis-label" transform="rotate(-90 22 225)" x="22" y="225" text-anchor="middle">Share of the food supply  →</text>
    <text class="tick" x="70"  y="418" text-anchor="middle">0</text>
    <text class="tick" x="402" y="418" text-anchor="middle">50</text>
    <text class="tick" x="734" y="418" text-anchor="middle">100</text>
    <g id="curves"></g>
    <g id="cue" class="cue"></g>
  </svg>

  <div class="controls">
    <button id="prevStep" class="navbtn" aria-label="Previous point" title="Previous (←)">◀</button>
    <button id="nextStep" class="navbtn" aria-label="Next point" title="Next (→)">▶</button>
    <button id="skip" class="btn">Skip ▸</button>
    <button id="replay" class="btn" hidden>▶ Play the walkthrough</button>
    <div class="progress" id="progress"></div>
  </div>
</div>

    for(var i=0;i<P.length-1;i++){
      var p0=P[i>0?i-1:i], p1=P[i], p2=P[i+1], p3=P[i+2<P.length?i+2:i+1];
      var c1x=p1[0]+(p2[0]-p0[0])/6, c1y=p1[1]+(p2[1]-p0[1])/6;
      var c2x=p2[0]-(p3[0]-p1[0])/6, c2y=p2[1]-(p3[1]-p1[1])/6;
      s+=" C "+c1x.toFixed(1)+","+c1y.toFixed(1)+" "+c2x.toFixed(1)+","+c2y.toFixed(1)+" "+p2[0].toFixed(1)+","+p2[1].toFixed(1);
    }
    return s+" L "+fx(100)+","+fy(0)+" L "+fx(0)+","+fy(0)+" Z";
  }

  var nodes=[];
  function build(){
    SYS.forEach(function(s,i){
      var g=el("g",{"class":"curve","data-i":i});
      g.appendChild(el("path",{fill:s.color, stroke:s.color}));
      g.appendChild(el("text",{"class":"clabel","text-anchor":"middle",fill:s.color}, s.name));
      curvesG.appendChild(g); nodes.push(g);
    });
    redraw();
  }
  function redraw(){
    SYS.forEach(function(s,i){
      nodes[i].querySelector("path").setAttribute("d", smoothPath(s.d));
      var pk=s.d.indexOf(Math.max.apply(null,s.d)), lab=nodes[i].querySelector(".clabel");
      lab.setAttribute("x", Math.min(704,Math.max(82,fx(GRID[pk]))));
      lab.setAttribute("y", Math.max(64, fy(s.d[pk])-9));
    });
  }
  function setScale(target){          // smooth per-beat y-zoom
    if(scaleRaf) cancelAnimationFrame(scaleRaf);
    var from=curMax, t0=null, dur=700;
    function step(now){ if(t0===null) t0=now; var p=Math.min(1,(now-t0)/dur);
      var e=p<0.5?2*p*p:1-Math.pow(-2*p+2,2)/2;
      curMax=from+(target-from)*e; redraw();
      if(p<1){ scaleRaf=requestAnimationFrame(step); } else { scaleRaf=null; } }
    scaleRaf=requestAnimationFrame(step);
  }
  function show(i){ nodes[i].classList.add("show"); nodes[i].querySelector(".clabel").classList.add("show"); }
  function hideAll(){ nodes.forEach(function(g){ g.classList.remove("show"); g.querySelector(".clabel").classList.remove("show"); }); clearCue(); }
  function drawCue(){
    cueG.innerHTML="";
    var x0=fx(0), x1=fx(33.3), cx=(x0+x1)/2;
    cueG.appendChild(el("rect",{x:x0,y:Y0,width:x1-x0,height:Y1-Y0,fill:"rgba(122,108,174,0.10)"}));
    cueG.appendChild(el("text",{x:cx,y:Y0+22,"class":"cuelab","text-anchor":"middle",fill:"var(--uncertain)"},"≈ 70% of all foods"));
    cueG.appendChild(el("text",{x:cx,y:Y0+42,"class":"cuelab2","text-anchor":"middle",fill:"var(--muted)"},"in FPro’s low, “processed” range"));
    cueG.classList.add("show");
  }
  function clearCue(){ cueG.classList.remove("show"); cueG.innerHTML=""; }

  var STEPS=["b1","b2","b3","b4"];
  STEPS.forEach(function(){ var d=document.createElement("div"); d.className="dot"; progress.appendChild(d); });
  function mark(i){ var d=progress.children; for(var k=0;k<d.length;k++) d[k].className="dot"+(k<=i?" on":""); }

  function beat1(){ setCap("b1"); mark(0); hideAll(); show(0); drawCue(); setScale(B12); }
  function beat2(){ setCap("b2"); mark(1); show(0); show(1); setScale(B12); }
  function beat3(){ setCap("b3"); mark(2); clearCue(); show(0);show(1);show(2);show(3);show(4); setScale(DMAX); }
  function beat4(){ setCap("b4"); mark(3); show(0);show(1);show(2);show(3);show(4); setScale(DMAX); }

  var BEATS=[[0,beat1],[5500,beat2],[11000,beat3],[16500,finishRun]];
  var STEPFNS=[beat1,beat2,beat3,beat4], LAST=STEPFNS.length-1;
  var rafId=null,playing=false,t0=0,idx=0,current=-1;
  var prevBtn=document.getElementById("prevStep"), nextBtn=document.getElementById("nextStep");
  function clearAll(){ if(rafId){cancelAnimationFrame(rafId);rafId=null;} if(scaleRaf){cancelAnimationFrame(scaleRaf);scaleRaf=null;} playing=false; }
  function updateNav(){ prevBtn.disabled=(current<=0); nextBtn.disabled=(current>=LAST); }
  function setPlayLabel(t){ document.getElementById("replay").innerHTML=t; }
  function tick(now){ if(!playing) return; if(!t0) t0=now; var e=now-t0;
    while(idx<BEATS.length && e>=BEATS[idx][0]){ BEATS[idx][1](); if(idx<=LAST){current=idx;updateNav();} idx++; }
    if(idx<BEATS.length){ rafId=requestAnimationFrame(tick); } else { playing=false; rafId=null; } }
  function run(){ clearAll(); document.getElementById("replay").hidden=false; setPlayLabel("↻ Replay"); document.getElementById("skip").hidden=false;
    hideAll(); current=-1; idx=0; t0=0; playing=true; updateNav(); rafId=requestAnimationFrame(tick); }
  function goTo(n){ clearAll(); autoplayed=true; n=Math.max(0,Math.min(LAST,n)); hideAll();
    for(var i=0;i<=n;i++){ STEPFNS[i](); } current=n;
    document.getElementById("skip").hidden=false; document.getElementById("replay").hidden=false; setPlayLabel("↻ Replay"); updateNav(); }
  function home(){ narrator.innerHTML=CAP.rest; narrator.style.color="var(--ink)"; sub.textContent="each curve = one system's view of ~6,450 US foods";
    document.getElementById("skip").hidden=true; document.getElementById("replay").hidden=false; }
  function finishRun(){ home(); setPlayLabel("↻ Replay the walkthrough"); }
  function jumpToEnd(){ clearAll(); hideAll(); curMax=DMAX; redraw(); show(0);show(1);show(2);show(3);show(4); mark(3); current=LAST; home(); updateNav(); }

  document.getElementById("skip").addEventListener("click",function(){ jumpToEnd(); setPlayLabel("↻ Replay the walkthrough"); });
  document.getElementById("replay").addEventListener("click",run);
  prevBtn.addEventListener("click",function(){ goTo((current<0?0:current)-1); });
  nextBtn.addEventListener("click",function(){ goTo((current<0?-1:current)+1); });
  document.addEventListener("keydown",function(e){ if(e.key==="ArrowLeft") goTo((current<0?0:current)-1); else if(e.key==="ArrowRight") goTo((current<0?-1:current)+1); });

  build();
  narrator.innerHTML=CAP.rest;
  jumpToEnd();
  setPlayLabel("▶ Play the walkthrough");
  updateNav();

  var reduced=window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches;
  var autoplayed=false, embedded=!!(window.parent && window.parent!==window);
  function maybeAutoPlay(){ if(autoplayed||reduced) return; autoplayed=true; run(); }
  window.addEventListener("message",function(e){ if(e && e.data==="play-story") maybeAutoPlay(); });
  if(!embedded){ if("IntersectionObserver" in window){ new IntersectionObserver(function(es){ es.forEach(function(en){ if(en.isIntersecting) maybeAutoPlay(); }); },{threshold:0.5}).observe(document.getElementById("chart")); } else { maybeAutoPlay(); } }
})();
</script>
</body>
