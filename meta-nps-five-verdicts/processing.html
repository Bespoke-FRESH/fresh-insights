<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>The fight was about processing</title>
<style>
  :root{ --ink:#1a3a2a; --ink-soft:#2a5a3a; --muted:#6b7b6b; --muted-soft:#9aaa9a;
    --paper:#fffdf8; --line:#eee8df; --gold:#c8a24a; --healthy:#3f7d52; --unhealthy:#b4532f; --uncertain:#7a6cae; }
  *{box-sizing:border-box}
  html,body{margin:0;background:var(--paper);color:var(--ink);font-family:"Source Sans 3","Segoe UI",system-ui,sans-serif;}
  .wrap{max-width:840px;margin:0 auto;padding:8px 10px 14px;}
  .narrator{font-family:"Lora",Georgia,serif;font-weight:600;font-size:clamp(1.3rem,3.2vw,1.8rem);line-height:1.3;min-height:2.5em;margin:.2rem 0 .15rem;transition:color .5s ease;text-wrap:balance;}
  .sub{color:var(--muted);font-size:1rem;min-height:1.3em;}
  svg{width:100%;height:auto;display:block;touch-action:manipulation;}
  .axis-line{stroke:var(--ink);stroke-width:1.4;}
  .axis-label{fill:var(--ink);font-size:17px;font-weight:600;}
  .axis-sub{fill:var(--muted);font-size:12px;}
  .pole{font-size:14px;font-weight:700;}
  .tick{fill:var(--muted);font-size:13px;}
  .sysdot circle{transition:opacity .6s ease;}
  .slabel{font-size:15px;font-weight:600;fill:var(--ink);}
  .layer{opacity:0;transition:opacity .7s ease;}
  .layer.show{opacity:1;}
  .chip{font-size:15px;font-weight:700;}
  .controls{display:flex;gap:12px;align-items:center;margin-top:6px;min-height:30px;}
  .btn{background:none;border:none;color:var(--ink-soft);font:inherit;font-size:.85rem;font-weight:600;cursor:pointer;padding:2px 0;}
  .btn:hover{color:var(--ink);text-decoration:underline}
  .btn[hidden]{display:none}
  .navbtn{background:#fff;border:1.5px solid var(--line);color:var(--ink-soft);border-radius:8px;width:34px;height:30px;font-size:.85rem;font-weight:700;cursor:pointer;line-height:1;padding:0}
  .navbtn:hover:not(:disabled){border-color:var(--muted-soft);color:var(--ink)}
  .navbtn:disabled{opacity:.3;cursor:default}
  #replay{background:var(--ink);color:var(--paper);border-radius:999px;padding:8px 18px;font-weight:600;font-size:.92rem}
  #replay:hover{background:var(--ink-soft);color:var(--paper);text-decoration:none}
  .progress{display:flex;gap:6px;margin-left:auto}
  .dot{width:7px;height:7px;border-radius:50%;background:var(--line)}
  .dot.on{background:var(--gold)}
</style>
</head>
<body>
<div class="wrap">
  <div id="narrator" class="narrator"></div>
  <div id="sub" class="sub"></div>

  <svg id="chart" viewBox="0 0 760 540" role="img" aria-label="Removing the two processing-aware systems makes the other three converge on whole-wheat bread">
    <line class="axis-line" x1="150" y1="60" x2="150" y2="490"/>
    <text class="axis-label" transform="rotate(-90 26 275)" x="26" y="275" text-anchor="middle">Healthfulness score</text>
    <text class="axis-sub"   transform="rotate(-90 44 275)" x="44" y="275" text-anchor="middle">percentile rank among all US foods</text>
    <text class="pole" x="158" y="72"  fill="var(--healthy)">Healthy ↑</text>
    <text class="pole" x="158" y="486" fill="var(--unhealthy)">Unhealthy ↓</text>
    <text class="tick" x="142" y="66"  text-anchor="end">100</text>
    <text class="tick" x="142" y="279" text-anchor="end">50</text>
    <text class="tick" x="142" y="492" text-anchor="end">0</text>
    <text class="axis-label" x="300" y="520" text-anchor="middle">Whole-wheat bread</text>

    <g id="iqrB" class="layer"></g>
    <g id="iqrA" class="layer"></g>
    <g id="medB" class="layer"></g>
    <g id="medA" class="layer"></g>
    <g id="friB" class="layer"></g>
    <g id="friA" class="layer"></g>
    <g id="clsB" class="layer"></g>
    <g id="clsA" class="layer"></g>
    <g id="hi"   class="layer"></g>
    <g id="dots"></g>
  </svg>

  <div class="controls">
    <button id="prevStep" class="navbtn" aria-label="Previous point" title="Previous (←)">◀</button>
    <button id="nextStep" class="navbtn" aria-label="Next point" title="Next (→)">▶</button>
    <button id="skip" class="btn">Skip ▸</button>
    <button id="replay" class="btn" hidden>▶ Play the walkthrough</button>
    <div class="progress" id="progress"></div>
  </div>
</div>

<script>
(function(){
  "use strict";
  var NS="http://www.w3.org/2000/svg";
  var COLX=300, Y0=60, Y1=490;
  function fy(p){ return Y1 - (p/100)*(Y1-Y0); }
  function el(t,a,tx){ var e=document.createElementNS(NS,t); for(var k in a) e.setAttribute(k,a[k]); if(tx!=null) e.textContent=tx; return e; }

  var SYS=[
    {name:"FPro",         v:12, proc:true },
    {name:"NRF 9.3",      v:69, proc:false},
    {name:"Food Compass", v:74, proc:true },
    {name:"Nutri-Score",  v:93, proc:false},
    {name:"NRF 4:3:3",    v:99, proc:false}
  ];
  var META=74, META2=93;   // median of all five vs. median of the three non-processing systems

  var narrator=document.getElementById("narrator"), sub=document.getElementById("sub");
  var dotsG=document.getElementById("dots"), progress=document.getElementById("progress");
  var L={iqrB:g("iqrB"),iqrA:g("iqrA"),medB:g("medB"),medA:g("medA"),friB:g("friB"),friA:g("friA"),clsB:g("clsB"),clsA:g("clsA"),hi:g("hi")};
  function g(id){ return document.getElementById(id); }

  var CAP={
    rest:"The disagreement on whole-wheat bread isn’t random. One variable drives almost all of it.",
    b1:"Start where we left off: five systems, scores 12 to 99, and a verdict of Uncertain.",
    b2:"Two of the five weigh one extra thing — how processed the food is.",
    b3:"Set those two aside, and the other three nearly agree: 69, 93, 99. The meta-score climbs to 93.",
    b4:"Same loaf, new verdict — Certainly Healthy. The fight was about processing all along."
  };
  var COLOR={rest:"var(--ink)",b1:"var(--uncertain)",b2:"var(--uncertain)",b3:"var(--healthy)",b4:"var(--healthy)"};
  function setCap(k){ narrator.innerHTML=CAP[k]; narrator.style.color=COLOR[k]||"var(--ink)"; sub.textContent=""; }

  var dotEls={};
  function build(){
    SYS.forEach(function(s){
      var grp=el("g",{"class":"sysdot"});
      grp.appendChild(el("circle",{cx:COLX, cy:fy(s.v), r:8,
        fill:s.proc?"var(--paper)":"var(--gold)", stroke:"var(--gold)", "stroke-width":s.proc?2.6:1.4}));
      grp.appendChild(el("text",{x:COLX+16, y:fy(s.v)+5, "class":"slabel"}, s.name+"  ·  "+s.v));
      dotsG.appendChild(grp); dotEls[s.name]=grp;
    });
    // before (full five)
    L.medB.appendChild(el("line",{x1:COLX-70,y1:fy(META),x2:COLX+8,y2:fy(META),stroke:"var(--gold)","stroke-width":3}));
    L.medB.appendChild(el("text",{x:COLX-74,y:fy(META)+5,"class":"slabel","text-anchor":"end",fill:"var(--gold)"},"meta-score "+META));
    L.iqrB.appendChild(el("line",{x1:COLX,y1:fy(12),x2:COLX,y2:fy(99),stroke:"var(--uncertain)","stroke-width":1.5,"stroke-dasharray":"3 3"}));
    L.iqrB.appendChild(el("rect",{x:COLX-34,y:fy(93),width:68,height:fy(69)-fy(93),rx:5,fill:"rgba(122,108,174,0.14)",stroke:"rgba(122,108,174,0.55)","stroke-width":1.2}));
    L.friB.appendChild(el("path",{d:"M "+(COLX-92)+" "+fy(60)+" l 9 -8 l 9 8 l -9 8 z",fill:"var(--uncertain)"}));
    L.friB.appendChild(el("text",{x:COLX-100,y:fy(60)+5,"class":"slabel","text-anchor":"end",fill:"var(--uncertain)"},"FRI 60"));
    chip(L.clsB,"Uncertain","var(--uncertain)",false);
    // after (three non-processing)
    L.medA.appendChild(el("line",{x1:COLX-70,y1:fy(META2),x2:COLX+8,y2:fy(META2),stroke:"var(--healthy)","stroke-width":3}));
    L.medA.appendChild(el("text",{x:COLX-74,y:fy(META2)+5,"class":"slabel","text-anchor":"end",fill:"var(--healthy)"},"meta-score "+META2));
    L.iqrA.appendChild(el("rect",{x:COLX-34,y:fy(99),width:68,height:fy(69)-fy(99),rx:5,fill:"rgba(63,125,82,0.14)",stroke:"rgba(63,125,82,0.6)","stroke-width":1.2}));
    L.iqrA.appendChild(el("text",{x:COLX-40,y:fy(84)+5,"class":"slabel","text-anchor":"end",fill:"var(--healthy)"},"they agree"));
    L.friA.appendChild(el("path",{d:"M "+(COLX-92)+" "+fy(88)+" l 9 -8 l 9 8 l -9 8 z",fill:"var(--healthy)"}));
    L.friA.appendChild(el("text",{x:COLX-100,y:fy(88)+5,"class":"slabel","text-anchor":"end",fill:"var(--healthy)"},"FRI ↑"));
    chip(L.clsA,"Certainly Healthy","var(--healthy)",true);
    // highlight rings on the two processing systems
    [SYS[0],SYS[2]].forEach(function(s){
      L.hi.appendChild(el("circle",{cx:COLX,cy:fy(s.v),r:15,fill:"none",stroke:"var(--uncertain)","stroke-width":2,"stroke-dasharray":"4 3"}));
    });
    L.hi.appendChild(el("text",{x:COLX+34,y:fy((12+74)/2)+5,"class":"slabel",fill:"var(--uncertain)"},"⟵ weigh processing"));
  }
  function chip(layer,label,color,solid){
    var cx=COLX+170, cy=fy(50), w=label.length*8.4+50, x=cx-w/2;
    layer.appendChild(el("rect",{x:x,y:cy-20,width:w,height:40,rx:20,fill:color,"fill-opacity":"0.12",stroke:color,"stroke-width":1.5}));
    if(solid) layer.appendChild(el("circle",{cx:x+22,cy:cy,r:7,fill:color}));
    else layer.appendChild(el("circle",{cx:x+22,cy:cy,r:7,fill:"var(--paper)",stroke:color,"stroke-width":2.4}));
    layer.appendChild(el("text",{x:x+36,y:cy+5,"class":"chip",fill:color},label));
  }

  function dim(name,on){ dotEls[name].querySelector("circle").setAttribute("opacity",on?"0.18":"1");
    dotEls[name].querySelector("text").setAttribute("opacity",on?"0.25":"1"); }
  function show(layer){ layer.classList.add("show"); }
  function hide(layer){ layer.classList.remove("show"); }
  function resetAll(){ for(var k in L) hide(L[k]); dim("FPro",false); dim("Food Compass",false); }

  var STEPS=["b1","b2","b3","b4"];
  STEPS.forEach(function(){ var d=document.createElement("div"); d.className="dot"; progress.appendChild(d); });
  function mark(i){ var d=progress.children; for(var k=0;k<d.length;k++) d[k].className="dot"+(k<=i?" on":""); }

  function beat1(){ setCap("b1"); mark(0); resetAll(); show(L.medB); show(L.iqrB); show(L.friB); show(L.clsB); }
  function beat2(){ setCap("b2"); mark(1); resetAll(); show(L.medB); show(L.iqrB); show(L.friB); show(L.clsB); show(L.hi); }
  function beat3(){ setCap("b3"); mark(2); resetAll(); dim("FPro",true); dim("Food Compass",true); show(L.hi); show(L.medA); show(L.iqrA); }
  function beat4(){ setCap("b4"); mark(3); resetAll(); dim("FPro",true); dim("Food Compass",true); show(L.medA); show(L.iqrA); show(L.friA); show(L.clsA); }

  // ---- engine: rAF clock, arrows, skip/replay, scroll-to-play ----
  var BEATS=[[0,beat1],[4600,beat2],[9600,beat3],[14600,beat4],[19600,finishRun]];
  var STEPFNS=[beat1,beat2,beat3,beat4], LAST=STEPFNS.length-1;
  var rafId=null,playing=false,t0=0,idx=0,current=-1;
  var prevBtn=document.getElementById("prevStep"), nextBtn=document.getElementById("nextStep");
  function clearAll(){ if(rafId){cancelAnimationFrame(rafId);rafId=null;} playing=false; }
  function updateNav(){ prevBtn.disabled=(current<=0); nextBtn.disabled=(current>=LAST); }
  function setPlayLabel(t){ document.getElementById("replay").innerHTML=t; }
  function tick(now){ if(!playing) return; if(!t0) t0=now; var e=now-t0;
    while(idx<BEATS.length && e>=BEATS[idx][0]){ BEATS[idx][1](); if(idx<=LAST){current=idx;updateNav();} idx++; }
    if(idx<BEATS.length){ rafId=requestAnimationFrame(tick); } else { playing=false; rafId=null; } }
  function run(){ clearAll(); document.getElementById("replay").hidden=false; setPlayLabel("↻ Replay"); document.getElementById("skip").hidden=false;
    resetAll(); current=-1; idx=0; t0=0; playing=true; updateNav(); rafId=requestAnimationFrame(tick); }
  function goTo(n){ clearAll(); autoplayed=true; n=Math.max(0,Math.min(LAST,n)); resetAll();
    STEPFNS[n](); current=n;
    document.getElementById("skip").hidden=false; document.getElementById("replay").hidden=false; setPlayLabel("↻ Replay"); updateNav(); }
  function home(){ narrator.innerHTML=CAP.rest; narrator.style.color="var(--ink)"; sub.textContent="○ = system weighs processing  ·  same loaf, two verdicts";
    document.getElementById("skip").hidden=true; document.getElementById("replay").hidden=false; }
  function finishRun(){ home(); setPlayLabel("↻ Replay the walkthrough"); }
  function jumpToEnd(){ clearAll(); beat4(); current=LAST; home(); updateNav(); }

  document.getElementById("skip").addEventListener("click",function(){ jumpToEnd(); setPlayLabel("↻ Replay the walkthrough"); });
  document.getElementById("replay").addEventListener("click",run);
  prevBtn.addEventListener("click",function(){ goTo((current<0?0:current)-1); });
  nextBtn.addEventListener("click",function(){ goTo((current<0?-1:current)+1); });
  document.addEventListener("keydown",function(e){ if(e.key==="ArrowLeft") goTo((current<0?0:current)-1); else if(e.key==="ArrowRight") goTo((current<0?-1:current)+1); });

  build();
  narrator.innerHTML=CAP.rest;
  jumpToEnd();
  setPlayLabel("▶ Play the walkthrough");
  updateNav();

  var reduced=window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches;
  var autoplayed=false, embedded=!!(window.parent && window.parent!==window);
  function maybeAutoPlay(){ if(autoplayed||reduced) return; autoplayed=true; run(); }
  window.addEventListener("message",function(e){ if(e && e.data==="play-story") maybeAutoPlay(); });
  if(!embedded){ if("IntersectionObserver" in window){ new IntersectionObserver(function(es){ es.forEach(function(en){ if(en.isIntersecting) maybeAutoPlay(); }); },{threshold:0.5}).observe(document.getElementById("chart")); } else { maybeAutoPlay(); } }
})();
</script>
</body>
</html>
