<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>The fight was about processing</title>
<style>
  :root{ --ink:#1a3a2a; --ink-soft:#2a5a3a; --muted:#6b7b6b; --muted-soft:#9aaa9a;
    --paper:#fffdf8; --line:#eee8df; --gold:#c8a24a; --healthy:#3f7d52; --unhealthy:#b4532f; --uncertain:#7a6cae; }
  *{box-sizing:border-box}
  html,body{margin:0;background:var(--paper);color:var(--ink);font-family:"Source Sans 3","Segoe UI",system-ui,sans-serif;}
  .wrap{max-width:880px;margin:0 auto;padding:8px 10px 14px;}
  .narrator{font-family:"Lora",Georgia,serif;font-weight:600;font-size:clamp(1.3rem,3.2vw,1.8rem);line-height:1.3;min-height:2.5em;margin:.2rem 0 .15rem;transition:color .5s ease;text-wrap:balance;}
  .sub{color:var(--muted);font-size:1rem;min-height:1.3em;}
  svg{width:100%;height:auto;display:block;touch-action:manipulation;}
  .axis-line{stroke:var(--ink);stroke-width:1.4;}
  .axis-label{fill:var(--ink);font-size:16px;font-weight:600;}
  .axis-sub{fill:var(--muted);font-size:11px;}
  .pole{font-size:13px;font-weight:700;}
  .tick{fill:var(--muted);font-size:12px;}
  .coltitle{font-size:13px;font-weight:700;letter-spacing:.04em;fill:var(--muted);}
  .slabel{font-size:14px;font-weight:600;fill:var(--ink);}
  .sysdot circle{transition:opacity .6s ease;}
  .layer{opacity:0;transition:opacity .7s ease;}
  .layer.show{opacity:1;}
  .chip{font-size:14px;font-weight:700;}
  .mlab{font-size:13px;font-weight:600;}
  .msub{font-size:11.5px;}
  .controls{display:flex;gap:12px;align-items:center;margin-top:6px;min-height:30px;}
  .btn{background:none;border:none;color:var(--ink-soft);font:inherit;font-size:.85rem;font-weight:600;cursor:pointer;padding:2px 0;}
  .btn:hover{color:var(--ink);text-decoration:underline}
  .btn[hidden]{display:none}
  .navbtn{background:#fff;border:1.5px solid var(--line);color:var(--ink-soft);border-radius:8px;width:34px;height:30px;font-size:.85rem;font-weight:700;cursor:pointer;line-height:1;padding:0}
  .navbtn:hover:not(:disabled){border-color:var(--muted-soft);color:var(--ink)}
  .navbtn:disabled{opacity:.3;cursor:default}
  #replay{background:var(--ink);color:var(--paper);border-radius:999px;padding:8px 18px;font-weight:600;font-size:.92rem}
  #replay:hover{background:var(--ink-soft);color:var(--paper);text-decoration:none}
  .progress{display:flex;gap:6px;margin-left:auto}
  .dot{width:7px;height:7px;border-radius:50%;background:var(--line)}
  .dot.on{background:var(--gold)}
</style>
</head>
<body>
<div class="wrap">
  <div id="narrator" class="narrator"></div>
  <div id="sub" class="sub"></div>

  <svg id="chart" viewBox="0 0 740 630" role="img" aria-label="Removing the two processing-aware systems makes the other three converge on whole-wheat bread">
    <!-- shared axis -->
    <line class="axis-line" x1="66" y1="60" x2="66" y2="440"/>
    <text class="axis-label" transform="rotate(-90 20 250)" x="20" y="250" text-anchor="middle">Healthfulness score</text>
    <text class="axis-sub"   transform="rotate(-90 36 250)" x="36" y="250" text-anchor="middle">percentile rank among all US foods</text>
    <text class="pole" x="74" y="70"  fill="var(--healthy)">Healthy ↑</text>
    <text class="pole" x="74" y="436" fill="var(--unhealthy)">Unhealthy ↓</text>
    <text class="tick" x="58" y="64"  text-anchor="end">100</text>
    <text class="tick" x="58" y="254" text-anchor="end">50</text>
    <text class="tick" x="58" y="444" text-anchor="end">0</text>

    <text class="coltitle" x="210" y="44" text-anchor="middle">ALL FIVE SYSTEMS</text>
    <text class="coltitle" x="560" y="44" text-anchor="middle">PROCESSING SET ASIDE</text>
    <text class="slabel" x="385" y="462" text-anchor="middle" fill="var(--muted)">Whole-wheat bread</text>

    <g id="pre"></g>
    <g id="post"  class="layer"></g>
    <g id="hi"    class="layer"></g>
    <g id="arrow" class="layer"></g>
    <g id="preCls"  class="layer"></g>
    <g id="postCls" class="layer"></g>
    <g id="metrics" class="layer"></g>
  </svg>

  <div class="controls">
    <button id="prevStep" class="navbtn" aria-label="Previous point" title="Previous (←)">◀</button>
    <button id="nextStep" class="navbtn" aria-label="Next point" title="Next (→)">▶</button>
    <button id="skip" class="btn">Skip ▸</button>
    <button id="replay" class="btn" hidden>▶ Play the walkthrough</button>
    <div class="progress" id="progress"></div>
  </div>
</div>

<script>
(function(){
  "use strict";
  var NS="http://www.w3.org/2000/svg";
  var Y0=60, Y1=440, PRE=210, POST=560;
  function fy(p){ return Y1 - (p/100)*(Y1-Y0); }
  function el(t,a,tx){ var e=document.createElementNS(NS,t); for(var k in a) e.setAttribute(k,a[k]); if(tx!=null) e.textContent=tx; return e; }

  var ALL=[
    {name:"FPro",         v:12, proc:true },
    {name:"NRF 9.3",      v:69, proc:false},
    {name:"Food Compass", v:74, proc:true },
    {name:"Nutri-Score",  v:93, proc:false},
    {name:"NRF 4:3:3",    v:99, proc:false}
  ];
  var KEEP=[{name:"NRF 9.3",v:69},{name:"Nutri-Score",v:93},{name:"NRF 4:3:3",v:99}];
  var META=74, META2=93;

  var narrator=document.getElementById("narrator"), sub=document.getElementById("sub"), progress=document.getElementById("progress");
  var G={pre:get("pre"),post:get("post"),hi:get("hi"),arrow:get("arrow"),preCls:get("preCls"),postCls:get("postCls"),metrics:get("metrics")};
  function get(id){ return document.getElementById(id); }

  var CAP={
    rest:"The disagreement on whole-wheat bread isn’t random. One variable drives almost all of it.",
    b1:"Start with all five systems: scores from 12 to 99, and a verdict of Uncertain.",
    b2:"Two of the five weigh one extra thing the others ignore — how processed the food is.",
    b3:"Set those two aside, and the other three nearly agree: 69, 93, 99.",
    b4:"Meta-score climbs 74 → 93, the spread collapses, the verdict flips to Certainly Healthy. The fight was about processing."
  };
  var COLOR={rest:"var(--ink)",b1:"var(--uncertain)",b2:"var(--uncertain)",b3:"var(--healthy)",b4:"var(--healthy)"};
  function setCap(k){ narrator.innerHTML=CAP[k]; narrator.style.color=COLOR[k]||"var(--ink)"; sub.textContent=""; }

  // ---- build the two columns once ----
  var preDots={};
  function column(parent, x, list, store){
    list.forEach(function(s){
      var g=el("g",{"class":"sysdot"});
      g.appendChild(el("circle",{cx:x, cy:fy(s.v), r:7.5,
        fill:s.proc?"var(--paper)":"var(--gold)", stroke:"var(--gold)", "stroke-width":s.proc?2.6:1.4}));
      g.appendChild(el("text",{x:x+14, y:fy(s.v)+5, "class":"slabel"}, s.name+" · "+s.v));
      parent.appendChild(g); if(store) store[s.name]=g;
    });
  }
  function boxWhisker(parent, x, lo, hi, q1, q3, med, color){
    parent.appendChild(el("line",{x1:x,y1:fy(lo),x2:x,y2:fy(hi),stroke:color,"stroke-width":1.5,"stroke-dasharray":"3 3"}));
    parent.appendChild(el("rect",{x:x-30,y:fy(q3),width:60,height:fy(q1)-fy(q3),rx:5,
      fill:color==="var(--uncertain)"?"rgba(122,108,174,0.14)":"rgba(63,125,82,0.14)",stroke:color,"stroke-width":1.2}));
    parent.appendChild(el("line",{x1:x-30,y1:fy(med),x2:x+30,y2:fy(med),stroke:color,"stroke-width":3}));
  }
  function chip(parent, cx, cy, label, color, solid){
    var w=label.length*8+44, x=cx-w/2;
    parent.appendChild(el("rect",{x:x,y:cy-16,width:w,height:32,rx:16,fill:color,"fill-opacity":"0.12",stroke:color,"stroke-width":1.4}));
    if(solid) parent.appendChild(el("circle",{cx:x+18,cy:cy,r:6,fill:color}));
    else parent.appendChild(el("circle",{cx:x+18,cy:cy,r:6,fill:"var(--paper)",stroke:color,"stroke-width":2.2}));
    parent.appendChild(el("text",{x:x+30,y:cy+5,"class":"chip",fill:color},label));
  }

  function build(){
    // PRE: box behind dots, then dots
    boxWhisker(G.pre, PRE, 12, 99, 69, 93, META, "var(--uncertain)");
    G.pre.appendChild(el("text",{x:PRE-36,y:fy(META)+5,"class":"slabel","text-anchor":"end",fill:"var(--gold)"},META+""));
    column(G.pre, PRE, ALL, preDots);
    // POST
    boxWhisker(G.post, POST, 69, 99, 69, 99, META2, "var(--healthy)");
    G.post.appendChild(el("text",{x:POST-36,y:fy(META2)+5,"class":"slabel","text-anchor":"end",fill:"var(--healthy)"},META2+""));
    column(G.post, POST, KEEP, null);
    // highlight rings on the two processing systems in PRE
    [ALL[0],ALL[2]].forEach(function(s){
      G.hi.appendChild(el("circle",{cx:PRE,cy:fy(s.v),r:14,fill:"none",stroke:"var(--uncertain)","stroke-width":2,"stroke-dasharray":"4 3"}));
    });
    // arrow PRE → POST, aligned with the high cluster
    G.arrow.appendChild(el("line",{x1:428,y1:fy(72),x2:524,y2:fy(72),stroke:"var(--muted)","stroke-width":2.5,"marker-end":"url(#pah)"}));
    G.arrow.appendChild(el("text",{x:476,y:fy(72)+24,"class":"msub","text-anchor":"middle",fill:"var(--muted)"},"remove FPro"));
    G.arrow.appendChild(el("text",{x:476,y:fy(72)+40,"class":"msub","text-anchor":"middle",fill:"var(--muted)"},"+ Food Compass"));
    var defs=el("defs",{}); var m=el("marker",{id:"pah",markerWidth:"9",markerHeight:"9",refX:"7",refY:"4.5",orient:"auto"});
    m.appendChild(el("path",{d:"M0,0 L9,4.5 L0,9 z",fill:"var(--muted)"})); defs.appendChild(m); G.arrow.appendChild(defs);
    // verdict chips under each column
    chip(G.preCls, PRE, 495, "Uncertain", "var(--uncertain)", false);
    chip(G.postCls, POST, 495, "Certainly Healthy", "var(--healthy)", true);
    // metric deltas
    G.metrics.appendChild(el("text",{x:66,y:556,"class":"msub",fill:"var(--muted)","font-weight":"700"},"WHEN YOU REMOVE PROCESSING:"));
    var M=[["Meta-score","74 → 93","up"],["Spread","collapses","dn"],["Rank range","narrows","dn"],["FRI","climbs","up"]];
    var mx=[110,290,465,625];
    M.forEach(function(d,i){
      var x=mx[i], up=d[2]==="up", c=up?"var(--healthy)":"var(--ink-soft)";
      G.metrics.appendChild(el("text",{x:x,y:586,"class":"mlab",fill:c},(up?"↑ ":"↓ ")+d[0]));
      G.metrics.appendChild(el("text",{x:x,y:602,"class":"msub",fill:"var(--muted)"},d[1]));
    });
  }

  function dim(name,on){ var g=preDots[name]; g.querySelector("circle").setAttribute("opacity",on?"0.85":"1"); }
  function show(g){ g.classList.add("show"); }
  function hide(g){ g.classList.remove("show"); }
  function resetAll(){ hide(G.post);hide(G.hi);hide(G.arrow);hide(G.preCls);hide(G.postCls);hide(G.metrics); }

  var STEPS=["b1","b2","b3","b4"];
  STEPS.forEach(function(){ var d=document.createElement("div"); d.className="dot"; progress.appendChild(d); });
  function mark(i){ var d=progress.children; for(var k=0;k<d.length;k++) d[k].className="dot"+(k<=i?" on":""); }

  function beat1(){ setCap("b1"); mark(0); resetAll(); show(G.preCls); }
  function beat2(){ setCap("b2"); mark(1); resetAll(); show(G.preCls); show(G.hi); }
  function beat3(){ setCap("b3"); mark(2); resetAll(); show(G.hi); show(G.arrow); show(G.post); show(G.preCls); show(G.postCls); }
  function beat4(){ setCap("b4"); mark(3); resetAll(); show(G.hi); show(G.arrow); show(G.post); show(G.preCls); show(G.postCls); show(G.metrics); }

  // ---- engine: rAF clock, arrows, skip/replay, scroll-to-play ----
  var BEATS=[[0,beat1],[4600,beat2],[9600,beat3],[14600,beat4],[19600,finishRun]];
  var STEPFNS=[beat1,beat2,beat3,beat4], LAST=STEPFNS.length-1;
  var rafId=null,playing=false,t0=0,idx=0,current=-1;
  var prevBtn=document.getElementById("prevStep"), nextBtn=document.getElementById("nextStep");
  function clearAll(){ if(rafId){cancelAnimationFrame(rafId);rafId=null;} playing=false; }
  function updateNav(){ prevBtn.disabled=(current<=0); nextBtn.disabled=(current>=LAST); }
  function setPlayLabel(t){ document.getElementById("replay").innerHTML=t; }
  function tick(now){ if(!playing) return; if(!t0) t0=now; var e=now-t0;
    while(idx<BEATS.length && e>=BEATS[idx][0]){ BEATS[idx][1](); if(idx<=LAST){current=idx;updateNav();} idx++; }
    if(idx<BEATS.length){ rafId=requestAnimationFrame(tick); } else { playing=false; rafId=null; } }
  function run(){ clearAll(); document.getElementById("replay").hidden=false; setPlayLabel("↻ Replay"); document.getElementById("skip").hidden=false;
    resetAll(); current=-1; idx=0; t0=0; playing=true; updateNav(); rafId=requestAnimationFrame(tick); }
  function goTo(n){ clearAll(); autoplayed=true; n=Math.max(0,Math.min(LAST,n));
    STEPFNS[n](); current=n;
    document.getElementById("skip").hidden=false; document.getElementById("replay").hidden=false; setPlayLabel("↻ Replay"); updateNav(); }
  function home(){ narrator.innerHTML=CAP.rest; narrator.style.color="var(--ink)"; sub.textContent="○ = system weighs processing  ·  same loaf, two verdicts";
    document.getElementById("skip").hidden=true; document.getElementById("replay").hidden=false; }
  function finishRun(){ home(); setPlayLabel("↻ Replay the walkthrough"); }
  function jumpToEnd(){ clearAll(); beat4(); current=LAST; home(); updateNav(); }

  document.getElementById("skip").addEventListener("click",function(){ jumpToEnd(); setPlayLabel("↻ Replay the walkthrough"); });
  document.getElementById("replay").addEventListener("click",run);
  prevBtn.addEventListener("click",function(){ goTo((current<0?0:current)-1); });
  nextBtn.addEventListener("click",function(){ goTo((current<0?-1:current)+1); });
  document.addEventListener("keydown",function(e){ if(e.key==="ArrowLeft") goTo((current<0?0:current)-1); else if(e.key==="ArrowRight") goTo((current<0?-1:current)+1); });

  build();
  narrator.innerHTML=CAP.rest;
  jumpToEnd();
  setPlayLabel("▶ Play the walkthrough");
  updateNav();

  var reduced=window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches;
  var autoplayed=false, embedded=!!(window.parent && window.parent!==window);
  function maybeAutoPlay(){ if(autoplayed||reduced) return; autoplayed=true; run(); }
  window.addEventListener("message",function(e){ if(e && e.data==="play-story") maybeAutoPlay(); });
  if(!embedded){ if("IntersectionObserver" in window){ new IntersectionObserver(function(es){ es.forEach(function(en){ if(en.isIntersecting) maybeAutoPlay(); }); },{threshold:0.5}).observe(document.getElementById("chart")); } else { maybeAutoPlay(); } }
})();
</script>
</body>
</html>
